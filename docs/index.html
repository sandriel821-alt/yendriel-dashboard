<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>TITAN-AI v9-TS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:ui-monospace,monospace}
body{background:#0a0a0a;color:#fff;min-height:100vh;padding:12px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #1a1a1a;flex-wrap:wrap;gap:8px}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;border-radius:6px;background:linear-gradient(135deg,#3b82f6,#a855f7);display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-size:16px;font-weight:bold}.logo-text span{color:#3b82f6}
.ia-badge{font-size:10px;padding:4px 8px;border-radius:4px;background:rgba(34,197,94,.1);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.ia-badge::before{content:"●";margin-right:4px;animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.5}}
.update-info{font-size:9px;color:#555;text-align:right}
.price-bar{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;padding:12px;margin-bottom:12px}
.price-main{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.price-value{font-size:24px;font-weight:bold;animation:flash 1s}
@keyframes flash{0%{color:#3b82f6}100%{color:#fff}}
.price-change{font-size:14px;font-weight:600}
.price-stats{font-size:10px;color:#666}
.chart-container{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;padding:8px;margin-bottom:12px}
.chart-info{display:flex;gap:12px;font-size:10px;color:#666;padding:4px 8px;border-bottom:1px solid #1a1a1a;margin-bottom:4px;flex-wrap:wrap}
.chart-info span{white-space:nowrap}
.chart-info .ema30{color:#f59e0b}.chart-info .ema100{color:#a855f7}.chart-info .rsi{color:#3b82f6}
canvas{display:block;width:100%}
.rsi-container{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;padding:8px;margin-bottom:12px}
.rsi-label{font-size:9px;color:#3b82f6;padding:4px 8px;border-bottom:1px solid #1a1a1a;margin-bottom:4px}
.section{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;padding:16px;margin-bottom:12px}
.section-title{font-size:11px;font-weight:bold;color:#888;text-transform:uppercase;margin-bottom:12px;letter-spacing:1px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.stat{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px;padding:10px}
.stat-label{font-size:9px;color:#666;text-transform:uppercase}
.stat-value{font-size:14px;font-weight:bold;margin-top:2px}
.trade-card{background:linear-gradient(135deg,#111,#0d0d0d);border:1px solid #1f1f1f;border-radius:8px;padding:16px;margin-bottom:12px}
.dir-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:4px;font-weight:bold;font-size:12px}
.dir-long{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.dir-short{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.dir-neutral{background:rgba(107,114,128,.15);color:#6b7280}
.price-row{display:flex;justify-content:space-between;padding:4px 0;font-size:11px}
.price-row span:first-child{color:#666}.price-row span:last-child{font-weight:600}
.loading{text-align:center;padding:40px;color:#666}
.spinner{width:40px;height:40px;border:3px solid #1a1a1a;border-top-color:#3b82f6;border-radius:50%;animation:s 1s linear infinite;margin:0 auto 12px}
@keyframes s{to{transform:rotate(360deg)}}
.analyst{background:linear-gradient(135deg,rgba(99,102,241,.05),#0d0d0d);border:1px solid rgba(99,102,241,.2)}
.sent-bar{height:8px;background:#1a1a1a;border-radius:4px;overflow:hidden;margin:8px 0}
.sent-fill{height:100%;transition:width .5s}
.news-item{font-size:10px;color:#888;padding:4px 0;border-bottom:1px solid #111}
.news-item:last-child{border:none}
.footer{text-align:center;font-size:9px;color:#444;padding:16px 0;border-top:1px solid #1a1a1a;margin-top:16px}
.btn-refresh{position:fixed;bottom:16px;right:16px;width:44px;height:44px;border-radius:50%;background:#1a1a1a;border:1px solid #2a2a2a;color:#3b82f6;font-size:18px;cursor:pointer;z-index:100;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spinner"></div><p>Cargando TITAN-AI…</p></div></div>
<button class="btn-refresh" onclick="loadData()">↻</button>
<script>
const HAS_EMBEDDED = typeof window.EMBEDDED_DATA !== 'undefined';
function fmt(n,d=2){return n==null?'—':n.toLocaleString('en-US',{maximumFractionDigits:d,minimumFractionDigits:d})}
function usd(n,d=0){return n==null?'—':'$'+n.toLocaleString('en-US',{maximumFractionDigits:d,minimumFractionDigits:d})}
function pct(n,d=2){return n==null?'—':(n*100).toFixed(d)+'%'}
function calcEMA(v,p){const k=2/(p+1),o=[];let e=null;for(let i=0;i<v.length;i++){if(i<p-1){o.push(null);continue}if(e===null){e=v.slice(0,p).reduce((a,b)=>a+b,0)/p}else{e=v[i]*k+e*(1-k)}o.push(e)}return o}
function calcRSI(c,p){const o=[null];let ag=0,al=0;for(let i=1;i<c.length;i++){const ch=c[i]-c[i-1],g=ch>0?ch:0,l=ch<0?Math.abs(ch):0;if(i<=p){ag+=g;al+=l;if(i===p){ag/=p;al/=p;o.push(al===0?100:100-100/(1+ag/al))}else o.push(null)}else{ag=(ag*(p-1)+g)/p;al=(al*(p-1)+l)/p;o.push(al===0?100:100-100/(1+ag/al))}}return o}
function drawChart(cv,c,e30v,e100v,en,sl,tp,dir){const ctx=cv.getContext('2d'),dpr=window.devicePixelRatio||1,W=cv.clientWidth,H=cv.clientHeight;cv.width=W*dpr;cv.height=H*dpr;ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);if(!c||!c.length)return;const pL=8,pR=60,pT=8,pB=20,cw=W-pL-pR,ch=H-pT-pB,vis=c.slice(-50),cW=cw/vis.length,bW=Math.max(2,cW*.7);let mn=Infinity,mx=-Infinity;vis.forEach(x=>{mn=Math.min(mn,x.low);mx=Math.max(mx,x.high)});if(en){mn=Math.min(mn,en);mx=Math.max(mx,en)}if(sl){mn=Math.min(mn,sl);mx=Math.max(mx,sl)}if(tp){mn=Math.min(mn,tp);mx=Math.max(mx,tp)}const rg=mx-mn;if(rg<.001){mn-=.5;mx+=.5}const py=p=>pT+ch-((p-mn)/(mx-mn))*ch;ctx.strokeStyle='#141414';ctx.lineWidth=1;ctx.font='9px monospace';ctx.fillStyle='#444';for(let i=0;i<=5;i++){const y=pT+(ch/5)*i;ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(pL+cw,y);ctx.stroke();ctx.fillText('$'+(mx-(rg/5)*i).toFixed(0),pL+cw+4,y+3)}ctx.fillStyle='#333';for(let i=0;i<vis.length;i+=Math.ceil(vis.length/6)){const x=pL+i*cW+cW/2,d=new Date(vis[i].timestamp);ctx.fillText(d.toLocaleDateString('es',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}),x-30,pT+ch+14)}vis.forEach((x,i)=>{const xx=pL+i*cW+cW/2,up=x.close>=x.open,col=up?'#22c55e':'#ef4444';ctx.strokeStyle=col;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(xx,py(x.high));ctx.lineTo(xx,py(x.low));ctx.stroke();const yO=py(x.open),yC=py(x.close),bh=Math.max(1,Math.abs(yC-yO));ctx.fillStyle=col;ctx.fillRect(xx-bW/2,Math.min(yO,yC),bW,bh)});if(e30v!=null){ctx.strokeStyle='#f59e0b';ctx.lineWidth=1.5;ctx.beginPath();const e=calcEMA(c.map(x=>x.close),30);let st=false;vis.forEach((x,i)=>{const v=e[c.length-50+i];if(v==null)return;const xx=pL+i*cW+cW/2,y=py(v);if(!st){ctx.moveTo(xx,y);st=true}else ctx.lineTo(xx,y)});ctx.stroke()}if(e100v!=null){ctx.strokeStyle='#a855f7';ctx.lineWidth=1.5;ctx.beginPath();const e=calcEMA(c.map(x=>x.close),100);let st=false;vis.forEach((x,i)=>{const v=e[c.length-50+i];if(v==null)return;const xx=pL+i*cW+cW/2,y=py(v);if(!st){ctx.moveTo(xx,y);st=true}else ctx.lineTo(xx,y)});ctx.stroke()}if(en&&en>0){const y=py(en),dc=dir==='LONG'?'#22c55e':dir==='SHORT'?'#ef4444':'#888';ctx.strokeStyle=dc;ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(pL+cw,y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=dc;ctx.font='bold 9px monospace';ctx.fillText('ENTRY '+usd(en,0),pL+cw+4,y-4)}if(sl&&sl>0){const y=py(sl);ctx.strokeStyle='#dc2626';ctx.lineWidth=1;ctx.setLineDash([3,2]);ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(pL+cw,y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#dc2626';ctx.font='8px monospace';ctx.fillText('SL',pL+cw+4,y-3)}if(tp&&tp>0){const y=py(tp);ctx.strokeStyle='#16a34a';ctx.lineWidth=1;ctx.setLineDash([3,2]);ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(pL+cw,y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#16a34a';ctx.font='8px monospace';ctx.fillText('TP',pL+cw+4,y-3)}}
function drawRSI(cv,c){const ctx=cv.getContext('2d'),dpr=window.devicePixelRatio||1,W=cv.clientWidth,H=cv.clientHeight;cv.width=W*dpr;cv.height=H*dpr;ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);if(!c||!c.length)return;const pL=8,pR=60,pT=4,pB=4,cw=W-pL-pR,ch=H-pT-pB,vis=c.slice(-50),cW=cw/vis.length,r=calcRSI(c.map(x=>x.close),14);[30,50,70].forEach(v=>{const y=pT+ch-(v/100)*ch;ctx.strokeStyle=v===50?'#1a1a1a':v===70?'rgba(239,68,68,.2)':'rgba(34,197,94,.2)';ctx.setLineDash(v===50?[]:[2,3]);ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(pL+cw,y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#444';ctx.font='8px monospace';ctx.fillText(v.toString(),pL+cw+4,y+3)});ctx.strokeStyle='#3b82f6';ctx.lineWidth=1.5;ctx.beginPath();let st=false;vis.forEach((x,i)=>{const v=r[c.length-50+i];if(v==null)return;const xx=pL+i*cW+cW/2,y=pT+ch-(v/100)*ch;if(!st){ctx.moveTo(xx,y);st=true}else ctx.lineTo(xx,y)});ctx.stroke()}
let cC=[],cS=null,cO=null;
async function loadData(){
const app=document.getElementById('app');
app.innerHTML='<div class="loading"><div class="spinner"></div><p>Actualizando…</p></div>';

dash=window.EMBEDDED_DATA.dashboard;
an=window.EMBEDDED_DATA.analyst;

}else{

if(!pt.success)throw new Error('Sin datos');
const p=pt.portfolio,sig=pt.signal,ot=pt.openTrade,isL=sig.direction==='LONG',isS=sig.direction==='SHORT',dc=isL?'#22c55e':isS?'#ef4444':'#6b7280',tr=((p.equity-p.initialCapital)/p.initialCapital)*100,ip=p.totalPnl>=0,wr=p.totalTrades>0?(p.wins/p.totalTrades)*100:0,t=dash?.ticker,ind=dash?.indicators||{},a=an?.report,sc=a?.sentimentGlobal>60?'#22c55e':a?.sentimentGlobal<40?'#ef4444':'#a1a1aa';

if(ot){const ol=ot.direction==='LONG',pnl=pt.unrealizedPnl||0,pp=ot.sizeUsd>0?(pnl/ot.sizeUsd)*100:0;h+=`<div class="trade-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="display:flex;align-items:center;gap:8px"><div style="width:8px;height:8px;border-radius:50%;background:${ol?'#22c55e':'#ef4444'};animation:p 2s infinite"></div><span style="font-size:11px;font-weight:bold;color:#ccc;text-transform:uppercase">Posición Abierta</span><span class="dir-badge ${ol?'dir-long':'dir-short'}">${ol?'▲ LONG':'▼ SHORT'}</span>${ot.trailingActive?'<span style="font-size:9px;padding:2px 6px;border-radius:3px;background:rgba(234,179,8,.15);color:#eab308">⚡ TRAILING</span>':''}</div></div><div class="price-row"><span>Entry</span><span style="color:#fff">${usd(ot.entryPrice,0)}</span></div><div class="price-row"><span>Current</span><span style="color:#eab308">${usd(pt.currentPrice,0)}</span></div><div class="price-row"><span>Stop Loss</span><span style="color:#ef4444">${usd(ot.stopLoss,0)}</span></div><div class="price-row"><span>Take Profit</span><span style="color:#22c55e">${usd(ot.takeProfit1,0)}</span></div><div class="price-row"><span>Size</span><span style="color:#3b82f6">${usd(ot.sizeUsd,2)} (${(ot.sizeBtc||0).toFixed(5)} BTC)</span></div><div class="price-row"><span>PnL</span><span style="color:${pnl>=0?'#22c55e':'#ef4444'};font-weight:bold">${pnl>=0?'+':''}${fmt(pnl,2)} (${pp.toFixed(1)}%)</span></div></div>`}
else{h+=`<div class="trade-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:11px;font-weight:bold;color:#ccc;text-transform:uppercase">Señal Actual</span><span class="dir-badge ${isL?'dir-long':isS?'dir-short':'dir-neutral'}">${isL?'▲':isS?'▼':'■'} ${sig.direction}</span></div><p style="font-size:10px;color:#888">${sig.reason}</p></div>`}
h+=`<div class="section"><div class="section-title">📊 Indicadores</div><div class="stat-grid"><div class="stat"><div class="stat-label">Vol IA</div><div class="stat-value" style="color:#a855f7">${pct(ind.volIa,4)}</div></div><div class="stat"><div class="stat-label">σ</div><div class="stat-value" style="color:${ind.volStd>0.001?'#ef4444':'#22c55e'}">${pct(ind.volStd,5)}</div></div><div class="stat"><div class="stat-label">Spread 24h</div><div class="stat-value">${ind.spreadPct?.toFixed(2)||'—'}%</div></div><div class="stat"><div class="stat-label">Régimen</div><div class="stat-value" style="color:#60a5fa">${sig.regime.replace('TREND_','').replace('_',' ')}</div></div></div></div>`;
if(a){const rc=a.recommendationType==='alcista'?'#22c55e':a.recommendationType==='bajista'?'#ef4444':'#6b7280';h+=`<div class="section analyst"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-size:11px;font-weight:bold;color:#a5b4fc;text-transform:uppercase">🌐 Analista IA</span><span style="font-size:9px;padding:3px 8px;border-radius:3px;background:rgba(99,102,241,.15);color:${rc};font-weight:bold">${a.recommendationType.toUpperCase()}</span></div><div style="display:flex;justify-content:space-between;margin-bottom:8px"><div><div style="font-size:9px;color:#666;text-transform:uppercase">Sentimiento</div><div style="font-size:22px;font-weight:bold;color:${sc}">${a.sentimentGlobal}<span style="font-size:11px;color:#666">/100</span></div><div style="font-size:10px;color:#888;font-style:italic">${a.sentimentLabel}</div></div>${a.fearGreed?`<div style="text-align:right"><div style="font-size:9px;color:#666;text-transform:uppercase">Fear & Greed</div><div style="font-size:22px;font-weight:bold;color:${a.fearGreed.value>60?'#22c55e':a.fearGreed.value<40?'#ef4444':'#a1a1aa'}">${a.fearGreed.value}</div><div style="font-size:9px;color:#888;font-style:italic">${a.fearGreed.classification}</div></div>`:''}</div><div class="sent-bar"><div class="sent-fill" style="width:${a.sentimentGlobal}%;background:${a.sentimentGlobal>60?'linear-gradient(90deg,#16a34a,#22c55e)':a.sentimentGlobal<40?'linear-gradient(90deg,#dc2626,#ef4444)':'linear-gradient(90deg,#ca8a04,#eab308)'}"></div></div>`;if(a.news&&a.news.length>0){h+=`<div style="margin-top:12px"><div style="font-size:9px;color:#666;text-transform:uppercase;margin-bottom:4px">📰 Noticias</div>`;a.news.slice(0,3).forEach(n=>{const se=n.sentiment==='alcista'?'🟢':n.sentiment==='bajista'?'🔴':'⚪';const ic=n.impact==='alta'?'#ef4444':n.impact==='media'?'#eab308':'#666';h+=`<div class="news-item"><span style="color:${ic}">[${n.impact.toUpperCase()}]</span> ${se} ${n.title.slice(0,65)}${n.title.length>65?'…':''}</div>`});h+=`</div>`}const he=(a.events||[]).filter(e=>e.priority==='alta');if(he.length>0)h+=`<div style="margin-top:8px;font-size:10px;color:#888">⚠️ <b>Eventos:</b> ${he.map(e=>e.type).join(', ')}</div>`;if(a.signal&&a.signalEval){const ev=a.signalEval,ve=ev.veredicto==='OPERABLE'?'🟢':ev.veredicto==='CONDICIONAL'?'🟡':'🔴';h+=`<div style="margin-top:12px;padding-top:12px;border-top:1px solid #1a1a1a"><div style="font-size:11px;font-weight:bold;color:#ccc;text-transform:uppercase;margin-bottom:8px">🎯 Evaluación Señal IA</div><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:10px;color:#888">Señal: <b style="color:${dc}">${a.signal.direction}</b> ${a.signal.shouldTrade?'(activa)':''}</span><span style="font-size:10px;color:#888">Confianza: ${(a.signal.confidence*100).toFixed(0)}%</span></div><div style="font-size:12px;font-weight:bold;margin:8px 0">${ve} ${ev.veredicto} · Score ${ev.scoreOperable}/100</div><div style="font-size:9px;color:#666;font-style:italic;margin-bottom:8px">${ev.justificacion}</div><div style="display:flex;gap:12px;font-size:9px;color:#888"><span>Téc: <b>${ev.riesgoTecnico}</b></span><span>Vol: <b>${ev.riesgoVolatilidad}</b></span><span>Sent: <b>${ev.riesgoSentimiento}</b></span></div><div style="font-size:10px;color:#3b82f6;margin-top:8px">Size: ${ev.sizeSugerido}x · ${ev.sizeRazon}</div></div>`}h+=`</div>`}
h+=`<div class="footer">TITAN-AI v9-TS · LSTM v4 (258K params)<br>Datos embebidos actualizados cada 2 min · Bot: @yendriel_bot</div>`;
app.innerHTML=h;
setTimeout(()=>{const cc=document.getElementById('chart'),rc=document.getElementById('rsiChart');if(cc&&cC.length>0&&cS){drawChart(cc,cC,cS.ema30,cS.ema100,cO?.entryPrice||null,cO?.stopLoss||null,cO?.takeProfit1||null,cO?.direction||cS.direction)}if(rc&&cC.length>0)drawRSI(rc,cC)},50);
setTimeout(loadData,30000);
}catch(e){app.innerHTML=`<div style="text-align:center;padding:40px;color:#666"><p style="font-size:14px;color:#ef4444">⚠️ ${e.message}</p><p style="font-size:10px;color:#555;margin-top:8px">Reintentando en 10s…</p></div>`;setTimeout(loadData,10000)}
}
window.addEventListener('resize',()=>{setTimeout(()=>{const cc=document.getElementById('chart'),rc=document.getElementById('rsiChart');if(cc&&cC.length>0&&cS){drawChart(cc,cC,cS.ema30,cS.ema100,cO?.entryPrice||null,cO?.stopLoss||null,cO?.takeProfit1||null,cO?.direction||cS.direction)}if(rc&&cC.length>0)drawRSI(rc,cC)},100)});
loadData();
</script>
</body>
</html>
