<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>TITAN-AI v9-TS</title>

<style>
:root{--bg-primary:#0a0e17;--bg-secondary:#111827;--bg-card:#1a2332;--border:#2a3a5c;--text-primary:#e8edf2;--text-secondary:#8899aa;--accent-green:#00d4aa;--accent-red:#ff6b6b;--accent-gold:#f0b90b;--accent-blue:#3b82f6;--accent-purple:#a855f7}
*{margin:0;padding:0;box-sizing:border-box;font-family:ui-sans-serif,system-ui,sans-serif}
body{background:linear-gradient(145deg,#0a0e17 0%,#111827 100%);color:var(--text-primary);min-height:100vh;padding:10px}
.mono{font-family:ui-monospace,monospace}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.header-left{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 12px rgba(59,130,246,.3)}
.logo-text{font-size:18px;font-weight:800;letter-spacing:-.5px}.logo-text span{color:var(--accent-blue)}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.capital-badge{padding:6px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:700}
.capital-badge .label{color:var(--text-secondary);font-size:10px;font-weight:400}
.ia-badge{padding:6px 12px;background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.3);border-radius:8px;font-size:11px;color:var(--accent-green);font-weight:600;display:flex;align-items:center;gap:4px}
.ia-badge::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent-green);animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.4}}
.update-info{font-size:9px;color:var(--text-secondary)}
.grid-main{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:1024px){.grid-main{grid-template-columns:1fr 380px}}
.grid-bottom{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
@media(min-width:768px){.grid-bottom{grid-template-columns:repeat(4,1fr)}}
.card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden}
.card-title{font-size:10px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}
.signal-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.signal-status{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.signal-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.signal-dot.buy{background:var(--accent-green);box-shadow:0 0 12px var(--accent-green)}.signal-dot.sell{background:var(--accent-red);box-shadow:0 0 12px var(--accent-red)}.signal-dot.wait{background:var(--text-secondary)}
.signal-text{font-size:24px;font-weight:800}.signal-text.buy{color:var(--accent-green)}.signal-text.sell{color:var(--accent-red)}.signal-text.wait{color:var(--text-secondary)}
.signal-info{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.signal-info-item{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px}
.signal-info-label{font-size:9px;color:var(--text-secondary);text-transform:uppercase}
.signal-info-value{font-size:14px;font-weight:700;margin-top:2px}
.price-main{display:flex;align-items:baseline;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.price-value{font-size:28px;font-weight:800;letter-spacing:-1px}.price-value.flash{animation:fb .5s}@keyframes fb{0%{color:var(--accent-blue)}100%{color:var(--text-primary)}}
.price-change{font-size:14px;font-weight:700}.price-change.up{color:var(--accent-green)}.price-change.down{color:var(--accent-red)}
.price-range{display:flex;gap:14px;font-size:10px;color:var(--text-secondary);flex-wrap:wrap}
.indicators-row{display:flex;gap:8px;font-size:10px;color:var(--text-secondary);margin-top:8px;flex-wrap:wrap}
.indicators-row span{padding:3px 8px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px}
.indicators-row .ema30{color:var(--accent-gold)}.indicators-row .ema100{color:var(--accent-purple)}.indicators-row .rsi{color:var(--accent-blue)}
.chart-container{background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;padding:8px;margin-bottom:12px}
.chart-info{display:flex;gap:10px;font-size:9px;color:var(--text-secondary);padding:4px 8px;border-bottom:1px solid var(--border);margin-bottom:4px;flex-wrap:wrap}
canvas{display:block;width:100%}
.rsi-container{background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;padding:8px;margin-bottom:12px}
.rsi-label{font-size:9px;color:var(--accent-blue);padding:4px 8px;border-bottom:1px solid var(--border);margin-bottom:4px}
.analyst-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.analyst-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.analyst-header .title{font-size:13px;font-weight:700;flex-grow:1}
.analyst-badge{font-size:8px;padding:2px 8px;border-radius:4px;background:linear-gradient(135deg,var(--accent-gold),#d4a017);color:#000;font-weight:700}
.analyst-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(42,58,92,.5)}
.analyst-row:last-child{border:none}
.analyst-row .label{font-size:11px;color:var(--text-secondary)}
.analyst-row .value{font-size:12px;font-weight:700}
.analyst-row .value.green{color:var(--accent-green)}.analyst-row .value.red{color:var(--accent-red)}.analyst-row .value.gold{color:var(--accent-gold)}.analyst-row .value.blue{color:var(--accent-blue)}.analyst-row .value.gray{color:var(--text-secondary)}
.verdict-box{margin-top:12px;padding:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;text-align:center}
.verdict-box .verdict-text{font-size:18px;font-weight:800}
.verdict-box .verdict-text.buy{color:var(--accent-green)}.verdict-box .verdict-text.sell{color:var(--accent-red)}.verdict-box .verdict-text.wait{color:var(--text-secondary)}
.verdict-box .verdict-size{font-size:11px;color:var(--text-secondary);margin-top:4px}
.metric-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.metric-label{font-size:9px;color:var(--text-secondary);text-transform:uppercase}
.metric-value{font-size:18px;font-weight:800;margin-top:4px}
.metric-value.green{color:var(--accent-green)}.metric-value.red{color:var(--accent-red)}
.metric-sub{font-size:9px;color:var(--text-secondary);margin-top:2px}
.loading{text-align:center;padding:60px;color:var(--text-secondary)}
.spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent-blue);border-radius:50%;animation:s 1s linear infinite;margin:0 auto 16px}
@keyframes s{to{transform:rotate(360deg)}}
.footer{text-align:center;font-size:9px;color:var(--text-secondary);padding:16px 0;border-top:1px solid var(--border);margin-top:16px}
.btn-refresh{position:fixed;bottom:16px;right:16px;width:48px;height:48px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border);color:var(--accent-blue);font-size:20px;cursor:pointer;z-index:100;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4)}
</style>
</head>

<script>
const HE=typeof window.EMBEDDED_DATA!=='undefined';
function fmt(n,d=2){return n==null?'—':n.toLocaleString('en-US',{maximumFractionDigits:d,minimumFractionDigits:d})}
function usd(n,d=0){return n==null?'—':'$'+n.toLocaleString('en-US',{maximumFractionDigits:d,minimumFractionDigits:d})}

function iRSI(v){if(v==null)return'—';if(v>70)return'Sobrecomprado';if(v<30)return'Sobrevendido';return'Neutral'}
function iVol(v){if(v==null)return'—';const p=v*100;if(p<0.2)return'Clima Calmado';if(p<0.5)return'Clima Normal';return'Clima Volátil'}
function iFG(v){if(v==null)return'—';if(v<=25)return'Miedo Extremo';if(v<=45)return'Miedo';if(v<=55)return'Neutral';if(v<=75)return'Codicia';return'Euforia'}
function iRegime(r){return r?r.replace('TREND_','').replace('_',' '):'—'}
function calcEMA(v,p){const k=2/(p+1),o=[];let e=null;for(let i=0;i<v.length;i++){if(i<p-1){o.push(null);continue}if(e===null){e=v.slice(0,p).reduce((a,b)=>a+b,0)/p}else{e=v[i]*k+e*(1-k)}o.push(e)}return o}
function calcRSI(c,p){const o=[null];let ag=0,al=0;for(let i=1;i<c.length;i++){const ch=c[i]-c[i-1],g=ch>0?ch:0,l=ch<0?Math.abs(ch):0;if(i<=p){ag+=g;al+=l;if(i===p){ag/=p;al/=p;o.push(al===0?100:100-100/(1+ag/al))}else o.push(null)}else{ag=(ag*(p-1)+g)/p;al=(al*(p-1)+l)/p;o.push(al===0?100:100-100/(1+ag/al))}}return o}
function drawChart(cv,c,e30v,e100v,en,sl,tp,dir){const ctx=cv.getContext('2d'),dpr=window.devicePixelRatio||1,W=cv.clientWidth,H=cv.clientHeight;cv.width=W*dpr;cv.height=H*dpr;ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);if(!c||!c.length)return;const pL=8,pR=60,pT=8,pB=20,cw=W-pL-pR,ch=H-pT-pB,vis=c.slice(-50),cW=cw/vis.length,bW=Math.max(2,cW*.7);let mn=Infinity,mx=-Infinity;vis.forEach(x=>{mn=Math.min(mn,x.low);mx=Math.max(mx,x.high)});if(en){mn=Math.min(mn,en);mx=Math.max(mx,en)}if(sl){mn=Math.min(mn,sl);mx=Math.max(mx,sl)}if(tp){mn=Math.min(mn,tp);mx=Math.max(mx,tp)}const rg=mx-mn;if(rg<.001){mn-=1;mx+=1}const py=p=>pT+ch-((p-mn)/(mx-mn))*ch;ctx.strokeStyle='#1a2332';ctx.lineWidth=1;ctx.font='9px monospace';ctx.fillStyle='#2a3a5c';for(let i=0;i<=5;i++){const y=pT+(ch/5)*i;ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(pL+cw,y);ctx.stroke();ctx.fillText('$'+(mx-(rg/5)*i).toFixed(0),pL+cw+4,y+3)}ctx.fillStyle='#2a3a5c';for(let i=0;i<vis.length;i+=Math.ceil(vis.length/6)){const x=pL+i*cW+cW/2;const d=new Date(vis[i].timestamp);ctx.fillText(d.toLocaleDateString('es',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}),x-30,pT+ch+14)}vis.forEach((x,i)=>{const xx=pL+i*cW+cW/2,up=x.close>=x.open,col=up?'#00d4aa':'#ff6b6b';ctx.strokeStyle=col;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(xx,py(x.high));ctx.lineTo(xx,py(x.low));ctx.stroke();const yO=py(x.open),yC=py(x.close),bh=Math.max(1,Math.abs(yC-yO));ctx.fillStyle=col;ctx.fillRect(xx-bW/2,Math.min(yO,yC),bW,bh)});if(e30v!=null){ctx.strokeStyle='#f0b90b';ctx.lineWidth=1.5;ctx.beginPath();const e=calcEMA(c.map(x=>x.close),30);let st=false;vis.forEach((x,i)=>{const v=e[c.length-50+i];if(v==null)return;const xx=pL+i*cW+cW/2,y=py(v);if(!st){ctx.moveTo(xx,y);st=true}else ctx.lineTo(xx,y)});ctx.stroke()}if(e100v!=null){ctx.strokeStyle='#a855f7';ctx.lineWidth=1.5;ctx.beginPath();const e=calcEMA(c.map(x=>x.close),100);let st=false;vis.forEach((x,i)=>{const v=e[c.length-50+i];if(v==null)return;const xx=pL+i*cW+cW/2,y=py(v);if(!st){ctx.moveTo(xx,y);st=true}else ctx.lineTo(xx,y)});ctx.stroke()}if(en&&en>0){const y=py(en),dc=dir==='LONG'?'#00d4aa':dir==='SHORT'?'#ff6b6b':'#8899aa';ctx.strokeStyle=dc;ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(pL+cw,y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=dc;ctx.font='bold 9px monospace';ctx.fillText('ENTRY '+usd(en,0),pL+cw+4,y-4)}if(sl&&sl>0){const y=py(sl);ctx.strokeStyle='#ff6b6b';ctx.lineWidth=1;ctx.setLineDash([3,2]);ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(pL+cw,y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#ff6b6b';ctx.font='8px monospace';ctx.fillText('SL',pL+cw+4,y-3)}if(tp&&tp>0){const y=py(tp);ctx.strokeStyle='#00d4aa';ctx.lineWidth=1;ctx.setLineDash([3,2]);ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(pL+cw,y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#00d4aa';ctx.font='8px monospace';ctx.fillText('TP',pL+cw+4,y-3)}}
function drawRSI(cv,c){const ctx=cv.getContext('2d'),dpr=window.devicePixelRatio||1,W=cv.clientWidth,H=cv.clientHeight;cv.width=W*dpr;cv.height=H*dpr;ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);if(!c||!c.length)return;const pL=8,pR=60,pT=4,pB=4,cw=W-pL-pR,ch=H-pT-pB,vis=c.slice(-50),cW=cw/vis.length,r=calcRSI(c.map(x=>x.close),14);[30,50,70].forEach(v=>{const y=pT+ch-(v/100)*ch;ctx.strokeStyle=v===50?'#1a2332':v===70?'rgba(255,107,107,.15)':'rgba(0,212,170,.15)';ctx.setLineDash(v===50?[]:[2,3]);ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(pL+cw,y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#2a3a5c';ctx.font='8px monospace';ctx.fillText(v.toString(),pL+cw+4,y+3)});ctx.strokeStyle='#3b82f6';ctx.lineWidth=1.5;ctx.beginPath();let st=false;vis.forEach((x,i)=>{const v=r[c.length-50+i];if(v==null)return;const xx=pL+i*cW+cW/2,y=pT+ch-(v/100)*ch;if(!st){ctx.moveTo(xx,y);st=true}else ctx.lineTo(xx,y)});ctx.stroke()}
let cC=[],cS=null,cO=null;
async function loadData(){const app=document.getElementById('app');app.innerHTML='<div class="loading"><div class="spinner"></div><p>Actualizando…</p></div>';try{let pt,dash,an,ts;if(HE){pt=window.EMBEDDED_DATA.paperTrading;dash=window.EMBEDDED_DATA.dashboard;an=window.EMBEDDED_DATA.analyst;ts={updated:window.EMBEDDED_DATA.timestamp}}else{const B=window.location.origin+window.location.pathname.replace(/[^/]*$/,'');const[r1,r2,r3,r4]=await Promise.all([fetch(B+'data/paper-trading.json?v='+Date.now(),{cache:'no-store'}),fetch(B+'data/dashboard.json?v='+Date.now(),{cache:'no-store'}),fetch(B+'data/analyst.json?v='+Date.now(),{cache:'no-store'}),fetch(B+'data/timestamp.json?v='+Date.now(),{cache:'no-store'})]);pt=await r1.json();dash=await r2.json();an=await r3.json();ts=await r4.json()}if(!pt.success)throw new Error('Sin datos');const p=pt.portfolio,sig=pt.signal,ot=pt.openTrade,isL=sig.direction==='LONG',isS=sig.direction==='SHORT',dc=isL?'#00d4aa':isS?'#ff6b6b':'#8899aa',tr=((p.equity-p.initialCapital)/p.initialCapital)*100,ip=p.totalPnl>=0,wr=p.totalTrades>0?(p.wins/p.totalTrades)*100:0,t=dash?.ticker,ind=dash?.indicators||{},a=an?.report,ev=a?.signalEval;cC=dash?.candles||[];cS=sig;cO=ot;let accion='ESPERAR',accCls='wait',accDot='wait';if(ev&&ev.veredicto==='APROBAR'){accion=isL?'COMPRAR':'VENDER';accCls=isL?'buy':'sell';accDot=isL?'buy':'sell'}else if(ev&&ev.veredicto==='OPERAR_50'){accion='OPERAR 50%'}let h='';h+='<div class="header"><div class="header-left"><div class="logo-icon">⚡</div><div><div class="logo-text">TITAN<span>-AI</span></div><div style="font-size:9px;color:var(--text-secondary)">v9-TS · Paper Trading</div></div></div><div class="header-right"><div class="capital-badge"><div class="label">Capital</div>'+usd(p.equity,2)+'</div>'+(pt.iaActive?'<div class="ia-badge">IA v4 ACTIVA</div>':'<div class="ia-badge" style="background:rgba(240,185,11,.1);color:var(--accent-gold);border-color:rgba(240,185,11,.3)">Fallback</div>')+'<div class="update-info">'+(t direction==='LONG',pnl=pt.unrealizedPnl||0,pp=ot.sizeUsd>0?(pnl/ot.sizeUsd)*100:0;h+='<div class="card" style="margin-bottom:12px;border-color:'+(ol?'rgba(0,212,170,.3)':'rgba(255,107,107,.3)')+'"><div class="card-title">🎯 Posición · '+(ol?'LONG 🟢':'SHORT 🔴')+(ot.trailingActive?' · ⚡ TRAILING':'')+(ot.partialClosed?' · ✅ TP1':'')+'</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="signal-info-item"><div class="signal-info-label">Entry</div><div class="signal-info-value">'+usd(ot.entryPrice,0)+'</div></div><div class="signal-info-item"><div class="signal-info-label">Current</div><div class="signal-info-value" style="color:var(--accent-gold)" id="currentPriceDisplay">'+usd(pt.currentPrice,0)+'</div></div><div class="signal-info-item"><div class="signal-info-label">Stop Loss</div><div class="signal-info-value" style="color:var(--accent-red)">'+usd(ot.stopLoss,0)+'</div></div><div class="signal-info-item"><div class="signal-info-label">Take Profit</div><div class="signal-info-value" style="color:var(--accent-green)">'+usd(ot.takeProfit1,0)+'</div></div><div class="signal-info-item"><div class="signal-info-label">Size</div><div class="signal-info-value">'+usd(ot.sizeUsd,2)+'</div></div><div class="signal-info-item"><div class="signal-info-label">PnL</div><div class="signal-info-value" style="color:'+(pnl>=0?'var(--accent-green)':'var(--accent-red)')+'">'+(pnl>=0?'+':'')+fmt(pnl,2)+' ('+pp.toFixed(1)+'%)</div></div></div></div>'}else{h+='<div class="card" style="margin-bottom:12px"><div class="card-title">📡 Señal Actual</div><div style="display:flex;align-items:center;justify-content:space-between"><span style="font-size:14px;font-weight:700;color:'+dc+'">'+(isL?'🟢 LONG':isS?'🔴 SHORT':'⚪ NEUTRAL')+'</span><span style="font-size:11px;color:var(--text-secondary)">'+sig.reason+'</span></div></div>'}h+='</div><div>';if(a){const fg=a.fearGreed,fgVal=fg?fg.value:50,sentCls=a.sentimentGlobal>=65?'green':a.sentimentGlobal<=35?'red':'gray',fgCls=fgVal<=45?'red':fgVal>=75?'green':'gray',volPct=sig.volIa*100,volCls=volPct<0.2?'green':volPct>0.5?'red':'gold',he=(a.events||[]).filter(e=>e.priority==='alta');h+='<div class="analyst-card"><div class="analyst-header"><span style="font-size:18px">🧠</span><span class="title">Analista IA</span><span class="analyst-badge">PREMIUM</span></div>';h+='<div class="analyst-row"><span class="label">Sentimiento</span><span class="value '+sentCls+'">'+a.sentimentGlobal+'/100 · '+a.sentimentLabel+'</span></div>';h+='<div class="analyst-row"><span class="label">Fear & Greed</span><span class="value '+fgCls+'">'+(fg?fg.value:'—')+' · '+iFG(fg?fg.value:null)+'</span></div>';h+='<div class="analyst-row"><span class="label">Volatilidad</span><span class="value '+volCls+'">'+volPct.toFixed(3)+'% · '+iVol(sig.volIa)+'</span></div>';h+='<div class="analyst-row"><span class="label">RSI</span><span class="value '+(sig.rsi>70?'red':sig.rsi<30?'green':'gray')+'">'+sig.rsi.toFixed(0)+' · '+iRSI(sig.rsi)+'</span></div>';if(he.length>0)h+='<div class="analyst-row"><span class="label">Evento</span><span class="value gold">⚠️ '+he.map(e=>e.type).join(', ')+'</span></div>';if(ev){const vCls=ev.veredicto==='APROBAR'?'buy':ev.veredicto==='OPERAR_50'?'wait':'wait',vText=ev.veredicto==='APROBAR'?'APROBAR':ev.veredicto==='OPERAR_50'?'OPERAR 50%':'ESPERAR';h+='<div class="verdict-box"><div class="verdict-text '+vCls+'">'+vText+'</div><div class="verdict-size">Score: '+ev.scoreOperable+'/100 · Size: '+ev.sizeSugerido+'x</div><div style="font-size:10px;color:var(--text-secondary);margin-top:6px">'+ev.justificacion+'</div></div>'}h+='</div>';if(a.news&&a.news.length>0){h+='<div class="card" style="margin-bottom:12px"><div class="card-title">📰 Noticias</div>';a.news.slice(0,3).forEach(n=>{const se=n.sentiment==='alcista'?'🟢':n.sentiment==='bajista'?'🔴':'⚪';const ic=n.impact==='alta'?'var(--accent-red)':n.impact==='media'?'var(--accent-gold)':'var(--text-secondary)';h+='<div style="font-size:10px;padding:5px 0 let livePrice=null,priceInterval=null;
async function fetchLivePrice(){try{const[pr,t24]=await Promise.all([fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT',{cache:'no-store'}),fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT',{cache:'no-store'})]);const pd=await pr.json(),td=await t24.json();livePrice=parseFloat(pd.price);const ch=parseFloat(td.priceChangePercent),hi=parseFloat(td.highPrice),lo=parseFloat(td.lowPrice),qv=parseFloat(td.quoteVolume);const pv=document.getElementById('livePrice'),pc=document.getElementById('liveChange'),ps=document.getElementById('liveStats');if(pv){pv.textContent=usd(livePrice,0);pv.classList.remove('flash');pv.offsetHeight;pv.classList.add('flash')}if(pc){const iu=ch>=0;pc.textContent=(iu?'▲':'▼')+' '+ch.toFixed(2)+'%';pc.className='price-change '+(iu?'up':'down')}if(ps){ps.innerHTML='<span>H: '+usd(hi,0)+'</span><span>L: '+usd(lo,0)+'</span><span>Vol: $'+(qv/1e9).toFixed(2)+'B</span>'}if(cC.length>0){const last=cC[cC.length-1];last.close=livePrice;last.high=Math.max(last.high,livePrice);last.low=Math.min(last.low,livePrice);const cc=document.getElementById('chart');if(cc&&cS)drawChart(cc,cC,cS.ema30,cS.ema100,cO?.entryPrice||null,cO?.stopLoss||null,cO?.takeProfit1||null,cO?.direction||cS.direction);const rc=document.getElementById('rsiChart');if(rc)drawRSI(rc,cC)}const cp=document.getElementById('currentPriceDisplay');if(cp)cp.textContent=usd(livePrice,0)}catch(e){}}
function startLivePrice(){fetchLivePrice();if(priceInterval)clearInterval(priceInterval);priceInterval=setInterval(fetchLivePrice,5000)}
window.addEventListener('resize',()=>{setTimeout(()=>{const cc=document.getElementById('chart'),rc=document.getElementById('rsiChart');if(cc&&cC.length>0&&cS)drawChart(cc,cC,cS.ema30,cS.ema100,cO?.entryPrice||null,cO?.stopLoss||null,cO?.takeProfit1||null,cO?.direction||cS.direction);if(rc&&cC.length>0)drawRSI(rc,cC)},100)});
loadData();startLivePrice();
