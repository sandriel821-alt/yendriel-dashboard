.price-range{display:flex;gap:12px;font-size:10px;color:var(--text-secondary);flex-wrap:wrap;font-variant-numeric:tabular-nums;font-weight:500;font-family:var(--mono);margin-bottom:6px}
.price-range span{display:flex;align-items:center;gap:4px}
.price-range span::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--text-muted);flex-shrink:0}
.bidask-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.bidask-item{padding:5px 8px;background:rgba(1,4,9,0.5);border:1px solid var(--border);border-radius:var(--radius-xs)}
.bidask-label{font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono);font-weight:700}
.bidask-val{font-size:11px;font-weight:700;font-family:var(--mono);font-variant-numeric:tabular-nums;margin-top:1px}
.bidask-val.bid{color:var(--red-bright)}
.bidask-val.ask{color:var(--emerald-bright)}
.indicators-row{display:flex;gap:4px;font-size:9px;color:var(--text-secondary);margin-top:8px;flex-wrap:wrap}
.indicators-row span{padding:3px 7px;background:rgba(1,4,9,0.5);border:1px solid var(--border);border-radius:var(--radius-xs);font-variant-numeric:tabular-nums;font-weight:600;letter-spacing:0.3px;font-family:var(--mono)}

/* === CHART === */
.chart-container,.rsi-container{
  background:linear-gradient(180deg,rgba(13,17,23,0.85) 0%,rgba(6,8,16,0.85) 100%);
  backdrop-filter:blur(12px) saturate(140%);
  -webkit-backdrop-filter:blur(12px) saturate(140%);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:8px;margin-bottom:8px;
  box-shadow:var(--shadow-card);
  overflow:hidden;
}
.chart-info{display:flex;gap:10px;font-size:9px;color:var(--text-secondary);padding:4px 8px;border-bottom:1px solid var(--border);margin-bottom:4px;flex-wrap:wrap;font-variant-numeric:tabular-nums;font-weight:600;letter-spacing:0.4px;font-family:var(--mono);text-transform:uppercase}
.chart-info span{display:flex;align-items:center;gap:4px}
canvas{display:block;width:100%}
.rsi-label{font-size:9px;color:var(--blue);padding:4px 8px;border-bottom:1px solid var(--border);margin-bottom:4px;font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:var(--mono)}

/* === POSITION PROGRESS BAR === */
.pos-progress{margin-top:8px;padding:8px 10px;background:rgba(1,4,9,0.5);border:1px solid var(--border);border-radius:var(--radius-sm)}
.pos-progress-label{display:flex;justify-content:space-between;font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;font-weight:700;font-family:var(--mono);margin-bottom:5px}
.pos-progress-bar{position:relative;height:10px;background:rgba(48,54,61,0.6);border-radius:2px;overflow:visible}
.pos-progress-fill{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,var(--red),var(--gold),var(--emerald));border-radius:2px;transition:width 0.4s ease}
.pos-progress-marker{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--cyan);box-shadow:0 0 8px var(--cyan);transform:translateX(-50%);z-index:2}
.pos-progress-ends{display:flex;justify-content:space-between;font-size:8px;color:var(--text-muted);font-family:var(--mono);margin-top:4px;font-variant-numeric:tabular-nums}
/* R-level markers on progress bar */
.pos-r-mark{position:absolute;top:0;bottom:0;width:1px;background:rgba(120,140,180,0.2);z-index:1}
.pos-r-label{position:absolute;top:-12px;font-size:7px;color:var(--text-muted);font-family:var(--mono);transform:translateX(-50%);white-space:nowrap}
/* Risk calculator */
.risk-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px;padding:8px;background:rgba(1,4,9,0.5);border:1px solid var(--border);border-radius:6px}
.risk-item{text-align:center}
.risk-item .risk-lbl{font-size:7px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;font-weight:700;font-family:var(--mono)}
.risk-item .risk-val{font-size:13px;font-weight:800;font-family:var(--mono);margin-top:2px;font-variant-numeric:tabular-nums}
.risk-item .risk-sub{font-size:8px;color:var(--text-muted);margin-top:1px;font-family:var(--mono)}
/* Liquidation warning */
.liq-warn{margin-top:6px;padding:6px 10px;background:rgba(248,81,73,0.08);border:1px solid rgba(248,81,73,0.3);border-radius:6px;display:flex;justify-content:space-between;align-items:center;font-size:10px;font-family:var(--mono)}
.liq-warn .liq-lbl{color:var(--red-bright);font-weight:700;letter-spacing:0.5px;text-transform:uppercase;font-size:8px}
.liq-warn .liq-val{color:var(--red-bright);font-weight:800;font-variant-numeric:tabular-nums}
.liq-warn .liq-dist{color:var(--text-muted);font-size:9px}
/* Trade timer */
.trade-timer{margin-top:6px;padding:6px 10px;background:rgba(1,4,9,0.5);border:1px solid var(--border);border-radius:6px;display:flex;justify-content:space-between;align-items:center;font-size:10px;font-family:var(--mono)}
.trade-timer .timer-lbl{color:var(--text-muted);font-weight:700;letter-spacing:0.5px;text-transform:uppercase;font-size:8px}
.trade-timer .timer-val{color:var(--cyan-bright);font-weight:800;font-variant-numeric:tabular-nums}
/* Near SL/TP alert */
.pos-alert{padding:4px 10px;border-radius:4px;font-size:9px;font-weight:700;font-family:var(--mono);text-align:center;margin-top:6px;animation:pulse-alert 1.5s infinite}
.pos-alert.sl{background:rgba(248,81,73,0.15);border:1px solid rgba(248,81,73,0.4);color:var(--red-bright)}
.pos-alert.tp{background:rgba(63,185,80,0.15);border:1px solid rgba(63,185,80,0.4);color:var(--emerald-bright)}
@keyframes pulse-alert{0%,100%{opacity:1}50%{opacity:0.6}}
/* Funding countdown */
.funding-box{margin-top:6px;padding:6px 10px;background:rgba(1,4,9,0.5);border:1px solid var(--border);border-radius:6px;display:flex;justify-content:space-between;align-items:center;font-size:10px;font-family:var(--mono)}
.funding-box .fund-lbl{color:var(--text-muted);font-weight:700;letter-spacing:0.5px;text-transform:uppercase;font-size:8px}
.funding-box .fund-time{color:var(--gold-bright);font-weight:700;font-variant-numeric:tabular-nums}
.funding-box .fund-cost{color:var(--text-secondary);font-weight:600;font-variant-numeric:tabular-nums}

/* === ANALYST === */
.analyst-card{
  background:linear-gradient(135deg,rgba(22,27,34,0.85) 0%,rgba(13,17,23,0.85) 100%);
  backdrop-filter:blur(12px) saturate(140%);
  -webkit-backdrop-filter:blur(12px) saturate(140%);
  border:1px solid var(--border-gold);
  border-radius:var(--radius);
  padding:12px;margin-bottom:8px;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow-card);
}
.analyst-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),transparent 80%);
}
.analyst-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.analyst-header .title{font-size:10px;font-weight:700;flex-grow:1;letter-spacing:1.8px;text-transform:uppercase;font-family:var(--mono);color:var(--text-secondary)}
.analyst-badge{
  font-size:8px;padding:3px 7px;border-radius:var(--radius-xs);
  background:linear-gradient(135deg,var(--gold),#a87a1a);color:#060810;font-weight:800;letter-spacing:1.2px;
  box-shadow:0 1px 4px rgba(210,153,34,0.3);
  font-family:var(--mono);
  text-transform:uppercase;
}
.sentiment-gauge{display:flex;gap:10px;align-items:center;margin-bottom:10px;padding:8px;background:rgba(1,4,9,0.5);border:1px solid var(--border);border-radius:var(--radius-sm)}
.sentiment-gauge-label{font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px;font-family:var(--mono);font-weight:700}
.sentiment-gauge-val{font-size:12px;font-weight:700;margin-top:2px;font-family:var(--mono);letter-spacing:0.3px}
.analyst-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(48,54,61,0.4)}
.analyst-row:last-of-type{border:none}
.analyst-row .label{font-size:10px;color:var(--text-secondary);font-weight:500;letter-spacing:0.4px}
.analyst-row .value{font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;font-family:var(--mono)}
.analyst-row .value.green{color:var(--emerald-bright)}
.analyst-row .value.red{color:var(--red-bright)}
.analyst-row .value.gold{color:var(--gold-bright)}
.analyst-row .value.blue{color:var(--blue)}
.analyst-row .value.gray{color:var(--text-secondary)}
.verdict-box{margin-top:10px;padding:12px;background:linear-gradient(180deg,rgba(1,4,9,0.6),rgba(1,4,9,0.3));border:1px solid var(--border);border-radius:var(--radius-sm);text-align:center;position:relative;overflow:hidden}
.verdict-box .verdict-text{font-size:18px;font-weight:900;letter-spacing:2px;font-family:var(--mono)}
.verdict-box .verdict-text.buy{color:var(--emerald-bright);text-shadow:0 0 14px var(--emerald-glow)}
.verdict-box .verdict-text.sell{color:var(--red-bright);text-shadow:0 0 14px var(--red-glow)}
.verdict-box .verdict-text.wait{color:var(--text-secondary)}
.verdict-box .verdict-size{font-size:10px;color:var(--text-secondary);margin-top:4px;font-variant-numeric:tabular-nums;font-weight:600;letter-spacing:0.3px;font-family:var(--mono)}
.verdict-just{font-size:9px;color:var(--text-secondary);margin-top:6px;line-height:1.5;font-family:var(--mono)}

/* === METRICS === */
.metric-card{
  background:linear-gradient(180deg,rgba(22,27,34,0.7) 0%,rgba(13,17,23,0.7) 100%);
  backdrop-filter:blur(12px) saturate(140%);
  -webkit-backdrop-filter:blur(12px) saturate(140%);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:10px 12px;text-align:left;
  transition:border-color 0.2s,box-shadow 0.2s;
  box-shadow:var(--shadow-card);
  position:relative;overflow:hidden;
}
.metric-card:hover{border-color:var(--border-strong);box-shadow:var(--shadow-card),var(--shadow-glow)}
.metric-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--emerald),transparent)}
.metric-card.red::before{background:linear-gradient(180deg,var(--red),transparent)}
.metric-card.gold::before{background:linear-gradient(180deg,var(--gold),transparent)}
.metric-card.blue::before{background:linear-gradient(180deg,var(--blue),transparent)}
.metric-label{font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;font-family:var(--mono)}
.metric-value{font-size:20px;font-weight:700;margin-top:3px;font-variant-numeric:tabular-nums;letter-spacing:-0.5px;font-family:var(--mono);line-height:1.1}
.metric-value.green{color:var(--emerald-bright)}
.metric-value.red{color:var(--red-bright)}
.metric-sub{font-size:9px;color:var(--text-secondary);margin-top:2px;font-variant-numeric:tabular-nums;font-weight:600;font-family:var(--mono)}

/* === MISC === */
.waiting-signal{padding:10px;background:linear-gradient(180deg,rgba(210,153,34,0.10),rgba(210,153,34,0.02));border:1px solid var(--border-gold);border-radius:var(--radius-sm);text-align:center;margin-top:8px;font-size:11px;color:var(--gold-bright);font-weight:500;line-height:1.5}
.loading{text-align:center;padding:80px 20px;color:var(--text-secondary)}
.loading p{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;font-family:var(--mono)}
.spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--emerald);border-right-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;font-size:9px;color:var(--text-muted);padding:14px 0 4px;border-top:1px solid var(--border);margin-top:12px;line-height:1.8;font-weight:500;font-family:var(--mono);letter-spacing:0.4px}
.footer span{color:var(--text-secondary);font-weight:600}
.footer-status{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-bottom:8px;font-size:8px;letter-spacing:0.8px;font-family:var(--mono);text-transform:uppercase}
.footer-status span{display:inline-flex;align-items:center;gap:4px;color:var(--text-secondary)}
/* PROMETHEUS Status Panel */
.prom-status{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:12px}
.prom-status-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-secondary);margin-bottom:10px;font-family:var(--mono);display:flex;align-items:center;gap:8px}
.prom-layers{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.prom-layer{background:var(--bg-elev);border:1px solid var(--border);border-radius:6px;padding:8px 10px;display:flex;flex-direction:column;gap:2px}
.prom-layer-name{font-size:9px;font-weight:600;color:var(--text-primary);font-family:var(--mono);letter-spacing:0.5px}
.prom-layer-status{font-size:8px;color:var(--text-secondary);font-family:var(--mono);display:flex;align-items:center;gap:4px}
.prom-layer-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.prom-layer-dot.ok{background:var(--emerald);box-shadow:0 0 6px var(--emerald)}
.prom-layer-dot.warn{background:var(--gold);box-shadow:0 0 6px var(--gold)}
.prom-layer-dot.err{background:var(--red);box-shadow:0 0 6px var(--red)}
.prom-layer-detail{font-size:8px;color:var(--text-muted);font-family:var(--mono)}
.prom-commands{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.prom-cmd{font-size:8px;font-family:var(--mono);color:var(--cyan);background:var(--bg-elev);padding:3px 8px;border-radius:4px;border:1px solid var(--border)}
/* Multi-Asset Radar Table */
.radar-table{width:100%;border-collapse:collapse;margin-top:8px;font-family:var(--mono);font-size:9px}
.radar-table th{text-align:left;padding:6px 8px;color:var(--text-secondary);font-weight:600;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:0.5px;font-size:8px}
.radar-table td{padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text-primary)}
.radar-table tr:hover{background:var(--bg-elev)}
.radar-score{font-weight:700;font-size:10px}
.radar-score.aplus{color:var(--emerald-bright);text-shadow:0 0 6px var(--emerald)}
.radar-score.asetup{color:var(--gold)}
.radar-score.low{color:var(--text-muted)}
.btn-refresh{
  position:fixed;bottom:16px;right:16px;width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,var(--bg-card-solid),var(--bg-elev));
  border:1px solid var(--border-emerald);color:var(--emerald-bright);font-size:18px;cursor:pointer;z-index:100;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,0.6),0 0 12px rgba(63,185,80,0.2);
  transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.btn-refresh:hover{transform:translateY(-2px) rotate(180deg);box-shadow:0 8px 24px rgba(0,0,0,0.7),0 0 18px rgba(63,185,80,0.4);border-color:var(--emerald)}
.btn-refresh:active{transform:translateY(0) rotate(180deg) scale(0.95)}

/* === INSTITUTIONAL === */
.inst-card{
  background:linear-gradient(135deg,rgba(22,27,34,0.85) 0%,rgba(188,140,255,0.05) 100%);
  backdrop-filter:blur(12px) saturate(140%);
  -webkit-backdrop-filter:blur(12px) saturate(140%);
  border:1px solid var(--border-purple);
  border-radius:var(--radius);
  padding:12px;margin-bottom:8px;
  box-shadow:var(--shadow-card);
  position:relative;overflow:hidden;
}
.inst-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),var(--cyan),transparent 80%)}
.inst-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.inst-item{padding:8px 10px;background:rgba(1,4,9,0.5);border:1px solid var(--border);border-radius:var(--radius-sm);transition:border-color 0.2s;position:relative}
.inst-item:hover{border-color:var(--border-strong)}
.inst-item .inst-label{font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;font-weight:700;font-family:var(--mono)}
.inst-item .inst-val{font-size:13px;font-weight:700;margin-top:3px;font-variant-numeric:tabular-nums;letter-spacing:-0.2px;font-family:var(--mono);color:var(--text-primary)}
.inst-item .inst-hint{font-size:9px;color:var(--text-muted);margin-top:4px;line-height:1.3;font-weight:500;letter-spacing:0.1px}
.inst-item .inst-hint.bull{color:rgba(63,185,80,0.75)}
.inst-item .inst-hint.bear{color:rgba(248,81,73,0.75)}
.inst-item .inst-hint.neutral{color:var(--text-muted)}
.inst-signal{margin-top:8px;padding:8px 10px;background:rgba(1,4,9,0.6);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:10px;font-family:var(--mono)}
.inst-legend{margin-top:8px;padding:8px 10px;background:rgba(1,4,9,0.4);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:9px;color:var(--text-muted);line-height:1.5;letter-spacing:0.1px}
.inst-legend strong{color:var(--text-secondary);font-weight:600}

/* === NEWS === */
.news-item{font-size:10px;padding:6px 0;border-bottom:1px solid rgba(48,54,61,0.4);display:flex;gap:6px;align-items:flex-start;line-height:1.5;font-family:var(--font)}
.news-item:last-child{border:none}
.news-tag{font-weight:800;flex-shrink:0;font-size:8px;padding:2px 5px;border-radius:2px;letter-spacing:0.8px;font-family:var(--mono)}

/* === IA LOG === */
.ia-log-box{margin-top:8px;padding:8px 10px;background:rgba(1,4,9,0.6);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:10px;color:var(--text-secondary);font-family:var(--mono);line-height:1.5}
.ia-log-box .ia-log-title{color:var(--emerald-bright);margin-bottom:4px;font-weight:700;letter-spacing:0.8px;font-size:8px;text-transform:uppercase;font-family:var(--mono)}

/* === FOLD WEIGHT MINI BARS === */
.fold-bars{display:flex;gap:4px;margin-top:6px;height:5px}
.fold-bar{flex:1;background:rgba(48,54,61,0.6);border-radius:1px;overflow:hidden}
.fold-bar-fill{height:100%;border-radius:1px;transition:width 0.4s ease}

/* Responsive */
@media(max-width:640px){
  body{padding:6px;font-size:11px}
  .header{padding:8px 10px}
  .card{padding:10px}
  .signal-card{padding:10px}
  .analyst-card{padding:10px}
  .inst-card{padding:10px}
  .price-value{font-size:22px}
  .signal-text{font-size:18px}
  .metric-value{font-size:16px}
  .logo-icon{width:30px;height:30px;font-size:14px}
  .logo-text{font-size:14px}
  .capital-badge{font-size:11px;padding:4px 8px}
  .status-bar{height:22px}
  .status-item{padding:0 8px;font-size:9px}
  .footer-status{gap:10px}
}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spinner"></div><p>Inicializando Pro Terminal</p></div></div>
<button class="btn-refresh" onclick="loadData()" aria-label="Actualizar">↻</button>
<script>
const HE=typeof window.EMBEDDED_DATA!=='undefined';
const TZ='America/Lima';
let pt,dash,an,ts,B,cP;
let cC=[],cS=null,cO=null;
let wsPrice=null,wsKline=null,prevPrice=null;

function nowLima(){return new Date().toLocaleString('es-PE',{timeZone:TZ,hour:'2-digit',minute:'2-digit',second:'2-digit'})}
function fmt(n,d=2){return n==null?'—':n.toLocaleString('en-US',{maximumFractionDigits:d,minimumFractionDigits:d})}
function usd(n,d=0){return n==null?'—':'$'+n.toLocaleString('en-US',{maximumFractionDigits:d,minimumFractionDigits:d})}
function pct(n,d=2){return n==null?'—':(n*100).toFixed(d)+'%'}
function iRSI(v){if(v==null)return'—';if(v>70)return'Sobrecomprado';if(v<30)return'Sobrevendido';return'Neutral'}
function iVol(v){if(v==null)return'—';const p=v*100;if(p<0.2)return'Clima Calmado';if(p<0.5)return'Clima Normal';return'Clima Volátil'}
function iFG(v){if(v==null)return'—';if(v<=25)return'Miedo Extremo';if(v<=45)return'Miedo';if(v<=55)return'Neutral';if(v<=75)return'Codicia';return'Euforia'}
function iRegime(r){return r?r.replace('TREND_','').replace('_',' '):'—'}
function calcEMA(v,p){const k=2/(p+1),o=[];let e=null;for(let i=0;i<v.length;i++){if(i<p-1){o.push(null);continue}if(e===null){e=v.slice(0,p).reduce((a,b)=>a+b,0)/p}else{e=v[i]*k+e*(1-k)}o.push(e)}return o}
function calcRSI(c,p){const o=[null];let ag=0,al=0;for(let i=1;i<c.length;i++){const ch=c[i]-c[i-1],g=ch>0?ch:0,l=ch<0?Math.abs(ch):0;if(i<=p){ag+=g;al+=l;if(i===p){ag/=p;al/=p;o.push(al===0?100:100-100/(1+ag/al))}else o.push(null)}else{ag=(ag*(p-1)+g)/p;al=(al*(p-1)+l)/p;o.push(al===0?100:100-100/(1+ag/al))}}return o}

// === DRAW CHART (premium, con fixes de bugs) ===
function drawChart(cv,c,e30v,e100v,en,sl,tp,dir){
  const ctx=cv.getContext('2d'),dpr=window.devicePixelRatio||1,
    W=cv.clientWidth,H=cv.clientHeight;
  cv.width=W*dpr;cv.height=H*dpr;
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  if(!c||!c.length)return;

  const pL=10,pR=74,pT=12,pB=30;
  const cw=W-pL-pR,ch=H-pT-pB;
  const vis=c.slice(-100);
  const cW=cw/vis.length;
  const bW=Math.max(2,Math.min(11,cW*0.62));

  // Pre-calcular EMAs (una sola vez)
  const e30Arr = e30v!=null ? calcEMA(c.map(x=>x.close),30) : null;
  const e100Arr = e100v!=null ? calcEMA(c.map(x=>x.close),100) : null;

  // Min/max incluyendo todo
  let mn=Infinity,mx=-Infinity;
  vis.forEach(x=>{if(x.low<mn)mn=x.low;if(x.high>mx)mx=x.high});
  if(e30Arr){for(let i=0;i<vis.length;i++){const v=e30Arr[c.length-vis.length+i];if(v!=null){if(v<mn)mn=v;if(v>mx)mx=v}}}
  if(e100Arr){for(let i=0;i<vis.length;i++){const v=e100Arr[c.length-vis.length+i];if(v!=null){if(v<mn)mn=v;if(v>mx)mx=v}}}
  if(en){if(en<mn)mn=en;if(en>mx)mx=en}
  if(sl){if(sl<mn)mn=sl;if(sl>mx)mx=sl}
  if(tp){if(tp<mn)mn=tp;if(tp>mx)mx=tp}
  if(prevPrice!=null){if(prevPrice<mn)mn=prevPrice;if(prevPrice>mx)mx=prevPrice}
  const rg=mx-mn;
  if(rg<0.001){mn-=1;mx+=1}
  const pad=(mx-mn)*0.06;
  mn-=pad;mx+=pad;
  const py=p=>pT+ch-((p-mn)/(mx-mn))*ch;

  // Fondo sutil con gradiente
  const bgGrad=ctx.createLinearGradient(0,pT,0,pT+ch);
  bgGrad.addColorStop(0,'rgba(16,185,129,0.02)');
  bgGrad.addColorStop(0.5,'rgba(0,0,0,0)');
  bgGrad.addColorStop(1,'rgba(168,85,247,0.015)');
  ctx.fillStyle=bgGrad;
  ctx.fillRect(pL,pT,cw,ch);

  // Grid horizontal sutil + labels de precio
  ctx.font='10px var(--mono), "JetBrains Mono", ui-monospace, monospace';
  ctx.textBaseline='middle';
  ctx.textAlign='left';
  const ySteps=5;
  for(let i=0;i<=ySteps;i++){
    const y=pT+(ch/ySteps)*i;
    ctx.strokeStyle='rgba(120,140,180,0.06)';
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(pL,y);
    ctx.lineTo(pL+cw,y);
    ctx.stroke();
    const val=mx-((mx-mn)/ySteps)*i;
    ctx.fillStyle='#5a6478';
    ctx.fillText('$'+val.toLocaleString('en-US',{maximumFractionDigits:0}),pL+cw+6,y);
  }

  // Grid vertical + labels de tiempo (responsive: menos labels en móvil, formato corto)
  const labelCount = W<440 ? 3 : (W<760 ? 4 : 6);
  const step = Math.max(1, Math.ceil(vis.length / labelCount));
  ctx.textAlign='center';
  for(let i=0;i<vis.length;i+=step){
    const x=pL+i*cW+cW/2;
    ctx.strokeStyle='rgba(120,140,180,0.035)';
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(x,pT);
    ctx.lineTo(x,pT+ch);
    ctx.stroke();
    const d=new Date(vis[i].timestamp);
    const timeStr=d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:TZ});
    const dateStr=d.toLocaleDateString('en-US',{day:'2-digit',month:'short',timeZone:TZ});
    ctx.fillStyle='#5a6478';
    ctx.fillText(timeStr,x,pT+ch+12);
    if(W>=460) ctx.fillText(dateStr,x,pT+ch+24);
  }
  ctx.textAlign='left';
  ctx.textBaseline='alphabetic';

  // Velas (con glow en última vela, mejor renderizado)
  vis.forEach((x,i)=>{
    const xx=pL+i*cW+cW/2;
    const up=x.close>=x.open;
    const col=up?'#10b981':'#ef4444';
    // Wick
    ctx.strokeStyle=col;
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(xx,py(x.high));
    ctx.lineTo(xx,py(x.low));
    ctx.stroke();
    // Body
    const yO=py(x.open),yC=py(x.close);
    const bh=Math.max(1,Math.abs(yC-yO));
    const bodyTop=Math.min(yO,yC);
    const isLast=(i===vis.length-1);
    if(isLast){
      ctx.shadowColor=col;
      ctx.shadowBlur=10;
    }
    ctx.fillStyle=col;
    ctx.fillRect(xx-bW/2,bodyTop,bW,bh);
    ctx.shadowBlur=0;
    // Borde sutil para body (mejor proporción visual)
    if(bh>2){
      ctx.strokeStyle=col;
      ctx.lineWidth=1;
      ctx.strokeRect(xx-bW/2+0.5,bodyTop+0.5,bW-1,bh-1);
    }
  });

  // EMA30 (dorado) — FIX: saltar nulls correctamente rompiendo el path
  if(e30Arr){
    ctx.strokeStyle='#fbbf24';
    ctx.lineWidth=1.6;
    ctx.shadowColor='rgba(251,191,36,0.5)';
    ctx.shadowBlur=4;
    ctx.beginPath();
    let started=false;
    for(let i=0;i<vis.length;i++){
      const v=e30Arr[c.length-vis.length+i];
      if(v==null){started=false;continue}
      const xx=pL+i*cW+cW/2,y=py(v);
      if(!started){ctx.moveTo(xx,y);started=true}
      else ctx.lineTo(xx,y);
    }
    ctx.stroke();
    ctx.shadowBlur=0;
  }

  // EMA100 (púrpura) — FIX: saltar nulls correctamente rompiendo el path
  if(e100Arr){
    ctx.strokeStyle='#a855f7';
    ctx.lineWidth=1.6;
    ctx.shadowColor='rgba(168,85,247,0.5)';
    ctx.shadowBlur=4;
    ctx.beginPath();
    let started=false;
    for(let i=0;i<vis.length;i++){
      const v=e100Arr[c.length-vis.length+i];
      if(v==null){started=false;continue}
      const xx=pL+i*cW+cW/2,y=py(v);
      if(!started){ctx.moveTo(xx,y);started=true}
      else ctx.lineTo(xx,y);
    }
    ctx.stroke();
    ctx.shadowBlur=0;
  }

  // Entry line — FIX: label compacto
  if(en&&en>0){
    const y=py(en);
    const dc=dir==='LONG'?'#10b981':dir==='SHORT'?'#ef4444':'#8290a8';
    ctx.strokeStyle=dc;
    ctx.lineWidth=1.5;
    ctx.setLineDash([5,3]);
    ctx.beginPath();
    ctx.moveTo(pL,y);
    ctx.lineTo(pL+cw,y);
    ctx.stroke();
    ctx.setLineDash([]);
    // Label compacto: "E 60,534"
    ctx.fillStyle=dc;
    ctx.font='bold 10px "JetBrains Mono", ui-monospace, monospace';
    ctx.textBaseline='middle';
    const lbl='E '+en.toLocaleString('en-US',{maximumFractionDigits:0});
    ctx.fillText(lbl,pL+cw+6,y);
    ctx.textBaseline='alphabetic';
  }

  // SL line
  if(sl&&sl>0){
    const y=py(sl);
    ctx.strokeStyle='rgba(239,68,68,0.7)';
    ctx.lineWidth=1;
    ctx.setLineDash([3,3]);
    ctx.beginPath();
    ctx.moveTo(pL,y);
    ctx.lineTo(pL+cw,y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#f87171';
    ctx.font='bold 9px "JetBrains Mono", ui-monospace, monospace';
    ctx.textBaseline='middle';
    ctx.fillText('SL',pL+cw+6,y);
    ctx.textBaseline='alphabetic';
  }

  // TP line
  if(tp&&tp>0){
    const y=py(tp);
    ctx.strokeStyle='rgba(16,185,129,0.7)';
    ctx.lineWidth=1;
    ctx.setLineDash([3,3]);
    ctx.beginPath();
    ctx.moveTo(pL,y);
    ctx.lineTo(pL+cw,y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#34d399';
    ctx.font='bold 9px "JetBrains Mono", ui-monospace, monospace';
    ctx.textBaseline='middle';
    ctx.fillText('TP',pL+cw+6,y);
    ctx.textBaseline='alphabetic';
  }

  // Línea de precio actual en tiempo real (cyan, animada visualmente con badge)
  if(prevPrice!=null&&prevPrice>=mn&&prevPrice<=mx){
    const y=py(prevPrice);
    ctx.strokeStyle='#06b6d4';
    ctx.lineWidth=1.2;
    ctx.setLineDash([2,3]);
    ctx.beginPath();
    ctx.moveTo(pL,y);
    ctx.lineTo(pL+cw,y);
    ctx.stroke();
    ctx.setLineDash([]);
    // Badge con precio live
    const lbl='$'+prevPrice.toLocaleString('en-US',{maximumFractionDigits:0});
    ctx.font='bold 10px "JetBrains Mono", ui-monospace, monospace';
    const tw=ctx.measureText(lbl).width;
    ctx.fillStyle='#06b6d4';
    ctx.fillRect(pL+cw+2,y-8,tw+10,16);
    ctx.fillStyle='#070a12';
    ctx.textBaseline='middle';
    ctx.fillText(lbl,pL+cw+7,y);
    ctx.textBaseline='alphabetic';
  }
}

// === DRAW RSI (premium) ===
function drawRSI(cv,c){
  const ctx=cv.getContext('2d'),dpr=window.devicePixelRatio||1,
    W=cv.clientWidth,H=cv.clientHeight;
  cv.width=W*dpr;cv.height=H*dpr;
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  if(!c||!c.length)return;

  const pL=10,pR=74,pT=8,pB=8;
  const cw=W-pL-pR,ch=H-pT-pB;
  const vis=c.slice(-100);
  const cW=cw/vis.length;
  const r=calcRSI(c.map(x=>x.close),14);

  // Zonas overbought / oversold
  const obZone=ctx.createLinearGradient(0,pT,0,pT+ch*0.3);
  obZone.addColorStop(0,'rgba(239,68,68,0.12)');
  obZone.addColorStop(1,'rgba(239,68,68,0)');
  ctx.fillStyle=obZone;
  ctx.fillRect(pL,pT,cw,ch*0.3);

  const osZone=ctx.createLinearGradient(0,pT+ch*0.7,0,pT+ch);
  osZone.addColorStop(0,'rgba(16,185,129,0)');
  osZone.addColorStop(1,'rgba(16,185,129,0.12)');
  ctx.fillStyle=osZone;
  ctx.fillRect(pL,pT+ch*0.7,cw,ch*0.3);

  // Niveles 30 / 50 / 70
  [30,50,70].forEach(v=>{
    const y=pT+ch-(v/100)*ch;
    ctx.strokeStyle=v===50?'rgba(120,140,180,0.15)':(v===70?'rgba(239,68,68,0.3)':'rgba(16,185,129,0.3)');
    ctx.setLineDash(v===50?[]:[3,3]);
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(pL,y);
    ctx.lineTo(pL+cw,y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=v===50?'#5a6478':(v===70?'#f87171':'#34d399');
    ctx.font='bold 9px "JetBrains Mono", ui-monospace, monospace';
    ctx.textBaseline='middle';
    ctx.fillText(v.toString(),pL+cw+6,y);
    ctx.textBaseline='alphabetic';
  });

  // Línea RSI — FIX: saltar nulls correctamente
  ctx.strokeStyle='#3b82f6';
  ctx.lineWidth=1.6;
  ctx.shadowColor='rgba(59,130,246,0.6)';
  ctx.shadowBlur=5;
  ctx.beginPath();
  let started=false;
  for(let i=0;i<vis.length;i++){
    const v=r[c.length-vis.length+i];
    if(v==null){started=false;continue}
    const xx=pL+i*cW+cW/2,y=pT+ch-(v/100)*ch;
    if(!started){ctx.moveTo(xx,y);started=true}
    else ctx.lineTo(xx,y);
  }
  ctx.stroke();
  ctx.shadowBlur=0;

  // Punto en el valor actual de RSI
  const lastV=r[r.length-1];
  if(lastV!=null){
    const xx=pL+(vis.length-1)*cW+cW/2;
    const y=pT+ch-(lastV/100)*ch;
    ctx.fillStyle='#3b82f6';
    ctx.shadowColor='#3b82f6';
    ctx.shadowBlur=10;
    ctx.beginPath();
    ctx.arc(xx,y,3.5,0,Math.PI*2);
    ctx.fill();
    ctx.shadowBlur=0;
    // Badge con valor
    const lbl=lastV.toFixed(1);
    ctx.font='bold 10px "JetBrains Mono", ui-monospace, monospace';
    const tw=ctx.measureText(lbl).width;
    ctx.fillStyle='#3b82f6';
    ctx.fillRect(pL+cw+2,y-8,tw+10,16);
    ctx.fillStyle='#070a12';
    ctx.textBaseline='middle';
    ctx.fillText(lbl,pL+cw+7,y);
    ctx.textBaseline='alphabetic';
  }
}

// === WEBSOCKET BINANCE (PRECIO EN TIEMPO REAL) ===
function initWebSocket(){
  wsPrice = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
  wsPrice.onmessage = (event) => {
    try {
      const d = JSON.parse(event.data);
      if(d.c){
        const price = parseFloat(d.c);
        const change = parseFloat(d.P);
        const high = parseFloat(d.h);
        const low = parseFloat(d.l);
        const vol = parseFloat(d.q);
        updateLivePrice(price, change, high, low, vol);
      }
    } catch(e){}
  };
  wsPrice.onclose = () => { setTimeout(initWebSocket, 3000); };
  wsPrice.onerror = () => { wsPrice.close(); };

  wsKline = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@kline_4h');
  // FIX P0-26: ANTES el handler era una función anónima reasignada, lo que rompía el reconnect.
  // El handler onclose hacía: wsKline.onmessage = wsKline.onmessage
  // Pero wsKline.onmessage ya era `undefined` en el nuevo objeto → chart se congelaba.
  // AHORA: extraer el handler a una función con nombre y reasignarla correctamente.
  const handleKlineMessage = (event) => {
    try {
      const d = JSON.parse(event.data);
      if(d.k){
        const k = d.k;
        const isClosed = k.x;
        const candle = { open: parseFloat(k.o), high: parseFloat(k.h), low: parseFloat(k.l), close: parseFloat(k.c), volume: parseFloat(k.v), timestamp: k.t };
        updateChart(candle, isClosed);
      }
    } catch(e){}
  };
  wsKline.onmessage = handleKlineMessage;
  wsKline.onclose = () => {
    setTimeout(() => {
      wsKline = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@kline_4h');
      // FIX P0-26: reasignar el handler CON NOMBRE (no wsKline.onmessage = wsKline.onmessage)
      wsKline.onmessage = handleKlineMessage;
      wsKline.onclose = arguments.callee; // permitir múltiples reconnects
      wsKline.onerror = () => { wsKline.close(); };
    }, 3000);
  };
  wsKline.onerror = () => { wsKline.close(); };
}

function updateLivePrice(price, changePct, high, low, vol){
  const pv = document.getElementById('livePrice');
  const pc = document.getElementById('liveChange');
  const ps = document.getElementById('liveStats');
  const li = document.getElementById('liveIndicator');

  if(pv){
    pv.textContent = usd(price, 0);
    if(prevPrice !== null){
      if(price > prevPrice) pv.className = 'price-value up flash';
      else if(price < prevPrice) pv.className = 'price-value down flash';
      else pv.className = 'price-value';
    }
    prevPrice = price;
    setTimeout(() => { if(pv) pv.className = 'price-value ' + (changePct >= 0 ? 'up' : 'down'); }, 400);
  }
  if(pc){
    const isUp = changePct >= 0;
    pc.textContent = (isUp ? '▲' : '▼') + ' ' + changePct.toFixed(2) + '%';
    pc.className = 'price-change ' + (isUp ? 'up' : 'down');
  }
  if(ps){
    ps.innerHTML = '<span>H: ' + usd(high, 0) + '</span><span>L: ' + usd(low, 0) + '</span><span>Vol: $' + (vol / 1e9).toFixed(2) + 'B</span>';
  }
  if(li){
    li.textContent = 'EN VIVO · ' + nowLima();
  }
  const cp = document.getElementById('currentPriceDisplay');
  if(cp) cp.textContent = usd(price, 0);
  if(cO && cO.entryPrice){
    const isLong = cO.direction === 'LONG';
    const priceDiff = isLong ? (price - cO.entryPrice) : (cO.entryPrice - price);
    const livePnl = (cO.sizeBtc || 0) * priceDiff;
    const livePct = cO.sizeUsd > 0 ? (livePnl / cO.sizeUsd) * 100 : 0;
    const pnlEl = document.getElementById('pnlDisplay');
    if(pnlEl){
      const pnlColor = livePnl >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
      const pnlSign = livePnl >= 0 ? '+' : '';
      pnlEl.style.color = pnlColor;
      pnlEl.textContent = pnlSign + fmt(livePnl, 4) + ' (' + livePct.toFixed(2) + '%)';
    }
    const eqEl = document.getElementById('equityDisplay');
    if(eqEl && cP && cP.currentBalance){
      const liveEquity = cP.currentBalance + livePnl;
      eqEl.textContent = usd(liveEquity, 2);
    }
  }
  // Actualizar línea de precio live en la gráfica
  const cc = document.getElementById('chart');
  if(cc && cS && cC.length>0){
    drawChart(cc, cC, cS.ema30, cS.ema100, cO?.entryPrice||null, cO?.stopLoss||null, cO?.takeProfit1||null, cO?.direction||cS.direction);
  }
}

function updateChart(candle, isClosed){
  if(!cC || cC.length === 0) return;
  if(isClosed){
    cC.push(candle);
    if(cC.length > 200) cC.shift();
  } else {
    const last = cC[cC.length - 1];
    if(last && last.timestamp === candle.timestamp){
      last.close = candle.close;
      last.high = Math.max(last.high, candle.high);
      last.low = Math.min(last.low, candle.low);
      last.volume = candle.volume;
    } else if(last && candle.timestamp > last.timestamp){
      cC.push(candle);
      if(cC.length > 200) cC.shift();
    }
  }
  const cc = document.getElementById('chart');
  if(cc && cS){
    drawChart(cc, cC, cS.ema30, cS.ema100, cO?.entryPrice||null, cO?.stopLoss||null, cO?.takeProfit1||null, cO?.direction||cS.direction);
  }
  const rc = document.getElementById('rsiChart');
  if(rc) drawRSI(rc, cC);
}

function updateIAAlive(pt,sig,ev,es){const pc=document.getElementById('iaPredCount');if(pc&&es)pc.textContent=es.totalEvaluated||0;const lp=document.getElementById('iaLastPred');if(lp){const ts=pt.timestamp?new Date(pt.timestamp).toLocaleString('es-PE',{timeZone:'America/Lima',hour:'2-digit',minute:'2-digit',second:'2-digit'}):'—';lp.textContent=ts}const vl=document.getElementById('iaVolLive');if(vl&&sig)vl.textContent=(sig.volIa*100).toFixed(4)+'%';const w=document.getElementById('iaWeights');if(w&&es)w.textContent=(es.weightFold1*100).toFixed(1)+'% / '+(es.weightFold2*100).toFixed(1)+'% / '+(es.weightFold3*100).toFixed(1)+'%';const ne=document.getElementById('iaNextEval');if(ne){const n=new Date(Math.ceil(Date.now()/(4*3600*1000))*(4*3600*1000));ne.textContent=n.toLocaleString('es-PE',{timeZone:'America/Lima',hour:'2-digit',minute:'2-digit'})}}

// FIX UX: Actualización silenciosa — solo cambia los valores numéricos en el DOM
// sin reescribir todo el HTML. Esto permite al usuario leer el dashboard sin
// que se reinicie la vista cada 15s.
function updateValuesInPlace(p,sig,ot,t,ind,ev,a,ptData){
  // Equity en header
  const capBadge=document.querySelector('.capital-badge');
  if(capBadge){
    const txt=capBadge.textContent;
    capBadge.innerHTML='<span class="label">Equity</span>'+usd(p.equity,2);
  }
  // Confianza IA
  const sigInfo=document.querySelectorAll('.signal-info-item .signal-info-value');
  if(sigInfo[0])sigInfo[0].textContent=(sig.confidence*100).toFixed(0)+'%';
  if(sigInfo[1])sigInfo[1].textContent=iRegime(sig.regime).toUpperCase();
  // Precio BTC
  if(t){
    const lp=document.getElementById('livePrice');
    if(lp)lp.textContent=usd(t.price,0);
    const lc=document.getElementById('liveChange');
    if(lc){const iu=t.changePct24h>=0;lc.textContent=(iu?'▲':'▼')+' '+t.changePct24h.toFixed(2)+'%';lc.className='price-change tnum '+(iu?'up':'down');}
    const ls=document.getElementById('liveStats');
    if(ls)ls.innerHTML='<span>H: '+usd(t.high24h,0)+'</span><span>L: '+usd(t.low24h,0)+'</span><span>Vol: $'+(t.quoteVolume24h/1e9).toFixed(2)+'B</span>';
  }
  // Current price en posición
  const cpd=document.getElementById('currentPriceDisplay');
  if(cpd)cpd.textContent=usd(ptData.currentPrice,0);
  // PnL en posición
  const pnlDisp=document.getElementById('pnlDisplay');
  if(pnlDisp&&ot){
    const pnl=ptData.unrealizedPnl||0;
    const pp=ot.sizeUsd>0?(pnl/ot.sizeUsd)*100:0;
    pnlDisp.textContent=(pnl>=0?'+':'')+fmt(pnl,4)+' ('+pp.toFixed(2)+'%)';
    pnlDisp.style.color=pnl>=0?'var(--emerald-bright)':'var(--red-bright)';
