<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="description" content="PROMETHEUS — Sistema de Trading Inteligente Híbrido (LSTM + Chronos + Bayesian + Order Flow + Kelly) · 11-Layer AI Ensemble"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<title>PROMETHEUS · Pro Terminal</title>
<!-- EMBEDDED_DATA -->
<style>
:root{
  /* === Obsidiana profunda === */
  --bg-base:#0a0a0f;
  --bg-elev:#0d0d14;
  --bg-card:rgba(18,18,26,0.72);
  --bg-card-solid:#12121a;
  --bg-inset:#060609;
  --bg-hover:rgba(255,140,0,0.06);
  /* === Borders (sutil fire-tinted) === */
  --border:rgba(255,140,0,0.10);
  --border-strong:rgba(255,183,51,0.22);
  --border-emerald:rgba(0,255,136,0.30);
  --border-gold:rgba(255,140,0,0.32);
  --border-purple:rgba(168,85,247,0.28);
  --border-red:rgba(255,51,102,0.30);
  --border-blue:rgba(0,212,255,0.28);
  --border-cyan:rgba(0,212,255,0.28);
  /* === Texto === */
  --text-primary:#e0e0e8;
  --text-secondary:#8888a0;
  --text-muted:#5a5a6e;
  /* === Paleta fuego/ámbar (acento primario) === */
  --gold:#ff8c00;
  --gold-bright:#ffb733;
  --gold-glow:rgba(255,140,0,0.30);
  --gold-soft:rgba(255,183,51,0.10);
  /* === Cyan eléctrico (datos en vivo) === */
  --blue:#00d4ff;
  --cyan:#00d4ff;
  --cyan-bright:#44e0ff;
  --cyan-glow:rgba(0,212,255,0.30);
  /* === Verde/Rojo (PnL) === */
  --emerald:#00ff88;
  --emerald-bright:#00ff88;
  --emerald-glow:rgba(0,255,136,0.35);
  --red:#ff3366;
  --red-bright:#ff4477;
  --red-glow:rgba(255,51,102,0.35);
  /* === Púrpura (IA neural) === */
  --purple:#a855f7;
  /* === Legacy aliases (referenciados por inline styles en JS) === */
  --accent-green:#00ff88;
  --accent-red:#ff3366;
  --accent-gold:#ff8c00;
  --accent-blue:#00d4ff;
  --accent-purple:#a855f7;
  /* === Misc === */
  --grid:rgba(255,140,0,0.04);
  --shadow-card:0 4px 16px rgba(0,0,0,0.6),0 0 0 1px rgba(255,140,0,0.06);
  --shadow-glow:0 0 24px rgba(255,140,0,0.10);
  --shadow-deep:0 8px 32px rgba(0,0,0,0.7);
  --radius-lg:12px;
  --radius:8px;
  --radius-sm:5px;
  --radius-xs:3px;
  --font:'Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;
  --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:var(--font);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
html,body{background:var(--bg-base)}
body{
  background:
    radial-gradient(ellipse 90% 60% at 50% -10%, rgba(255,140,0,0.08), transparent 55%),
    radial-gradient(ellipse 50% 40% at 100% 100%, rgba(0,212,255,0.04), transparent 60%),
    radial-gradient(ellipse 40% 30% at 0% 80%, rgba(168,85,247,0.03), transparent 60%),
    linear-gradient(180deg,#0a0a0f 0%,#0d0d14 100%);
  background-attachment:fixed;
  color:var(--text-primary);
  min-height:100vh;
  padding:10px;
  font-feature-settings:'tnum' 1,'cv02' 1,'cv03' 1;
  font-size:12px;
  line-height:1.45;
}
/* Sutil grid textura overlay */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(255,140,0,0.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,140,0,0.018) 1px,transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 80% 60% at 50% 30%,#000 30%,transparent 90%);
  -webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 30%,#000 30%,transparent 90%);
}
#app{position:relative;z-index:1}
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:'tnum' 1}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

/* === TOP STATUS BAR (Bloomberg-style system strip) === */
.status-bar{
  display:flex;align-items:center;gap:0;
  background:linear-gradient(180deg,rgba(13,13,20,0.95) 0%,rgba(6,6,10,0.95) 100%);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:0;margin-bottom:8px;
  height:26px;
  overflow:hidden;
  font-family:var(--mono);
  font-size:10px;
  box-shadow:var(--shadow-card);
}
.status-item{
  display:flex;align-items:center;gap:5px;
  padding:0 14px;
  height:100%;
  border-right:1px solid var(--border);
  color:var(--text-secondary);
  letter-spacing:0.8px;
  font-weight:500;
  text-transform:uppercase;
  white-space:nowrap;
}
.status-item:last-child{border-right:none;margin-left:auto}
.status-item .mono{color:var(--gold-bright);font-weight:600}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.status-dot.ok{background:var(--emerald);box-shadow:0 0 6px var(--emerald)}
.status-dot.warn{background:var(--gold-bright);box-shadow:0 0 6px var(--gold-bright)}
.status-dot.err{background:var(--red);box-shadow:0 0 6px var(--red)}

/* === HEADER === */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;
  background:linear-gradient(135deg,rgba(18,18,26,0.92) 0%,rgba(13,13,20,0.92) 100%);
  border:1px solid var(--border-strong);
  border-radius:var(--radius);
  margin-bottom:10px;
  flex-wrap:wrap;gap:12px;
  box-shadow:var(--shadow-card),var(--shadow-glow);
  position:relative;overflow:hidden;
}
.header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 5%,rgba(255,140,0,0.7) 25%,rgba(255,183,51,0.5) 50%,rgba(0,212,255,0.4) 75%,transparent 95%);
}
.header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 10%,rgba(255,140,0,0.15) 50%,transparent 90%);
}
.header-left{display:flex;align-items:center;gap:14px}
/* === LOGO LLAMA SVG === */
.logo-svg{
  width:38px;height:44px;flex-shrink:0;
  animation:flame-glow 3.2s ease-in-out infinite;
  filter:drop-shadow(0 0 6px rgba(255,140,0,0.5));
}
@keyframes flame-glow{
  0%,100%{filter:drop-shadow(0 0 4px rgba(255,140,0,0.45)) drop-shadow(0 0 10px rgba(255,140,0,0.25))}
  50%{filter:drop-shadow(0 0 8px rgba(255,183,51,0.7)) drop-shadow(0 0 18px rgba(255,140,0,0.45))}
}
.logo-svg .flame-outer{transform-origin:center bottom;animation:flame-flicker 2.6s ease-in-out infinite}
@keyframes flame-flicker{
  0%,100%{transform:scaleY(1) scaleX(1)}
  33%{transform:scaleY(1.04) scaleX(0.98)}
  66%{transform:scaleY(0.98) scaleX(1.02)}
}
.logo-text{
  font-size:20px;font-weight:900;letter-spacing:2px;line-height:1;
  background:linear-gradient(135deg,#ffb733 0%,#ff8c00 50%,#ff6a00 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  font-family:var(--mono);
  text-shadow:0 0 24px rgba(255,140,0,0.3);
}
.logo-sub{
  font-size:8px;color:var(--text-muted);font-weight:700;margin-top:4px;
  letter-spacing:2.5px;text-transform:uppercase;font-family:var(--mono);
}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.capital-badge{
  padding:7px 12px;
  background:linear-gradient(180deg,rgba(255,140,0,0.14) 0%,rgba(255,140,0,0.04) 100%);
  border:1px solid var(--border-gold);
  border-radius:var(--radius-sm);
  font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;
  font-family:var(--mono);
  letter-spacing:-0.3px;
  color:var(--gold-bright);
  text-shadow:0 0 12px rgba(255,140,0,0.4);
  box-shadow:inset 0 1px 0 rgba(255,183,51,0.15);
}
.capital-badge .label{
  color:var(--text-muted);font-size:8px;font-weight:700;letter-spacing:1.8px;
  text-transform:uppercase;display:block;margin-bottom:2px;font-family:var(--font);
}
.ia-badge{
  padding:6px 10px;
  background:linear-gradient(180deg,rgba(0,255,136,0.14) 0%,rgba(0,255,136,0.04) 100%);
  border:1px solid var(--border-emerald);
  border-radius:var(--radius-sm);
  font-size:10px;color:var(--emerald-bright);font-weight:800;
  display:flex;align-items:center;gap:6px;letter-spacing:0.8px;
  text-shadow:0 0 10px rgba(0,255,136,0.5);
  font-family:var(--mono);
  text-transform:uppercase;
}
.ia-badge::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--emerald);box-shadow:0 0 8px var(--emerald);animation:pulse-dot 2s infinite}
.ia-badge.fallback{background:linear-gradient(180deg,rgba(255,140,0,0.14),rgba(255,140,0,0.04));border-color:var(--border-gold);color:var(--gold-bright);text-shadow:0 0 10px rgba(255,140,0,0.5)}
.ia-badge.fallback::before{background:var(--gold-bright);box-shadow:0 0 8px var(--gold-bright)}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.live-indicator{
  display:flex;align-items:center;gap:7px;
  padding:6px 11px;
  background:rgba(0,212,255,0.08);
  border:1px solid var(--border-cyan);
  border-radius:var(--radius-sm);
  font-size:9px;color:var(--cyan-bright);font-weight:800;letter-spacing:0.8px;
  font-variant-numeric:tabular-nums;
  text-shadow:0 0 8px rgba(0,212,255,0.5);
  font-family:var(--mono);
  text-transform:uppercase;
}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan);animation:pulse-live 1.5s infinite}
@keyframes pulse-live{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(1.5)}}

/* === HERO SECTION (precio + señal grande) === */
.hero{
  display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:10px;
}
@media(min-width:980px){.hero{grid-template-columns:1.4fr 1fr}}
.hero-left,.hero-right{
  position:relative;overflow:hidden;
  border-radius:var(--radius);
  padding:18px 20px;
  box-shadow:var(--shadow-card),var(--shadow-deep);
}
.hero-left{
  background:
    radial-gradient(ellipse 60% 80% at 100% 0%, rgba(255,140,0,0.10), transparent 70%),
    linear-gradient(135deg,rgba(22,18,16,0.85) 0%,rgba(13,13,20,0.85) 100%);
  border:1px solid var(--border-gold);
}
.hero-left::before{
  content:'';position:absolute;top:0;left:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--gold-bright),var(--gold),transparent);
  box-shadow:0 0 12px var(--gold-glow);
}
.hero-right{
  background:
    radial-gradient(ellipse 60% 80% at 0% 100%, rgba(168,85,247,0.08), transparent 70%),
    linear-gradient(135deg,rgba(18,18,26,0.85) 0%,rgba(13,13,20,0.85) 100%);
  border:1px solid var(--border-strong);
}
.hero-tag{
  font-size:9px;font-weight:800;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:2px;
  font-family:var(--mono);
  margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.hero-tag::before{
  content:'';width:4px;height:4px;border-radius:50%;
  background:var(--gold-bright);box-shadow:0 0 6px var(--gold-bright);
}

/* === PRICE (hero-left) === */
.price-main{display:flex;align-items:baseline;gap:14px;margin-bottom:8px;flex-wrap:wrap}
.price-value{
  font-size:42px;font-weight:800;letter-spacing:-1.5px;
  font-variant-numeric:tabular-nums;transition:color 0.3s,transform 0.3s;
  font-family:var(--mono);line-height:1;
  color:var(--gold-bright);
  text-shadow:0 0 24px rgba(255,183,51,0.25);
}
.price-value.up{color:var(--emerald-bright);text-shadow:0 0 24px rgba(0,255,136,0.3)}
.price-value.down{color:var(--red-bright);text-shadow:0 0 24px rgba(255,51,102,0.3)}
.price-value.flash{animation:price-flash 0.4s ease-out}
@keyframes price-flash{0%{transform:scale(1.03);filter:brightness(1.4)}100%{transform:scale(1);filter:brightness(1)}}
.price-change{
  font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;
  font-family:var(--mono);padding:3px 9px;border-radius:var(--radius-xs);letter-spacing:0.3px;
}
.price-change.up{color:var(--emerald-bright);background:rgba(0,255,136,0.10);border:1px solid var(--border-emerald)}
.price-change.down{color:var(--red-bright);background:rgba(255,51,102,0.10);border:1px solid var(--border-red)}
.price-range{
  display:flex;gap:16px;font-size:11px;color:var(--text-secondary);
  flex-wrap:wrap;font-variant-numeric:tabular-nums;font-weight:600;
  font-family:var(--mono);margin-bottom:10px;
}
.price-range span{display:flex;align-items:center;gap:5px}
.price-range span::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--gold);flex-shrink:0;box-shadow:0 0 4px var(--gold)}
.bidask-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.bidask-item{padding:7px 10px;background:rgba(6,6,10,0.6);border:1px solid var(--border);border-radius:var(--radius-xs)}
.bidask-label{font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px;font-family:var(--mono);font-weight:700}
.bidask-val{font-size:13px;font-weight:800;font-family:var(--mono);font-variant-numeric:tabular-nums;margin-top:2px}
.bidask-val.bid{color:var(--red-bright)}
.bidask-val.ask{color:var(--emerald-bright)}
.indicators-row{display:flex;gap:5px;font-size:9px;color:var(--text-secondary);margin-top:10px;flex-wrap:wrap}
.indicators-row span{
  padding:4px 8px;background:rgba(6,6,10,0.6);border:1px solid var(--border);
  border-radius:var(--radius-xs);font-variant-numeric:tabular-nums;font-weight:700;
  letter-spacing:0.4px;font-family:var(--mono);
}

/* === SIGNAL (hero-right) === */
.signal-status{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding:4px 0}
.signal-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;position:relative}
.signal-dot.buy{background:var(--emerald);box-shadow:0 0 16px var(--emerald-glow),inset 0 0 4px rgba(255,255,255,0.3);color:var(--emerald)}
.signal-dot.sell{background:var(--red);box-shadow:0 0 16px var(--red-glow),inset 0 0 4px rgba(255,255,255,0.3);color:var(--red)}
.signal-dot.wait{background:var(--text-muted);color:var(--text-muted)}
.signal-dot::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:1px solid currentColor;opacity:0.4;animation:ring-pulse 2s infinite}
@keyframes ring-pulse{0%{transform:scale(0.85);opacity:0.6}100%{transform:scale(1.8);opacity:0}}
.signal-text{font-size:30px;font-weight:900;letter-spacing:1.5px;font-family:var(--mono);flex:1;line-height:1}
.signal-text.buy{color:var(--emerald-bright);text-shadow:0 0 20px var(--emerald-glow)}
.signal-text.sell{color:var(--red-bright);text-shadow:0 0 20px var(--red-glow)}
.signal-text.wait{color:var(--text-secondary)}
.signal-strength{display:flex;flex-direction:column;gap:4px;align-items:flex-end;min-width:80px}
.signal-strength-bar{
  width:72px;height:6px;
  background:rgba(255,140,0,0.10);
  border-radius:2px;
  overflow:hidden;
  position:relative;
  border:1px solid var(--border);
}
.signal-strength-fill{
  height:100%;
  background:linear-gradient(90deg,var(--red),var(--gold),var(--emerald));
  border-radius:2px;
  transition:width 0.5s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 0 8px var(--gold-glow);
}
.signal-strength-label{font-size:8px;color:var(--text-muted);letter-spacing:1.2px;text-transform:uppercase;font-family:var(--mono);font-weight:700}
.signal-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.signal-info-item{
  background:linear-gradient(180deg,rgba(6,6,10,0.6) 0%,rgba(6,6,10,0.3) 100%);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:9px 12px;
  transition:border-color 0.2s,transform 0.2s;
}
.signal-info-item:hover{border-color:var(--border-strong);transform:translateY(-1px)}
.signal-info-label{font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.4px;font-weight:700;font-family:var(--mono)}
.signal-info-value{font-size:15px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums;letter-spacing:-0.2px;font-family:var(--mono);color:var(--text-primary)}
.signal-reason{
  margin-top:4px;padding:8px 10px;background:rgba(6,6,10,0.6);
  border:1px solid var(--border);border-radius:var(--radius-xs);
  font-size:10px;color:var(--text-secondary);font-family:var(--mono);line-height:1.5;
}

/* === GRID MAIN === */
.grid-main{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:1100px){.grid-main{grid-template-columns:1fr 380px}}

/* === CARDS === */
.card{
  background:var(--bg-card);
  backdrop-filter:blur(14px) saturate(140%);
  -webkit-backdrop-filter:blur(14px) saturate(140%);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px;
  position:relative;overflow:hidden;
  transition:border-color 0.25s ease,box-shadow 0.25s ease,transform 0.25s ease;
  box-shadow:var(--shadow-card);
}
.card:hover{border-color:var(--border-strong);box-shadow:var(--shadow-card),var(--shadow-glow)}
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
  padding-bottom:10px;
  border-bottom:1px solid var(--border);
  gap:8px;
}
.card-tag{
  font-size:9px;font-weight:800;color:var(--gold-bright);
  text-transform:uppercase;letter-spacing:2px;
  font-family:var(--mono);
  display:flex;align-items:center;gap:7px;
}
.card-tag::before{content:'';width:3px;height:12px;background:linear-gradient(180deg,var(--gold-bright),var(--gold));border-radius:1px;flex-shrink:0;box-shadow:0 0 6px var(--gold-glow)}
.card-ticker{
  font-size:10px;color:var(--text-muted);
  font-family:var(--mono);font-weight:700;
  letter-spacing:0.8px;
  text-transform:uppercase;
}

/* === CHART === */
.chart-container,.rsi-container{
  background:linear-gradient(180deg,rgba(13,13,20,0.88) 0%,rgba(6,6,10,0.88) 100%);
  backdrop-filter:blur(14px) saturate(140%);
  -webkit-backdrop-filter:blur(14px) saturate(140%);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:10px;margin-bottom:10px;
  box-shadow:var(--shadow-card);
  overflow:hidden;
  position:relative;
}
.chart-container::before,.rsi-container::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-glow),transparent);
}
.chart-info{
  display:flex;gap:12px;font-size:9px;color:var(--text-secondary);
  padding:5px 10px;border-bottom:1px solid var(--border);margin-bottom:6px;
  flex-wrap:wrap;font-variant-numeric:tabular-nums;font-weight:700;
  letter-spacing:0.6px;font-family:var(--mono);text-transform:uppercase;
}
.chart-info span{display:flex;align-items:center;gap:4px}
canvas{display:block;width:100%}
.rsi-label{
  font-size:9px;color:var(--blue);padding:5px 10px;
  border-bottom:1px solid var(--border);margin-bottom:6px;
  font-weight:800;letter-spacing:1.2px;text-transform:uppercase;font-family:var(--mono);
}

/* === POSITION PROGRESS === */
.pos-progress{margin-top:10px;padding:10px 12px;background:rgba(6,6,10,0.6);border:1px solid var(--border);border-radius:var(--radius-sm)}
.pos-progress-label{display:flex;justify-content:space-between;font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;font-family:var(--mono);margin-bottom:6px}
.pos-progress-bar{position:relative;height:12px;background:rgba(255,140,0,0.08);border-radius:3px;overflow:visible;border:1px solid var(--border)}
.pos-progress-fill{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,var(--red),var(--gold),var(--emerald));border-radius:3px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 8px var(--gold-glow)}
.pos-progress-marker{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--cyan);box-shadow:0 0 10px var(--cyan);transform:translateX(-50%);z-index:2}
.pos-progress-ends{display:flex;justify-content:space-between;font-size:8px;color:var(--text-muted);font-family:var(--mono);margin-top:5px;font-variant-numeric:tabular-nums}
.pos-r-mark{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,140,0,0.15);z-index:1}
.risk-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px;padding:10px;background:rgba(6,6,10,0.6);border:1px solid var(--border);border-radius:var(--radius-sm)}
.risk-item{text-align:center}
.risk-item .risk-lbl{font-size:7px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;font-family:var(--mono)}
.risk-item .risk-val{font-size:14px;font-weight:800;font-family:var(--mono);margin-top:3px;font-variant-numeric:tabular-nums}
.risk-item .risk-sub{font-size:8px;color:var(--text-muted);margin-top:2px;font-family:var(--mono)}
.liq-warn{margin-top:8px;padding:7px 12px;background:rgba(255,51,102,0.10);border:1px solid rgba(255,51,102,0.3);border-radius:var(--radius-sm);display:flex;justify-content:space-between;align-items:center;font-size:10px;font-family:var(--mono)}
.liq-warn .liq-lbl{color:var(--red-bright);font-weight:800;letter-spacing:0.6px;text-transform:uppercase;font-size:8px}
.liq-warn .liq-val{color:var(--red-bright);font-weight:800;font-variant-numeric:tabular-nums}
.liq-warn .liq-dist{color:var(--text-muted);font-size:9px}
.trade-timer{margin-top:8px;padding:7px 12px;background:rgba(6,6,10,0.6);border:1px solid var(--border);border-radius:var(--radius-sm);display:flex;justify-content:space-between;align-items:center;font-size:10px;font-family:var(--mono)}
.trade-timer .timer-lbl{color:var(--text-muted);font-weight:700;letter-spacing:0.6px;text-transform:uppercase;font-size:8px}
.trade-timer .timer-val{color:var(--cyan-bright);font-weight:800;font-variant-numeric:tabular-nums;text-shadow:0 0 8px var(--cyan-glow)}
.pos-alert{padding:5px 12px;border-radius:var(--radius-xs);font-size:9px;font-weight:800;font-family:var(--mono);text-align:center;margin-top:8px;animation:pulse-alert 1.5s infinite}
.pos-alert.sl{background:rgba(255,51,102,0.15);border:1px solid rgba(255,51,102,0.4);color:var(--red-bright)}
.pos-alert.tp{background:rgba(0,255,136,0.15);border:1px solid rgba(0,255,136,0.4);color:var(--emerald-bright)}
@keyframes pulse-alert{0%,100%{opacity:1}50%{opacity:0.6}}
.funding-box{margin-top:8px;padding:7px 12px;background:rgba(6,6,10,0.6);border:1px solid var(--border);border-radius:var(--radius-sm);display:flex;justify-content:space-between;align-items:center;font-size:10px;font-family:var(--mono)}
.funding-box .fund-lbl{color:var(--text-muted);font-weight:700;letter-spacing:0.6px;text-transform:uppercase;font-size:8px}
.funding-box .fund-time{color:var(--gold-bright);font-weight:800;font-variant-numeric:tabular-nums;text-shadow:0 0 8px var(--gold-glow)}
.funding-box .fund-cost{color:var(--text-secondary);font-weight:600;font-variant-numeric:tabular-nums}

/* === ANALYST === */
.analyst-card{
  background:
    radial-gradient(ellipse 60% 80% at 100% 0%, rgba(255,140,0,0.06), transparent 70%),
    linear-gradient(135deg,rgba(22,18,16,0.85) 0%,rgba(13,13,20,0.85) 100%);
  backdrop-filter:blur(14px) saturate(140%);
  -webkit-backdrop-filter:blur(14px) saturate(140%);
  border:1px solid var(--border-gold);
  border-radius:var(--radius);
  padding:14px;margin-bottom:10px;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow-card);
}
.analyst-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),transparent 80%);
  box-shadow:0 0 8px var(--gold-glow);
}
.analyst-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.analyst-header .title{font-size:10px;font-weight:800;flex-grow:1;letter-spacing:2px;text-transform:uppercase;font-family:var(--mono);color:var(--gold-bright)}
.analyst-badge{
  font-size:8px;padding:3px 8px;border-radius:var(--radius-xs);
  background:linear-gradient(135deg,var(--gold),#cc6f00);color:#0a0a0f;font-weight:900;letter-spacing:1.4px;
  box-shadow:0 2px 6px rgba(255,140,0,0.4);
  font-family:var(--mono);
  text-transform:uppercase;
}
.sentiment-gauge{display:flex;gap:10px;align-items:center;margin-bottom:12px;padding:10px;background:rgba(6,6,10,0.6);border:1px solid var(--border);border-radius:var(--radius-sm)}
.sentiment-gauge-label{font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.4px;font-family:var(--mono);font-weight:700}
.sentiment-gauge-val{font-size:13px;font-weight:800;margin-top:3px;font-family:var(--mono);letter-spacing:0.3px}
.analyst-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.analyst-row:last-of-type{border:none}
.analyst-row .label{font-size:10px;color:var(--text-secondary);font-weight:500;letter-spacing:0.4px}
.analyst-row .value{font-size:11px;font-weight:800;font-variant-numeric:tabular-nums;font-family:var(--mono)}
.analyst-row .value.green{color:var(--emerald-bright)}
.analyst-row .value.red{color:var(--red-bright)}
.analyst-row .value.gold{color:var(--gold-bright)}
.analyst-row .value.blue{color:var(--cyan-bright)}
.analyst-row .value.gray{color:var(--text-secondary)}
.verdict-box{margin-top:12px;padding:14px;background:linear-gradient(180deg,rgba(6,6,10,0.7),rgba(6,6,10,0.4));border:1px solid var(--border);border-radius:var(--radius-sm);text-align:center;position:relative;overflow:hidden}
.verdict-box .verdict-text{font-size:20px;font-weight:900;letter-spacing:2.5px;font-family:var(--mono)}
.verdict-box .verdict-text.buy{color:var(--emerald-bright);text-shadow:0 0 16px var(--emerald-glow)}
.verdict-box .verdict-text.sell{color:var(--red-bright);text-shadow:0 0 16px var(--red-glow)}
.verdict-box .verdict-text.wait{color:var(--gold-bright);text-shadow:0 0 16px var(--gold-glow)}
.verdict-box .verdict-size{font-size:10px;color:var(--text-secondary);margin-top:5px;font-variant-numeric:tabular-nums;font-weight:700;letter-spacing:0.3px;font-family:var(--mono)}
.verdict-just{font-size:9px;color:var(--text-secondary);margin-top:8px;line-height:1.5;font-family:var(--mono)}

/* === METRICS GRID === */
.grid-bottom{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px;margin-bottom:10px}
@media(min-width:768px){.grid-bottom{grid-template-columns:repeat(4,1fr)}}
.metric-card{
  background:linear-gradient(180deg,rgba(18,18,26,0.8) 0%,rgba(13,13,20,0.8) 100%);
  backdrop-filter:blur(14px) saturate(140%);
  -webkit-backdrop-filter:blur(14px) saturate(140%);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:12px 14px;text-align:left;
  transition:border-color 0.25s,box-shadow 0.25s,transform 0.25s;
  box-shadow:var(--shadow-card);
  position:relative;overflow:hidden;
}
.metric-card:hover{border-color:var(--border-strong);box-shadow:var(--shadow-card),var(--shadow-glow);transform:translateY(-2px)}
.metric-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold-bright),var(--gold),transparent);box-shadow:0 0 8px var(--gold-glow)}
.metric-card.red::before{background:linear-gradient(180deg,var(--red),transparent)}
.metric-card.gold::before{background:linear-gradient(180deg,var(--gold-bright),transparent)}
.metric-card.blue::before{background:linear-gradient(180deg,var(--cyan),transparent)}
.metric-label{font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.8px;font-weight:700;font-family:var(--mono)}
.metric-value{font-size:22px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums;letter-spacing:-0.5px;font-family:var(--mono);line-height:1.1}
.metric-value.green{color:var(--emerald-bright);text-shadow:0 0 12px var(--emerald-glow)}
.metric-value.red{color:var(--red-bright);text-shadow:0 0 12px var(--red-glow)}
.metric-sub{font-size:9px;color:var(--text-secondary);margin-top:3px;font-variant-numeric:tabular-nums;font-weight:700;font-family:var(--mono)}

/* === MISC === */
.waiting-signal{padding:12px;background:linear-gradient(180deg,rgba(255,140,0,0.10),rgba(255,140,0,0.02));border:1px solid var(--border-gold);border-radius:var(--radius-sm);text-align:center;margin-top:10px;font-size:11px;color:var(--gold-bright);font-weight:600;line-height:1.5}
.loading{text-align:center;padding:80px 20px;color:var(--text-secondary)}
.loading p{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;font-family:var(--mono);color:var(--gold-bright)}
.spinner{
  width:42px;height:42px;margin:0 auto 18px;position:relative;
  border-radius:50%;
  background:radial-gradient(circle at 50% 60%,rgba(255,183,51,0.25),transparent 60%);
  animation:flame-glow 2s ease-in-out infinite;
}
.spinner::before,.spinner::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  border:2px solid transparent;
}
.spinner::before{
  border-top-color:var(--gold-bright);border-right-color:var(--gold);
  animation:spin 1s linear infinite;
  box-shadow:0 0 12px var(--gold-glow);
}
.spinner::after{
  inset:6px;border-top-color:var(--cyan);border-bottom-color:var(--cyan);
  animation:spin 1.4s linear infinite reverse;opacity:0.6;
}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{
  text-align:center;font-size:9px;color:var(--text-muted);
  padding:16px 0 6px;border-top:1px solid var(--border);margin-top:14px;
  line-height:1.9;font-weight:600;font-family:var(--mono);letter-spacing:0.5px;
}
.footer span{color:var(--gold-bright);font-weight:800}
.footer-status{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;margin-bottom:10px;font-size:8px;letter-spacing:1px;font-family:var(--mono);text-transform:uppercase}
.footer-status span{display:inline-flex;align-items:center;gap:5px;color:var(--text-secondary)}

/* === PROMETHEUS 11-LAYER STATUS PANEL === */
.prom-status{
  background:linear-gradient(135deg,rgba(18,18,26,0.85) 0%,rgba(13,13,20,0.85) 100%);
  border:1px solid var(--border-strong);
  border-radius:var(--radius);
  padding:16px;margin-top:12px;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow-card);
}
.prom-status::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-glow),transparent);
}
.prom-status-title{
  font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  color:var(--gold-bright);margin-bottom:14px;font-family:var(--mono);
  display:flex;align-items:center;gap:9px;
  text-shadow:0 0 12px var(--gold-glow);
}
.prom-status-title .status-dot{width:7px;height:7px}
.prom-layers{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px}
.prom-layer{
  background:linear-gradient(180deg,rgba(6,6,10,0.6),rgba(13,13,20,0.4));
  border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:10px 12px;display:flex;align-items:flex-start;gap:10px;
  transition:border-color 0.25s,transform 0.25s;
  position:relative;overflow:hidden;
}
.prom-layer:hover{border-color:var(--border-strong);transform:translateY(-1px)}
.prom-layer::before{
  content:'';position:absolute;top:0;left:0;bottom:0;width:2px;
  background:linear-gradient(180deg,var(--gold),transparent);
}
.prom-layer-num{
  font-size:9px;font-weight:900;color:var(--gold-bright);
  font-family:var(--mono);letter-spacing:0.5px;
  background:rgba(255,140,0,0.10);border:1px solid var(--border-gold);
  border-radius:var(--radius-xs);padding:2px 6px;flex-shrink:0;
  min-width:24px;text-align:center;
}
.prom-layer-body{flex:1;min-width:0}
.prom-layer-name{font-size:10px;font-weight:700;color:var(--text-primary);font-family:var(--mono);letter-spacing:0.4px}
.prom-layer-status{font-size:8px;color:var(--text-secondary);font-family:var(--mono);display:flex;align-items:center;gap:5px;margin-top:3px;text-transform:uppercase;letter-spacing:0.6px}
.prom-layer-dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.prom-layer-dot.ok{background:var(--emerald);box-shadow:0 0 6px var(--emerald)}
.prom-layer-dot.warn{background:var(--gold-bright);box-shadow:0 0 6px var(--gold-bright)}
.prom-layer-dot.err{background:var(--red);box-shadow:0 0 6px var(--red)}
.prom-layer-detail{font-size:8px;color:var(--text-muted);font-family:var(--mono);margin-top:2px}
.prom-modules{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;
  margin-top:10px;padding-top:12px;border-top:1px dashed var(--border);
}
.prom-module{
  background:linear-gradient(180deg,rgba(0,212,255,0.04),rgba(13,13,20,0.4));
  border:1px solid var(--border-cyan);border-radius:var(--radius-sm);
  padding:9px 12px;display:flex;align-items:center;gap:9px;
}
.prom-module-icon{font-size:14px;flex-shrink:0}
.prom-module-body{flex:1;min-width:0}
.prom-module-name{font-size:9px;font-weight:700;color:var(--cyan-bright);font-family:var(--mono);letter-spacing:0.5px;text-transform:uppercase}
.prom-module-detail{font-size:8px;color:var(--text-muted);font-family:var(--mono);margin-top:2px}
.prom-commands{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.prom-cmd{
  font-size:9px;font-family:var(--mono);color:var(--cyan-bright);
  background:rgba(0,212,255,0.06);padding:4px 10px;border-radius:var(--radius-xs);
  border:1px solid var(--border-cyan);font-weight:700;letter-spacing:0.5px;
  transition:all 0.2s;cursor:default;
}
.prom-cmd:hover{background:rgba(0,212,255,0.14);border-color:var(--cyan);box-shadow:0 0 10px var(--cyan-glow)}

/* === RADAR MULTI-ACTIVO TABLE === */
.radar-table{width:100%;border-collapse:collapse;margin-top:10px;font-family:var(--mono);font-size:10px}
.radar-table th{
  text-align:left;padding:8px 10px;color:var(--text-muted);font-weight:800;
  border-bottom:1px solid var(--border-strong);text-transform:uppercase;
  letter-spacing:1px;font-size:8px;
  background:rgba(6,6,10,0.4);
}
.radar-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text-primary);font-variant-numeric:tabular-nums}
.radar-table tr{transition:background 0.15s}
.radar-table tr:hover{background:rgba(255,140,0,0.05)}
.radar-table tr:last-child td{border-bottom:none}
.radar-score{font-weight:800;font-size:11px;padding:2px 7px;border-radius:var(--radius-xs);display:inline-block}
.radar-score.aplus{color:var(--emerald-bright);background:rgba(0,255,136,0.12);border:1px solid var(--border-emerald);text-shadow:0 0 8px var(--emerald-glow)}
.radar-score.asetup{color:var(--gold-bright);background:rgba(255,140,0,0.12);border:1px solid var(--border-gold)}
.radar-score.low{color:var(--text-muted);background:rgba(255,255,255,0.03)}

.btn-refresh{
  position:fixed;bottom:18px;right:18px;width:46px;height:46px;border-radius:50%;
  background:linear-gradient(135deg,var(--bg-card-solid),var(--bg-elev));
  border:1px solid var(--border-gold);color:var(--gold-bright);font-size:20px;cursor:pointer;z-index:100;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(0,0,0,0.7),0 0 14px rgba(255,140,0,0.25);
  transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.btn-refresh:hover{transform:translateY(-2px) rotate(180deg);box-shadow:0 8px 28px rgba(0,0,0,0.8),0 0 22px rgba(255,140,0,0.5);border-color:var(--gold-bright)}
.btn-refresh:active{transform:translateY(0) rotate(180deg) scale(0.95)}

/* === INSTITUTIONAL === */
.inst-card{
  background:
    radial-gradient(ellipse 60% 80% at 0% 100%, rgba(168,85,247,0.06), transparent 70%),
    linear-gradient(135deg,rgba(18,18,26,0.85) 0%,rgba(13,13,20,0.85) 100%);
  backdrop-filter:blur(14px) saturate(140%);
  -webkit-backdrop-filter:blur(14px) saturate(140%);
  border:1px solid var(--border-purple);
  border-radius:var(--radius);
  padding:14px;margin-bottom:10px;
  box-shadow:var(--shadow-card);
  position:relative;overflow:hidden;
}
.inst-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),var(--cyan),transparent 80%);box-shadow:0 0 8px rgba(168,85,247,0.4)}
.inst-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.inst-item{padding:10px 12px;background:rgba(6,6,10,0.6);border:1px solid var(--border);border-radius:var(--radius-sm);transition:border-color 0.2s;position:relative}
.inst-item:hover{border-color:var(--border-strong)}
.inst-item .inst-label{font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;font-family:var(--mono)}
.inst-item .inst-val{font-size:14px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums;letter-spacing:-0.2px;font-family:var(--mono);color:var(--text-primary)}
.inst-item .inst-hint{font-size:9px;color:var(--text-muted);margin-top:5px;line-height:1.3;font-weight:500;letter-spacing:0.1px}
.inst-item .inst-hint.bull{color:rgba(0,255,136,0.80)}
.inst-item .inst-hint.bear{color:rgba(255,51,102,0.80)}
.inst-item .inst-hint.neutral{color:var(--text-muted)}
.inst-signal{margin-top:10px;padding:10px 12px;background:rgba(6,6,10,0.7);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:10px;font-family:var(--mono)}
.inst-legend{margin-top:10px;padding:10px 12px;background:rgba(6,6,10,0.5);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:9px;color:var(--text-muted);line-height:1.5;letter-spacing:0.1px}
.inst-legend strong{color:var(--gold-bright);font-weight:700}

/* === NEWS === */
.news-item{font-size:10px;padding:7px 0;border-bottom:1px solid var(--border);display:flex;gap:7px;align-items:flex-start;line-height:1.5;font-family:var(--font)}
.news-item:last-child{border:none}
.news-tag{font-weight:800;flex-shrink:0;font-size:8px;padding:2px 6px;border-radius:2px;letter-spacing:1px;font-family:var(--mono)}

/* === IA LOG === */
.ia-log-box{margin-top:10px;padding:10px 12px;background:rgba(6,6,10,0.7);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:10px;color:var(--text-secondary);font-family:var(--mono);line-height:1.5}
.ia-log-box .ia-log-title{color:var(--emerald-bright);margin-bottom:5px;font-weight:800;letter-spacing:1px;font-size:8px;text-transform:uppercase;font-family:var(--mono);text-shadow:0 0 8px var(--emerald-glow)}

/* === FOLD WEIGHT MINI BARS === */
.fold-bars{display:flex;gap:4px;margin-top:7px;height:6px}
.fold-bar{flex:1;background:rgba(255,140,0,0.08);border-radius:1px;overflow:hidden;border:1px solid var(--border)}
.fold-bar-fill{height:100%;border-radius:1px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 6px currentColor}

/* === SECTION DIVIDER === */
.section-label{
  font-size:9px;font-weight:800;color:var(--gold-bright);
  text-transform:uppercase;letter-spacing:2.5px;
  font-family:var(--mono);margin:14px 4px 8px;
  display:flex;align-items:center;gap:10px;
  text-shadow:0 0 10px var(--gold-glow);
}
.section-label::before,.section-label::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--border-strong),transparent);
}

<script>
const HE=typeof window.EMBEDDED_DATA!=='undefined';
const TZ='America/Lima';
let pt,dash,an,ts,B,cP;
let cC=[],cS=null,cO=null;
let wsPrice=null,wsKline=null,prevPrice=null;

function nowLima(){return new Date().toLocaleString('es-PE',{timeZone:TZ,hour:'2-digit',minute:'2-digit',second:'2-digit'})}
function fmt(n,d=2){return n==null?'—':n.toLocaleString('en-US',{maximumFractionDigits:d,minimumFractionDigits:d})}
function usd(n,d=0){return n==null?'—':'$'+n.toLocaleString('en-US',{maximumFractionDigits:d,minimumFractionDigits:d})}
function pct(n,d=2){return n==null?'—':(n*100).toFixed(d)+'%'}
function iRSI(v){if(v==null)return'—';if(v>70)return'Sobrecomprado';if(v<30)return'Sobrevendido';return'Neutral'}
function iVol(v){if(v==null)return'—';const p=v*100;if(p<0.2)return'Clima Calmado';if(p<0.5)return'Clima Normal';return'Clima Volátil'}
function iFG(v){if(v==null)return'—';if(v<=25)return'Miedo Extremo';if(v<=45)return'Miedo';if(v<=55)return'Neutral';if(v<=75)return'Codicia';return'Euforia'}
function iRegime(r){return r?r.replace('TREND_','').replace('_',' '):'—'}
function calcEMA(v,p){const k=2/(p+1),o=[];let e=null;for(let i=0;i<v.length;i++){if(i<p-1){o.push(null);continue}if(e===null){e=v.slice(0,p).reduce((a,b)=>a+b,0)/p}else{e=v[i]*k+e*(1-k)}o.push(e)}return o}
function calcRSI(c,p){const o=[null];let ag=0,al=0;for(let i=1;i<c.length;i++){const ch=c[i]-c[i-1],g=ch>0?ch:0,l=ch<0?Math.abs(ch):0;if(i<=p){ag+=g;al+=l;if(i===p){ag/=p;al/=p;o.push(al===0?100:100-100/(1+ag/al))}else o.push(null)}else{ag=(ag*(p-1)+g)/p;al=(al*(p-1)+l)/p;o.push(al===0?100:100-100/(1+ag/al))}}return o}

// === LOGO LLAMA SVG (PROMETHEUS) ===
const FLAME_SVG='<svg class="logo-svg" viewBox="0 0 36 44" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">'+
'<defs>'+
'<linearGradient id="flameGrad" x1="18" y1="44" x2="18" y2="2" gradientUnits="userSpaceOnUse">'+
'<stop offset="0" stop-color="#ff4d00"/>'+
'<stop offset="0.45" stop-color="#ff8c00"/>'+
'<stop offset="0.8" stop-color="#ffb733"/>'+
'<stop offset="1" stop-color="#ffe89c"/>'+
'</linearGradient>'+
'<linearGradient id="flameInner" x1="18" y1="40" x2="18" y2="14" gradientUnits="userSpaceOnUse">'+
'<stop offset="0" stop-color="#ffb733"/>'+
'<stop offset="1" stop-color="#fff5d6"/>'+
'</linearGradient>'+
'</defs>'+
'<path class="flame-outer" d="M18 2 C 20 10, 30 14, 30 26 C 30 36, 24 42, 18 42 C 12 42, 6 36, 6 26 C 6 18, 12 16, 14 10 C 15 14, 17 15, 18 2 Z" fill="url(#flameGrad)"/>'+
'<path d="M18 16 C 19 20, 24 22, 24 28 C 24 33, 21 36, 18 36 C 15 36, 12 33, 12 28 C 12 24, 15 23, 16 19 C 16.5 21, 17.5 21, 18 16 Z" fill="url(#flameInner)" opacity="0.92"/>'+
'<circle cx="18" cy="31" r="2.2" fill="#fff5d6" opacity="0.85"/>'+

// === DRAW CHART (premium, con fixes de bugs) ===
function drawChart(cv,c,e30v,e100v,en,sl,tp,dir){
  const ctx=cv.getContext('2d'),dpr=window.devicePixelRatio||1,
    W=cv.clientWidth,H=cv.clientHeight;
  cv.width=W*dpr;cv.height=H*dpr;
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  if(!c||!c.length)return;

  const pL=10,pR=74,pT=12,pB=30;
  const cw=W-pL-pR,ch=H-pT-pB;
  const vis=c.slice(-100);
  const cW=cw/vis.length;
  const bW=Math.max(2,Math.min(11,cW*0.62));

  // Pre-calcular EMAs (una sola vez)
  const e30Arr = e30v!=null ? calcEMA(c.map(x=>x.close),30) : null;
  const e100Arr = e100v!=null ? calcEMA(c.map(x=>x.close),100) : null;

  // Min/max incluyendo todo
  let mn=Infinity,mx=-Infinity;
  vis.forEach(x=>{if(x.low<mn)mn=x.low;if(x.high>mx)mx=x.high});
  if(e30Arr){for(let i=0;i<vis.length;i++){const v=e30Arr[c.length-vis.length+i];if(v!=null){if(v<mn)mn=v;if(v>mx)mx=v}}}
  if(e100Arr){for(let i=0;i<vis.length;i++){const v=e100Arr[c.length-vis.length+i];if(v!=null){if(v<mn)mn=v;if(v>mx)mx=v}}}
  if(en){if(en<mn)mn=en;if(en>mx)mx=en}
  if(sl){if(sl<mn)mn=sl;if(sl>mx)mx=sl}
  if(tp){if(tp<mn)mn=tp;if(tp>mx)mx=tp}
  if(prevPrice!=null){if(prevPrice<mn)mn=prevPrice;if(prevPrice>mx)mx=prevPrice}
  const rg=mx-mn;
  if(rg<0.001){mn-=1;mx+=1}
  const pad=(mx-mn)*0.06;
  mn-=pad;mx+=pad;
  const py=p=>pT+ch-((p-mn)/(mx-mn))*ch;

  // Fondo sutil con gradiente (fire-tinted)
  const bgGrad=ctx.createLinearGradient(0,pT,0,pT+ch);
  bgGrad.addColorStop(0,'rgba(255,140,0,0.025)');
  bgGrad.addColorStop(0.5,'rgba(0,0,0,0)');
  bgGrad.addColorStop(1,'rgba(168,85,247,0.020)');
  ctx.fillStyle=bgGrad;
  ctx.fillRect(pL,pT,cw,ch);

  // Grid horizontal sutil + labels de precio
  ctx.font='10px "JetBrains Mono", ui-monospace, monospace';
  ctx.textBaseline='middle';
  ctx.textAlign='left';
  const ySteps=5;
  for(let i=0;i<=ySteps;i++){
    const y=pT+(ch/ySteps)*i;
    ctx.strokeStyle='rgba(255,140,0,0.06)';
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(pL,y);
    ctx.lineTo(pL+cw,y);
    ctx.stroke();
    const val=mx-((mx-mn)/ySteps)*i;
    ctx.fillStyle='#5a5a6e';
    ctx.fillText('$'+val.toLocaleString('en-US',{maximumFractionDigits:0}),pL+cw+6,y);
  }

  // Grid vertical + labels de tiempo (responsive: menos labels en móvil, formato corto)
  const labelCount = W<440 ? 3 : (W<760 ? 4 : 6);
  const step = Math.max(1, Math.ceil(vis.length / labelCount));
  ctx.textAlign='center';
  for(let i=0;i<vis.length;i+=step){
    const x=pL+i*cW+cW/2;
    ctx.strokeStyle='rgba(255,140,0,0.035)';
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(x,pT);
    ctx.lineTo(x,pT+ch);
    ctx.stroke();
    const d=new Date(vis[i].timestamp);
    const timeStr=d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:TZ});
    const dateStr=d.toLocaleDateString('en-US',{day:'2-digit',month:'short',timeZone:TZ});
    ctx.fillStyle='#5a5a6e';
    ctx.fillText(timeStr,x,pT+ch+12);
    if(W>=460) ctx.fillText(dateStr,x,pT+ch+24);
  }
  ctx.textAlign='left';
  ctx.textBaseline='alphabetic';

  // Velas (con glow en última vela, mejor renderizado)
  vis.forEach((x,i)=>{
    const xx=pL+i*cW+cW/2;
    const up=x.close>=x.open;
    const col=up?'#00ff88':'#ff3366';
    // Wick
    ctx.strokeStyle=col;
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(xx,py(x.high));
    ctx.lineTo(xx,py(x.low));
    ctx.stroke();
    // Body
    const yO=py(x.open),yC=py(x.close);
    const bh=Math.max(1,Math.abs(yC-yO));
    const bodyTop=Math.min(yO,yC);
    const isLast=(i===vis.length-1);
    if(isLast){
      ctx.shadowColor=col;
      ctx.shadowBlur=12;
    }
    ctx.fillStyle=col;
    ctx.fillRect(xx-bW/2,bodyTop,bW,bh);
    ctx.shadowBlur=0;
    // Borde sutil para body (mejor proporción visual)
    if(bh>2){
      ctx.strokeStyle=col;
      ctx.lineWidth=1;
      ctx.strokeRect(xx-bW/2+0.5,bodyTop+0.5,bW-1,bh-1);
    }
  });

  // EMA30 (ámbar fuego) — FIX: saltar nulls correctamente rompiendo el path
  if(e30Arr){
    ctx.strokeStyle='#ffb733';
    ctx.lineWidth=1.8;
    ctx.shadowColor='rgba(255,183,51,0.6)';
    ctx.shadowBlur=5;
    ctx.beginPath();
    let started=false;
    for(let i=0;i<vis.length;i++){
      const v=e30Arr[c.length-vis.length+i];
      if(v==null){started=false;continue}
      const xx=pL+i*cW+cW/2,y=py(v);
      if(!started){ctx.moveTo(xx,y);started=true}
      else ctx.lineTo(xx,y);
    }
    ctx.stroke();
    ctx.shadowBlur=0;
  }

  // EMA100 (púrpura) — FIX: saltar nulls correctamente rompiendo el path
  if(e100Arr){
    ctx.strokeStyle='#a855f7';
    ctx.lineWidth=1.8;
    ctx.shadowColor='rgba(168,85,247,0.6)';
    ctx.shadowBlur=5;
    ctx.beginPath();
    let started=false;
    for(let i=0;i<vis.length;i++){
      const v=e100Arr[c.length-vis.length+i];
      if(v==null){started=false;continue}
      const xx=pL+i*cW+cW/2,y=py(v);
      if(!started){ctx.moveTo(xx,y);started=true}
      else ctx.lineTo(xx,y);
    }
    ctx.stroke();
    ctx.shadowBlur=0;
  }

  // Entry line — FIX: label compacto
  if(en&&en>0){
    const y=py(en);
    const dc=dir==='LONG'?'#00ff88':dir==='SHORT'?'#ff3366':'#8888a0';
    ctx.strokeStyle=dc;
    ctx.lineWidth=1.5;
    ctx.setLineDash([5,3]);
    ctx.beginPath();
    ctx.moveTo(pL,y);
    ctx.lineTo(pL+cw,y);
    ctx.stroke();
    ctx.setLineDash([]);
    // Label compacto: "E 60,534"
    ctx.fillStyle=dc;
    ctx.font='bold 10px "JetBrains Mono", ui-monospace, monospace';
    ctx.textBaseline='middle';
    const lbl='E '+en.toLocaleString('en-US',{maximumFractionDigits:0});
    ctx.fillText(lbl,pL+cw+6,y);
    ctx.textBaseline='alphabetic';
  }

  // SL line
  if(sl&&sl>0){
    const y=py(sl);
    ctx.strokeStyle='rgba(255,51,102,0.75)';
    ctx.lineWidth=1;
    ctx.setLineDash([3,3]);
    ctx.beginPath();
    ctx.moveTo(pL,y);
    ctx.lineTo(pL+cw,y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#ff4477';
    ctx.font='bold 9px "JetBrains Mono", ui-monospace, monospace';
    ctx.textBaseline='middle';
    ctx.fillText('SL',pL+cw+6,y);
    ctx.textBaseline='alphabetic';
  }

  // TP line
  if(tp&&tp>0){
    const y=py(tp);
    ctx.strokeStyle='rgba(0,255,136,0.75)';
    ctx.lineWidth=1;
    ctx.setLineDash([3,3]);
    ctx.beginPath();
    ctx.moveTo(pL,y);
    ctx.lineTo(pL+cw,y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#00ff88';
    ctx.font='bold 9px "JetBrains Mono", ui-monospace, monospace';
    ctx.textBaseline='middle';
    ctx.fillText('TP',pL+cw+6,y);
    ctx.textBaseline='alphabetic';
  }

  // Línea de precio actual en tiempo real (cyan, animada visualmente con badge)
  if(prevPrice!=null&&prevPrice>=mn&&prevPrice<=mx){
    const y=py(prevPrice);
    ctx.strokeStyle='#00d4ff';
    ctx.lineWidth=1.2;
    ctx.setLineDash([2,3]);
    ctx.beginPath();
    ctx.moveTo(pL,y);
    ctx.lineTo(pL+cw,y);
    ctx.stroke();
    ctx.setLineDash([]);
    // Badge con precio live
    const lbl='$'+prevPrice.toLocaleString('en-US',{maximumFractionDigits:0});
    ctx.font='bold 10px "JetBrains Mono", ui-monospace, monospace';
    const tw=ctx.measureText(lbl).width;
    ctx.fillStyle='#00d4ff';
    ctx.fillRect(pL+cw+2,y-8,tw+10,16);
    ctx.fillStyle='#0a0a0f';
    ctx.textBaseline='middle';
    ctx.fillText(lbl,pL+cw+7,y);
    ctx.textBaseline='alphabetic';
  }
}

// === DRAW RSI (premium) ===
function drawRSI(cv,c){
  const ctx=cv.getContext('2d'),dpr=window.devicePixelRatio||1,
    W=cv.clientWidth,H=cv.clientHeight;
  cv.width=W*dpr;cv.height=H*dpr;
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  if(!c||!c.length)return;

  const pL=10,pR=74,pT=8,pB=8;
  const cw=W-pL-pR,ch=H-pT-pB;
  const vis=c.slice(-100);
  const cW=cw/vis.length;
  const r=calcRSI(c.map(x=>x.close),14);

  // Zonas overbought / oversold
  const obZone=ctx.createLinearGradient(0,pT,0,pT+ch*0.3);
  obZone.addColorStop(0,'rgba(255,51,102,0.14)');
  obZone.addColorStop(1,'rgba(255,51,102,0)');
  ctx.fillStyle=obZone;
  ctx.fillRect(pL,pT,cw,ch*0.3);

  const osZone=ctx.createLinearGradient(0,pT+ch*0.7,0,pT+ch);
  osZone.addColorStop(0,'rgba(0,255,136,0)');
  osZone.addColorStop(1,'rgba(0,255,136,0.14)');
  ctx.fillStyle=osZone;
  ctx.fillRect(pL,pT+ch*0.7,cw,ch*0.3);

  // Niveles 30 / 50 / 70
  [30,50,70].forEach(v=>{
    const y=pT+ch-(v/100)*ch;
    ctx.strokeStyle=v===50?'rgba(255,140,0,0.15)':(v===70?'rgba(255,51,102,0.3)':'rgba(0,255,136,0.3)');
    ctx.setLineDash(v===50?[]:[3,3]);
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(pL,y);
    ctx.lineTo(pL+cw,y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=v===50?'#5a5a6e':(v===70?'#ff4477':'#00ff88');
    ctx.font='bold 9px "JetBrains Mono", ui-monospace, monospace';
    ctx.textBaseline='middle';
    ctx.fillText(v.toString(),pL+cw+6,y);
    ctx.textBaseline='alphabetic';
  });

  // Línea RSI (cyan eléctrico) — FIX: saltar nulls correctamente
  ctx.strokeStyle='#00d4ff';
  ctx.lineWidth=1.8;
  ctx.shadowColor='rgba(0,212,255,0.6)';
  ctx.shadowBlur=6;
  ctx.beginPath();
  let started=false;
  for(let i=0;i<vis.length;i++){
    const v=r[c.length-vis.length+i];
    if(v==null){started=false;continue}
    const xx=pL+i*cW+cW/2,y=pT+ch-(v/100)*ch;
    if(!started){ctx.moveTo(xx,y);started=true}
    else ctx.lineTo(xx,y);
  }
  ctx.stroke();
  ctx.shadowBlur=0;

  // Punto en el valor actual de RSI
  const lastV=r[r.length-1];
  if(lastV!=null){
    const xx=pL+(vis.length-1)*cW+cW/2;
    const y=pT+ch-(lastV/100)*ch;
    ctx.fillStyle='#00d4ff';
    ctx.shadowColor='#00d4ff';
    ctx.shadowBlur=12;
    ctx.beginPath();
    ctx.arc(xx,y,3.5,0,Math.PI*2);
    ctx.fill();
    ctx.shadowBlur=0;
    // Badge con valor
    const lbl=lastV.toFixed(1);
    ctx.font='bold 10px "JetBrains Mono", ui-monospace, monospace';
    const tw=ctx.measureText(lbl).width;
    ctx.fillStyle='#00d4ff';
    ctx.fillRect(pL+cw+2,y-8,tw+10,16);
    ctx.fillStyle='#0a0a0f';
    ctx.textBaseline='middle';
    ctx.fillText(lbl,pL+cw+7,y);
    ctx.textBaseline='alphabetic';
  }
}

// === WEBSOCKET BINANCE (PRECIO EN TIEMPO REAL) ===
function initWebSocket(){
  wsPrice = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
  wsPrice.onmessage = (event) => {
    try {
      const d = JSON.parse(event.data);
      if(d.c){
        const price = parseFloat(d.c);
        const change = parseFloat(d.P);
        const high = parseFloat(d.h);
        const low = parseFloat(d.l);
        const vol = parseFloat(d.q);
        updateLivePrice(price, change, high, low, vol);
      }
    } catch(e){}
  };
  wsPrice.onclose = () => { setTimeout(initWebSocket, 3000); };
  wsPrice.onerror = () => { wsPrice.close(); };

  wsKline = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@kline_4h');
  // FIX P0-26: ANTES el handler era una función anónima reasignada, lo que rompía el reconnect.
  // El handler onclose hacía: wsKline.onmessage = wsKline.onmessage
  // Pero wsKline.onmessage ya era `undefined` en el nuevo objeto → chart se congelaba.
  // AHORA: extraer el handler a una función con nombre y reasignarla correctamente.
  const handleKlineMessage = (event) => {
    try {
      const d = JSON.parse(event.data);
      if(d.k){
        const k = d.k;
        const isClosed = k.x;
        const candle = { open: parseFloat(k.o), high: parseFloat(k.h), low: parseFloat(k.l), close: parseFloat(k.c), volume: parseFloat(k.v), timestamp: k.t };
        updateChart(candle, isClosed);
      }
    } catch(e){}
  };
  wsKline.onmessage = handleKlineMessage;
  wsKline.onclose = () => {
    setTimeout(() => {
      wsKline = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@kline_4h');
      // FIX P0-26: reasignar el handler CON NOMBRE (no wsKline.onmessage = wsKline.onmessage)
      wsKline.onmessage = handleKlineMessage;
      wsKline.onclose = arguments.callee; // permitir múltiples reconnects
      wsKline.onerror = () => { wsKline.close(); };
    }, 3000);
  };
  wsKline.onerror = () => { wsKline.close(); };
}

function updateLivePrice(price, changePct, high, low, vol){
  const pv = document.getElementById('livePrice');
  const pc = document.getElementById('liveChange');
  const ps = document.getElementById('liveStats');
  const li = document.getElementById('liveIndicator');

  if(pv){
    pv.textContent = usd(price, 0);
    if(prevPrice !== null){
      if(price > prevPrice) pv.className = 'price-value up flash tnum';
      else if(price < prevPrice) pv.className = 'price-value down flash tnum';
      else pv.className = 'price-value tnum';
    }
    prevPrice = price;
    setTimeout(() => { if(pv) pv.className = 'price-value ' + (changePct >= 0 ? 'up' : 'down') + ' tnum'; }, 400);
  }
  if(pc){
    const isUp = changePct >= 0;
    pc.textContent = (isUp ? '▲' : '▼') + ' ' + changePct.toFixed(2) + '%';
    pc.className = 'price-change ' + (isUp ? 'up' : 'down');
  }
  if(ps){
    ps.innerHTML = '<span>H: ' + usd(high, 0) + '</span><span>L: ' + usd(low, 0) + '</span><span>Vol: $' + (vol / 1e9).toFixed(2) + 'B</span>';
  }
  if(li){
    li.textContent = 'EN VIVO · ' + nowLima();
  }
  const cp = document.getElementById('currentPriceDisplay');
  if(cp) cp.textContent = usd(price, 0);
  if(cO && cO.entryPrice){
    const isLong = cO.direction === 'LONG';
    const priceDiff = isLong ? (price - cO.entryPrice) : (cO.entryPrice - price);
    const livePnl = (cO.sizeBtc || 0) * priceDiff;
    const livePct = cO.sizeUsd > 0 ? (livePnl / cO.sizeUsd) * 100 : 0;
    const pnlEl = document.getElementById('pnlDisplay');
    if(pnlEl){
      const pnlColor = livePnl >= 0 ? 'var(--emerald-bright)' : 'var(--red-bright)';
      const pnlSign = livePnl >= 0 ? '+' : '';
      pnlEl.style.color = pnlColor;
      pnlEl.textContent = pnlSign + fmt(livePnl, 4) + ' (' + livePct.toFixed(2) + '%)';
    }
    const eqEl = document.getElementById('equityDisplay');
    if(eqEl && cP && cP.currentBalance){
      const liveEquity = cP.currentBalance + livePnl;
      eqEl.textContent = usd(liveEquity, 2);
    }
  }
  // Actualizar línea de precio live en la gráfica
  const cc = document.getElementById('chart');
  if(cc && cS && cC.length>0){
    drawChart(cc, cC, cS.ema30, cS.ema100, cO?.entryPrice||null, cO?.stopLoss||null, cO?.takeProfit1||null, cO?.direction||cS.direction);
  }
}

function updateChart(candle, isClosed){
  if(!cC || cC.length === 0) return;
  if(isClosed){
    cC.push(candle);
    if(cC.length > 200) cC.shift();
  } else {
    const last = cC[cC.length - 1];
    if(last && last.timestamp === candle.timestamp){

  h+='<div class="inst-item" style="grid-column:span 2"><div class="inst-label">CVD (Cumulative Volume Delta)</div><div class="inst-val" style="text-transform:uppercase;letter-spacing:0.5px;font-size:13px;color:'+cvdCol+'">'+cvdArrow+' '+inst.cvd.trend+divMark+(inst.cvd.divergence?' <span style="color:var(--gold-bright);font-size:10px;font-weight:700">(DIVERGENCE)</span>':'')+'</div>'+cvdHint+'</div>';
  h+='</div>';
  if(sigI.reasons.length>0){
    h+='<div class="inst-signal"><div style="color:'+biasCls+';margin-bottom:4px;font-weight:800;font-size:10px;letter-spacing:0.6px;text-transform:uppercase">Señal: '+sigI.bias.toUpperCase()+'</div>'+sigI.reasons.map(r=>'<div style="color:var(--text-secondary);margin:2px 0;font-size:10px;line-height:1.4">• '+r+'</div>').join('')+'</div>';
  }
  h+='<div class="inst-legend"><strong>Cómo leer:</strong> L=Longs (compradores) · S=Shorts (vendedores) · CVD=dirección del flujo de órdenes · Funding=costo de mantener posición perpetua. <strong style="color:var(--emerald-bright)">Verde</strong>=favorable alcista · <strong style="color:var(--red-bright)">Rojo</strong>=favorable bajista.</div>';
  h+='</div>';
}

// === TRADE HISTORY (mini tabla con últimos 5 trades cerrados) ===
var closedTradesList=pt.closedTrades||[];
if(closedTradesList.length>0){
  h+='<div class="section-label">Trade History</div>';
  h+='<div class="card" style="margin-bottom:10px"><div class="card-header"><span class="card-tag">TRADE HISTORY · ÚLTIMOS '+Math.min(closedTradesList.length,5)+'</span><span class="card-ticker">CLOSED</span></div>';
  h+='<div style="font-size:9px;font-family:var(--mono)">';
  h+='<div style="display:grid;grid-template-columns:42px 48px 1fr 1fr 60px 40px;gap:4px;padding:5px 6px;border-bottom:1px solid var(--border);color:var(--text-muted);font-weight:800;letter-spacing:0.6px;text-transform:uppercase;font-size:8px"><span>DIR</span><span>RESULT</span><span>ENTRY</span><span>EXIT</span><span>PnL</span><span>LEV</span></div>';
  closedTradesList.slice(0,5).forEach(function(t){
    var isW=(t.pnlUsd||0)>=0;
    var resCol=t.status==='CLOSED_TP'?'var(--emerald-bright)':t.status==='CLOSED_SL'?'var(--red-bright)':t.status==='CLOSED_TRAIL'?'var(--cyan-bright)':'var(--text-secondary)';
    var resTxt=t.status==='CLOSED_TP'?'TP':t.status==='CLOSED_SL'?'SL':t.status==='CLOSED_TRAIL'?'TRL':t.status==='CLOSED_MANUAL'?'MAN':t.status==='CLOSED_TIMEOUT'?'TMO':'—';
    var dirCol=t.direction==='LONG'?'var(--emerald-bright)':'var(--red-bright)';
    h+='<div style="display:grid;grid-template-columns:42px 48px 1fr 1fr 60px 40px;gap:4px;padding:4px 6px;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums">';
    h+='<span style="color:'+dirCol+';font-weight:800">'+t.direction+'</span>';
    h+='<span style="color:'+resCol+';font-weight:800">'+resTxt+'</span>';
    h+='<span style="color:var(--text-secondary)">$'+Math.round(t.entryPrice).toLocaleString()+'</span>';
    h+='<span style="color:var(--text-secondary)">$'+(t.exitPrice?Math.round(t.exitPrice).toLocaleString():'—')+'</span>';
    h+='<span style="color:'+(isW?'var(--emerald-bright)':'var(--red-bright)')+';font-weight:800">'+(isW?'+':'')+'\$'+(t.pnlUsd||0).toFixed(3)+'</span>';
    h+='<span style="color:var(--gold-bright)">'+(t.leverage||1)+'x</span>';
    h+='</div>';
  });
  h+='</div></div>';
}
// === EQUITY SPARKLINE (mini gráfico del equity en el tiempo) ===
var eqPoints=closedTradesList.slice(0,10).reverse().map(function(t){return t.pnlUsd||0});
if(eqPoints.length>1){
  var cumEq=p.initialCapital;
  var eqCurve=eqPoints.map(function(pnl){cumEq+=pnl;return cumEq});
  eqCurve.push(p.equity);
  var minEq=Math.min.apply(null,eqCurve),maxEq=Math.max.apply(null,eqCurve);
  var eqRange=maxEq-minEq||1;
  var sw=200,sh=44;
  var eqPts=eqCurve.map(function(v,i){
    var x=(i/(eqCurve.length-1))*sw;
    var y=sh-((v-minEq)/eqRange)*sh;
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
  var eqCol=p.equity>=p.initialCapital?'var(--emerald-bright)':'var(--red-bright)';
  var eqFill=p.equity>=p.initialCapital?'rgba(0,255,136,0.12)':'rgba(255,51,102,0.12)';
  h+='<div class="card" style="margin-bottom:10px"><div class="card-header"><span class="card-tag">EQUITY CURVE · '+eqCurve.length+' PUNTOS</span><span class="card-ticker" style="color:'+eqCol+'">'+usd(p.equity,2)+'</span></div>';
  h+='<svg width="100%" height="'+sh+'" viewBox="0 0 '+sw+' '+sh+'" preserveAspectRatio="none" style="display:block">';
  h+='<polygon points="0,'+sh+' '+eqPts+' '+sw+','+sh+'" fill="'+eqFill+'" stroke="none"/>';
  h+='<polyline points="'+eqPts+'" fill="none" stroke="'+eqCol+'" stroke-width="1.8" stroke-linejoin="round" style="filter:drop-shadow(0 0 4px currentColor)"/>';
  h+='</svg>';
  h+='<div style="display:flex;justify-content:space-between;font-size:8px;color:var(--text-muted);font-family:var(--mono);margin-top:4px"><span>$'+minEq.toFixed(2)+'</span><span>$'+maxEq.toFixed(2)+'</span></div>';
  h+='</div>';
}

// === FOOTER ===
h+='<div class="footer"><div class="footer-status"><span><span class="status-dot ok"></span>DB CONNECTED</span><span><span class="status-dot ok"></span>IA LOADED</span><span><span class="status-dot ok"></span>WEBSOCKET LIVE</span><span><span class="status-dot ok"></span>CRON 2MIN</span></div>PROMETHEUS · LSTM + Chronos + Order Flow + Bayesian + Kelly · <span>11-LAYER AI ENSEMBLE</span><br>Hora Perú: '+nowLima()+' · Bot: <a href="https://t.me/yendriel_bot" target="_blank" rel="noopener" style="color:var(--cyan-bright);text-decoration:underline;">@yendriel_bot</a> → /status /paper /analisis /backtest /learning /journal /risk /reset</div>';
app.innerHTML=h;
if(window.updateIAAlive)updateIAAlive(pt,sig,ev,pt.ensembleState);
if(!wsPrice) initWebSocket();
setTimeout(()=>{const cc=document.getElementById('chart'),rc=document.getElementById('rsiChart');if(cc&&cC.length>0&&cS)drawChart(cc,cC,cS.ema30,cS.ema100,cO?.entryPrice||null,cO?.stopLoss||null,cO?.takeProfit1||null,cO?.direction||cS.direction);if(rc&&cC.length>0)drawRSI(rc,cC)},50);
setTimeout(rotateIALog,5000);setTimeout(()=>loadData(true),15000);
}catch(e){
  // FIX UX: En auto-refresh, NO mostrar pantalla de error completa (rompe la lectura)
  // Solo loguear en consola y reintentar silenciosamente
  if(isAutoRefresh){
    console.warn('Auto-refresh falló (reintentando en 15s):',e.message);
    setTimeout(()=>loadData(true),15000);
  } else {
    app.innerHTML='<div style="text-align:center;padding:60px;color:var(--text-secondary)"><p style="font-size:14px;color:var(--red-bright);font-weight:700">⚠ '+e.message+'</p><p style="font-size:11px;margin-top:8px">Reintentando en 10s…</p></div>';setTimeout(()=>loadData(false),10000);
  }
}
}
window.addEventListener('resize',()=>{setTimeout(()=>{const cc=document.getElementById('chart'),rc=document.getElementById('rsiChart');if(cc&&cC.length>0&&cS)drawChart(cc,cC,cS.ema30,cS.ema100,cO?.entryPrice||null,cO?.stopLoss||null,cO?.takeProfit1||null,cO?.direction||cS.direction);if(rc&&cC.length>0)drawRSI(rc,cC)},100)});

function rotateIALog(){var l=document.getElementById('iaLog');if(!l)return;var m=['● IA monitoreando mercado... ● WebSocket conectado ● Esperando señal EMA 30/100','● LSTM v4 procesando velas 5m... ● 3 folds activos ● Scaler normalizando input','● Cubo multitemporal 24x4x5 construido ● Contexto diario calculado ● Listo para predecir','● Feedback loop: evaluando predicciones pasadas ● Pesos adaptativos: activos ● Ensemble: operacional','● OKX API: conectada ● Neon DB: conectada ● Telegram: webhook activo ● 24/7 operacional'];l.textContent=m[Math.floor(Date.now()/5000)%m.length];setTimeout(rotateIALog,5000)}

loadData();
</script>
