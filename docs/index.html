<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="description" content="PROMETHEUS — Intelligent Trading Terminal · 11-Layer AI Ensemble (LSTM + Chronos + Bayesian + Order Flow + Kelly)"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<title>PROMETHEUS · Intelligent Trading Terminal</title>
<!-- EMBEDDED_DATA -->
<style>
:root{
  --bg-base:#0a0a0f;
  --bg-elev:#0d0d14;
  --bg-card:#12121a;
  --bg-inset:#060609;
  --bg-hover:rgba(255,140,0,0.06);
  --border:rgba(255,140,0,0.15);
  --border-strong:rgba(255,183,51,0.28);
  --border-emerald:rgba(0,255,136,0.32);
  --border-red:rgba(255,51,102,0.32);
  --border-cyan:rgba(0,212,255,0.30);
  --text-primary:#e0e0e8;
  --text-secondary:#8888a0;
  --text-muted:#555568;
  --gold:#ff8c00;
  --gold-bright:#ffb733;
  --gold-glow:rgba(255,140,0,0.30);
  --cyan:#00d4ff;
  --cyan-bright:#44e0ff;
  --cyan-glow:rgba(0,212,255,0.30);
  --emerald:#00ff88;
  --emerald-bright:#00ff88;
  --emerald-glow:rgba(0,255,136,0.35);
  --red:#ff3366;
  --red-bright:#ff4477;
  --red-glow:rgba(255,51,102,0.35);
  --purple:#a855f7;
  --shadow-card:0 4px 16px rgba(0,0,0,0.6),0 0 0 1px rgba(255,140,0,0.05);
  --shadow-glow:0 0 24px rgba(255,140,0,0.08);
  --radius:10px;
  --radius-sm:6px;
  --radius-xs:3px;
  --font:'Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;
  --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:var(--font);-webkit-font-smoothing:antialiased}
html,body{background:var(--bg-base)}
body{
  background:
    radial-gradient(ellipse 90% 60% at 50% -10%, rgba(255,140,0,0.07), transparent 55%),
    radial-gradient(ellipse 50% 40% at 100% 100%, rgba(0,212,255,0.04), transparent 60%),
    linear-gradient(180deg,#0a0a0f 0%,#0d0d14 100%);
  background-attachment:fixed;
  color:var(--text-primary);
  min-height:100vh;
  padding:10px;
  font-feature-settings:'tnum' 1;
  font-size:12px;
  line-height:1.45;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(255,140,0,0.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,140,0,0.018) 1px,transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 80% 60% at 50% 30%,#000 30%,transparent 90%);
  -webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 30%,#000 30%,transparent 90%);
}
#app{position:relative;z-index:1;max-width:1600px;margin:0 auto}
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:'tnum' 1}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

/* === LOADING === */
.loading{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:70vh;gap:18px;color:var(--text-secondary);
}
.spinner{
  width:46px;height:46px;border-radius:50%;
  border:2px solid rgba(255,140,0,0.15);
  border-top-color:var(--gold-bright);
  border-right-color:var(--cyan);
  animation:spin 0.9s linear infinite;
  box-shadow:0 0 24px var(--gold-glow);
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:11px;letter-spacing:2px;text-transform:uppercase;font-family:var(--mono);color:var(--gold-bright)}

/* === REFRESH BUTTON === */
.btn-refresh{
  position:fixed;top:14px;right:14px;z-index:100;
  width:36px;height:36px;border-radius:50%;
  background:rgba(13,13,20,0.92);
  border:1px solid var(--border-strong);
  color:var(--gold-bright);
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-card);
  transition:transform 0.3s,box-shadow 0.3s;
}
.btn-refresh:hover{transform:rotate(180deg);box-shadow:var(--shadow-card),var(--shadow-glow)}

/* === HEADER === */
.hdr{
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;gap:18px;
  padding:12px 18px;
  background:linear-gradient(135deg,rgba(18,18,26,0.94) 0%,rgba(13,13,20,0.94) 100%);
  border:1px solid var(--border-strong);
  border-radius:var(--radius);
  margin-bottom:10px;
  box-shadow:var(--shadow-card);
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
}
.hdr::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 5%,rgba(255,140,0,0.7) 25%,rgba(255,183,51,0.5) 50%,rgba(0,212,255,0.4) 75%,transparent 95%);
}
.hdr-left{display:flex;align-items:center;gap:14px}
.hdr-brand{display:flex;flex-direction:column;line-height:1}
.hdr-name{
  font-family:var(--mono);font-weight:900;font-size:19px;letter-spacing:3px;
  background:linear-gradient(135deg,#ffb733 0%,#ff8c00 60%,#ff6a00 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:0 0 24px rgba(255,140,0,0.25);
}
.hdr-tagline{
  font-family:var(--mono);font-size:8px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--text-muted);font-weight:700;margin-top:4px;
}
.hdr-mid{display:flex;align-items:center;justify-content:center;gap:14px}
.hdr-equity{
  display:flex;flex-direction:column;align-items:center;line-height:1;
}
.hdr-equity-lbl{
  font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;
  color:var(--text-muted);font-weight:700;margin-bottom:5px;
}
.hdr-equity-val{
  font-family:var(--mono);font-weight:800;font-size:28px;letter-spacing:-0.5px;
  color:var(--gold-bright);text-shadow:0 0 18px rgba(255,140,0,0.35);
  font-variant-numeric:tabular-nums;
}
.hdr-equity-chg{
  font-family:var(--mono);font-weight:700;font-size:11px;margin-top:5px;
  font-variant-numeric:tabular-nums;letter-spacing:0.3px;
}
.hdr-equity-chg.up{color:var(--emerald-bright)}
.hdr-equity-chg.down{color:var(--red-bright)}
.hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.sys-chip{
  display:flex;align-items:center;gap:5px;
  padding:5px 9px;
  background:rgba(6,6,10,0.6);
  border:1px solid var(--border);
  border-radius:var(--radius-xs);
  font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;
  color:var(--text-secondary);text-transform:uppercase;
}
.sys-chip .dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
}
.sys-chip.ok .dot{background:var(--emerald);box-shadow:0 0 6px var(--emerald)}
.sys-chip.ok{color:var(--emerald-bright);border-color:var(--border-emerald)}
.sys-chip.warn .dot{background:var(--gold-bright);box-shadow:0 0 6px var(--gold-bright)}
.sys-chip.warn{color:var(--gold-bright);border-color:var(--border-strong)}
.sys-chip.err .dot{background:var(--red);box-shadow:0 0 6px var(--red)}
.sys-chip.err{color:var(--red-bright);border-color:var(--border-red)}
.live{
  display:flex;align-items:center;gap:7px;
  padding:6px 11px;
  background:rgba(0,212,255,0.08);
  border:1px solid var(--border-cyan);
  border-radius:var(--radius-xs);
  font-family:var(--mono);font-size:9px;font-weight:800;letter-spacing:1px;
  color:var(--cyan-bright);text-shadow:0 0 8px rgba(0,212,255,0.5);
  text-transform:uppercase;
}
.live-dot{
  width:7px;height:7px;border-radius:50%;background:var(--cyan);
  box-shadow:0 0 10px var(--cyan);animation:pulse-live 1.5s infinite;
}
@keyframes pulse-live{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(1.4)}}

/* === EYE LOGO SVG === */
.logo-eye-wrap{
  width:46px;height:34px;flex-shrink:0;
  position:relative;
}
.logo-eye{
  width:100%;height:100%;
  animation:eye-blink 5s infinite;
  transform-origin:center;
  filter:drop-shadow(0 0 6px rgba(255,140,0,0.45)) drop-shadow(0 0 10px rgba(0,212,255,0.25));
}
@keyframes eye-blink{
  0%,88%,100%{transform:scaleY(1)}
  93%,95%{transform:scaleY(0.06)}
}

/* === RADAR STRIP === */
.radar-strip{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:6px;
  margin-bottom:10px;
}
.radar-card{
  position:relative;overflow:hidden;
  background:linear-gradient(180deg,rgba(18,18,26,0.92) 0%,rgba(13,13,20,0.92) 100%);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:10px 11px;
  cursor:pointer;
  transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;
  display:flex;flex-direction:column;gap:6px;
  min-width:0;
}
.radar-card:hover{
  transform:translateY(-2px);
  border-color:var(--border-strong);
  box-shadow:var(--shadow-glow);
}
.radar-card.selected{
  border-color:var(--gold-bright);
  background:linear-gradient(180deg,rgba(40,28,12,0.92) 0%,rgba(20,14,8,0.92) 100%);
  box-shadow:0 0 0 1px var(--gold-bright),0 0 24px rgba(255,140,0,0.25);
}
.radar-card.selected::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold-bright),transparent);
}
.radar-head{
  display:flex;align-items:center;justify-content:space-between;gap:6px;
}
.radar-sym{
  font-family:var(--mono);font-weight:800;font-size:13px;letter-spacing:0.5px;
  color:var(--text-primary);
}
.radar-card.selected .radar-sym{color:var(--gold-bright)}
.radar-dir{
  font-family:var(--mono);font-size:8px;font-weight:800;letter-spacing:0.8px;
  padding:2px 5px;border-radius:2px;
}
.radar-dir.LONG{background:rgba(0,255,136,0.12);color:var(--emerald-bright);border:1px solid var(--border-emerald)}
.radar-dir.SHORT{background:rgba(255,51,102,0.12);color:var(--red-bright);border:1px solid var(--border-red)}
.radar-dir.NEUTRAL{background:rgba(85,85,104,0.18);color:var(--text-secondary);border:1px solid var(--border)}
.radar-price{
  font-family:var(--mono);font-weight:700;font-size:11px;
  color:var(--text-primary);font-variant-numeric:tabular-nums;
}
.radar-score-bar{
  position:relative;height:5px;
  background:rgba(255,255,255,0.04);
  border-radius:2px;overflow:hidden;
}
.radar-score-fill{
  position:absolute;top:0;left:0;bottom:0;
  border-radius:2px;
  transition:width 0.5s cubic-bezier(0.4,0,0.2,1);
}
.radar-score-fill.aplus{background:linear-gradient(90deg,#00cc6f,#00ff88);box-shadow:0 0 8px rgba(0,255,136,0.5)}
.radar-score-fill.asetup{background:linear-gradient(90deg,#cc8c00,#ffb733);box-shadow:0 0 6px rgba(255,183,51,0.4)}
.radar-score-fill.low{background:linear-gradient(90deg,#3a3a48,#5a5a6e)}
.radar-foot{
  display:flex;align-items:center;justify-content:space-between;
  font-family:var(--mono);font-size:8px;letter-spacing:0.5px;
  color:var(--text-muted);font-weight:700;
}
.radar-foot .score-val{color:var(--text-secondary)}
.radar-card.selected .radar-foot .score-val{color:var(--gold-bright)}
.radar-open-tag{
  position:absolute;top:6px;right:6px;
  font-family:var(--mono);font-size:7px;font-weight:800;letter-spacing:0.5px;
  padding:1px 4px;border-radius:2px;
  background:var(--cyan);color:#0a0a0f;
  box-shadow:0 0 6px var(--cyan-glow);
}

/* === MAIN GRID === */
.main-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;margin-bottom:10px;
}
@media(min-width:1100px){
  .main-grid{grid-template-columns:1fr 380px}
}

/* === CARDS === */
.card{
  background:rgba(18,18,26,0.82);
  backdrop-filter:blur(14px) saturate(140%);
  -webkit-backdrop-filter:blur(14px) saturate(140%);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px;
  position:relative;overflow:hidden;
  transition:border-color 0.25s,box-shadow 0.25s,transform 0.25s;
  box-shadow:var(--shadow-card);
}
.card:hover{border-color:var(--border-strong)}
.card-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;padding-bottom:10px;
  border-bottom:1px solid var(--border);gap:8px;
}
.card-tag{
  font-family:var(--mono);font-size:9px;font-weight:800;letter-spacing:2px;
  color:var(--gold-bright);text-transform:uppercase;
  display:flex;align-items:center;gap:7px;
}
.card-tag::before{
  content:'';width:3px;height:12px;
  background:linear-gradient(180deg,var(--gold-bright),var(--gold));
  border-radius:1px;flex-shrink:0;box-shadow:0 0 6px var(--gold-glow);
}
.card-tick{
  font-family:var(--mono);font-size:10px;color:var(--text-muted);
  font-weight:700;letter-spacing:0.8px;text-transform:uppercase;
}

/* === ASSET PANEL === */
.asset-panel{
  background:rgba(18,18,26,0.82);
  backdrop-filter:blur(14px) saturate(140%);
  -webkit-backdrop-filter:blur(14px) saturate(140%);
  border:1px solid var(--border-strong);
  border-radius:var(--radius);
  padding:14px;
  box-shadow:var(--shadow-card),var(--shadow-glow);
}
.ap-head{
  display:flex;align-items:baseline;justify-content:space-between;gap:12px;
  margin-bottom:12px;flex-wrap:wrap;
}
.ap-sym{
  font-family:var(--mono);font-weight:800;font-size:18px;letter-spacing:1px;
  color:var(--text-primary);
}
.ap-sym .ap-base{color:var(--gold-bright)}
.ap-price-block{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.ap-price-val{
  font-family:var(--mono);font-weight:800;font-size:30px;letter-spacing:-1px;
  font-variant-numeric:tabular-nums;line-height:1;
  color:var(--gold-bright);text-shadow:0 0 18px rgba(255,140,0,0.25);
}
.ap-price-val.up{color:var(--emerald-bright);text-shadow:0 0 18px rgba(0,255,136,0.3)}
.ap-price-val.down{color:var(--red-bright);text-shadow:0 0 18px rgba(255,51,102,0.3)}
.ap-price-val.flash{animation:price-flash 0.4s ease-out}
@keyframes price-flash{0%{transform:scale(1.03);filter:brightness(1.4)}100%{transform:scale(1);filter:brightness(1)}}
.ap-price-chg{
  font-family:var(--mono);font-weight:800;font-size:14px;
  padding:3px 9px;border-radius:var(--radius-xs);letter-spacing:0.3px;
  font-variant-numeric:tabular-nums;
}
.ap-price-chg.up{color:var(--emerald-bright);background:rgba(0,255,136,0.10);border:1px solid var(--border-emerald)}
.ap-price-chg.down{color:var(--red-bright);background:rgba(255,51,102,0.10);border:1px solid var(--border-red)}
.ap-chart-wrap{
  background:linear-gradient(180deg,rgba(13,13,20,0.6) 0%,rgba(6,6,10,0.6) 100%);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:8px 6px;position:relative;
}
.ap-chart-info{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.5px;
  color:var(--text-secondary);margin-bottom:6px;padding:0 4px;
}
.ap-chart-info .ci-item{display:flex;align-items:center;gap:4px}
.ap-chart-info .ci-dot{width:6px;height:6px;border-radius:50%}

/* === WHY PANEL === */
.why-panel{
  margin-top:12px;
  background:rgba(6,6,10,0.5);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px;
}
.why-hdr{
  font-family:var(--mono);font-size:10px;font-weight:800;letter-spacing:2px;
  color:var(--cyan-bright);text-transform:uppercase;
  margin-bottom:10px;padding-bottom:8px;
  border-bottom:1px solid var(--border-cyan);
  display:flex;align-items:center;gap:8px;
}
.why-hdr::before{
  content:'';width:3px;height:12px;
  background:linear-gradient(180deg,var(--cyan-bright),var(--cyan));
  border-radius:1px;box-shadow:0 0 6px var(--cyan-glow);
}
.why-layers{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:6px;
  margin-bottom:10px;
}
.why-layer{
  display:flex;align-items:flex-start;gap:8px;
  padding:7px 9px;
  background:rgba(13,13,20,0.5);
  border:1px solid var(--border);border-radius:var(--radius-xs);
  transition:border-color 0.2s,background 0.2s;
}
.why-layer:hover{border-color:var(--border-strong);background:rgba(20,16,12,0.6)}
.why-layer-icon{
  font-size:13px;line-height:1;flex-shrink:0;margin-top:1px;
  width:14px;text-align:center;
}
.why-layer.ok .why-layer-icon{color:var(--emerald-bright);text-shadow:0 0 6px var(--emerald-glow)}
.why-layer.warn .why-layer-icon{color:var(--gold-bright);text-shadow:0 0 6px var(--gold-glow)}
.why-layer.err .why-layer-icon{color:var(--red-bright);text-shadow:0 0 6px var(--red-glow)}
.why-layer-body{flex:1;min-width:0}
.why-layer-name{
  font-family:var(--font);font-weight:700;font-size:11px;
  color:var(--text-primary);letter-spacing:0.2px;line-height:1.2;
}
.why-layer-detail{
  font-family:var(--mono);font-size:9px;font-weight:600;
  color:var(--text-secondary);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.why-final{
  padding:9px 12px;
  background:linear-gradient(135deg,rgba(255,140,0,0.10) 0%,rgba(0,212,255,0.06) 100%);
  border:1px solid var(--border-strong);border-radius:var(--radius-xs);
  font-family:var(--mono);font-size:11px;font-weight:700;line-height:1.4;
  color:var(--text-primary);
}
.why-final .wf-label{
  display:block;font-size:8px;letter-spacing:1.5px;
  color:var(--text-muted);text-transform:uppercase;font-weight:800;margin-bottom:3px;
}
.why-final .wf-verdict{
  font-family:var(--mono);font-weight:900;font-size:13px;letter-spacing:1px;
}
.why-final .wf-verdict.buy{color:var(--emerald-bright);text-shadow:0 0 8px var(--emerald-glow)}
.why-final .wf-verdict.sell{color:var(--red-bright);text-shadow:0 0 8px var(--red-glow)}
.why-final .wf-verdict.wait{color:var(--text-secondary)}
.why-final .wf-reason{
  display:block;margin-top:5px;font-size:10px;font-weight:500;
  color:var(--text-secondary);font-family:var(--font);letter-spacing:0;
}

/* === POSITIONS (compact list) === */
.positions-list{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.pos-row{
  display:flex;align-items:center;gap:8px;
  background:rgba(18,18,26,0.72);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:8px 10px;
  position:relative;overflow:hidden;
  transition:border-color 0.15s;
  cursor:pointer;
}
.pos-row.long{border-left:3px solid var(--emerald)}
.pos-row.short{border-left:3px solid var(--red)}
.pos-row:hover{border-color:var(--border-strong)}
.pos-row-sym{font-family:var(--mono);font-weight:800;font-size:12px;min-width:42px}
.pos-row-dir{font-family:var(--mono);font-size:8px;font-weight:800;letter-spacing:0.6px;padding:2px 5px;border-radius:2px}
.pos-row-dir.LONG{background:rgba(0,255,136,0.12);color:var(--emerald-bright)}
.pos-row-dir.SHORT{background:rgba(255,51,102,0.12);color:var(--red-bright)}
.pos-row-entry{font-family:var(--mono);font-size:11px;color:var(--text-secondary);min-width:70px}
.pos-row-cur{font-family:var(--mono);font-size:11px;color:var(--cyan-bright);min-width:70px}
.pos-row-pnl{font-family:var(--mono);font-size:12px;font-weight:700;min-width:60px;text-align:right}
.pos-row-pnl.up{color:var(--emerald-bright)}

<script>
const HE = typeof window.EMBEDDED_DATA !== 'undefined';
const TZ = 'America/Lima';
const BACKEND_URL = 'https://yendriel.onrender.com';
const BINANCE_API = 'https://api.binance.com';
const ASSETS = ['BTC','ETH','SOL','BNB','XRP','AVAX','LINK','DOT'];
const REFRESH_MS = 30000;

// State
let pt, dash, an, ts, B;
let cP;                                  // current portfolio
let cS = null;                           // current BTC signal
let cO = null;                           // current open trade (BTC legacy)
let wsPrice = null, wsKline = null, prevPrice = null;
let selectedAsset = 'BTC';
let assetCandles = {};                   // { BTC: [...], ETH: [...], ... }
let assetTickers = {};                   // { BTC: {price,changePct,high,low}, ... }
let assetEma30 = {}, assetEma100 = {};   // per-asset EMA caches
let renderToken = 0;                     // prevent stale renders

// === HELPERS ===
function nowLima(){return new Date().toLocaleString('es-PE',{timeZone:TZ,hour:'2-digit',minute:'2-digit',second:'2-digit'})}
function fmt(n,d=2){return n==null||isNaN(n)?'—':n.toLocaleString('en-US',{maximumFractionDigits:d,minimumFractionDigits:d})}
function usd(n,d=0){return n==null||isNaN(n)?'—':'$'+n.toLocaleString('en-US',{maximumFractionDigits:d,minimumFractionDigits:d})}
function pct(n,d=2){return n==null||isNaN(n)?'—':(n*100).toFixed(d)+'%'}
function iRegime(r){return r?r.replace('TREND_','').replace('_',' '):'—'}
function iRSI(v){if(v==null)return'—';if(v>70)return'Sobrecomprado';if(v<30)return'Sobrevendido';return'Neutral'}
function calcEMA(v,p){const k=2/(p+1),o=[];let e=null;for(let i=0;i<v.length;i++){if(i<p-1){o.push(null);continue}if(e===null){e=v.slice(0,p).reduce((a,b)=>a+b,0)/p}else{e=v[i]*k+e*(1-k)}o.push(e)}return o}
function calcRSI(c,p){const o=[null];let ag=0,al=0;for(let i=1;i<c.length;i++){const ch=c[i]-c[i-1],g=ch>0?ch:0,l=ch<0?Math.abs(ch):0;if(i<=p){ag+=g;al+=l;if(i===p){ag/=p;al/=p;o.push(al===0?100:100-100/(1+ag/al))}else o.push(null)}else{ag=(ag*(p-1)+g)/p;al=(al*(p-1)+l)/p;o.push(al===0?100:100-100/(1+ag/al))}}return o}
function timeAgo(iso){if(!iso)return'—';const s=(Date.now()-new Date(iso).getTime())/1000;if(s<60)return Math.floor(s)+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d'}
function holdTime(openedAt){if(!openedAt)return'—';const ms=Date.now()-new Date(openedAt).getTime();const h=Math.floor(ms/3600000);const m=Math.floor((ms%3600000)/60000);return h+'h '+m+'m'}

// === EYE LOGO SVG (geometric eye + candlestick iris) ===
const EYE_SVG = '<svg class="logo-eye" viewBox="0 0 60 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">'+
'<defs>'+

// === DRAW CHART (candle + EMAs + entry/SL/TP) ===
function drawChart(cv, candles, ema30v, ema100v, en, sl, tp, dir, livePrice){
  if(!cv) return;
  const ctx = cv.getContext('2d'), dpr = window.devicePixelRatio||1,
    W = cv.clientWidth, H = cv.clientHeight;
  cv.width = W*dpr; cv.height = H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  if(!candles || !candles.length) return;

  const pL=10, pR=72, pT=12, pB=28;
  const cw = W-pL-pR, ch = H-pT-pB;
  const vis = candles.slice(-100);
  const cW = cw/vis.length;
  const bW = Math.max(2, Math.min(11, cW*0.62));

  // Pre-calc EMAs from full candle array
  const closes = candles.map(x=>+x.close);
  const e30Arr = ema30v!=null ? calcEMA(closes,30) : null;
  const e100Arr = ema100v!=null ? calcEMA(closes,100) : null;

  // Min/max
  let mn=Infinity, mx=-Infinity;
  vis.forEach(x=>{x=+x; if(+x.low<mn)mn=+x.low; if(+x.high>mx)mx=+x.high});
  if(e30Arr){for(let i=0;i<vis.length;i++){const v=e30Arr[candles.length-vis.length+i];if(v!=null){if(v<mn)mn=v;if(v>mx)mx=v}}}
  if(e100Arr){for(let i=0;i<vis.length;i++){const v=e100Arr[candles.length-vis.length+i];if(v!=null){if(v<mn)mn=v;if(v>mx)mx=v}}}
  if(en){if(en<mn)mn=en;if(en>mx)mx=en}
  if(sl){if(sl<mn)mn=sl;if(sl>mx)mx=sl}
  if(tp){if(tp<mn)mn=tp;if(tp>mx)mx=tp}
  if(livePrice!=null){if(livePrice<mn)mn=livePrice;if(livePrice>mx)mx=livePrice}
  let rg = mx-mn;
  if(rg<0.001){mn-=1;mx+=1;rg=2}
  const pad = rg*0.06;
  mn -= pad; mx += pad;
  const py = p => pT + ch - ((p-mn)/(mx-mn))*ch;

  // Background gradient
  const bg = ctx.createLinearGradient(0,pT,0,pT+ch);
  bg.addColorStop(0,'rgba(255,140,0,0.025)');
  bg.addColorStop(0.5,'rgba(0,0,0,0)');
  bg.addColorStop(1,'rgba(168,85,247,0.020)');
  ctx.fillStyle = bg;
  ctx.fillRect(pL,pT,cw,ch);

  // Grid horizontal + price labels
  ctx.font = '10px "JetBrains Mono", ui-monospace, monospace';
  ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
  const ySteps = 5;
  for(let i=0;i<=ySteps;i++){
    const y = pT + (ch/ySteps)*i;
    ctx.strokeStyle = 'rgba(255,140,0,0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pL,y); ctx.lineTo(pL+cw,y); ctx.stroke();
    const val = mx - ((mx-mn)/ySteps)*i;
    ctx.fillStyle = '#5a5a6e';
    ctx.fillText('$'+val.toLocaleString('en-US',{maximumFractionDigits:0}), pL+cw+6, y);
  }

  // Grid vertical + time labels
  const labelCount = W<440 ? 3 : (W<760 ? 4 : 6);
  const step = Math.max(1, Math.ceil(vis.length/labelCount));
  ctx.textAlign = 'center';
  for(let i=0;i<vis.length;i+=step){
    const x = pL + i*cW + cW/2;
    ctx.strokeStyle = 'rgba(255,140,0,0.035)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x,pT); ctx.lineTo(x,pT+ch); ctx.stroke();
    const d = new Date(vis[i].timestamp);
    const timeStr = d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:TZ});
    ctx.fillStyle = '#5a5a6e';
    ctx.fillText(timeStr, x, pT+ch+12);
    if(W>=460){
      const dateStr = d.toLocaleDateString('en-US',{day:'2-digit',month:'short',timeZone:TZ});
      ctx.fillText(dateStr, x, pT+ch+24);
    }
  }
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';

  // Candles
  vis.forEach((x,i)=>{
    x = vis[i];
    const xx = pL + i*cW + cW/2;
    const o = +x.open, c = +x.close, h = +x.high, l = +x.low;
    const up = c >= o;
    const col = up ? '#00ff88' : '#ff3366';
    ctx.strokeStyle = col; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(xx,py(h)); ctx.lineTo(xx,py(l)); ctx.stroke();
    const yO = py(o), yC = py(c);
    const bh = Math.max(1, Math.abs(yC-yO));
    const bodyTop = Math.min(yO,yC);
    const isLast = (i === vis.length-1);
    if(isLast){ctx.shadowColor=col;ctx.shadowBlur=12}
    ctx.fillStyle = col;
    ctx.fillRect(xx-bW/2, bodyTop, bW, bh);
    ctx.shadowBlur = 0;
  });

  // EMA30 (amber)
  if(e30Arr){
    ctx.strokeStyle = '#ffb733'; ctx.lineWidth = 1.8;
    ctx.shadowColor = 'rgba(255,183,51,0.6)'; ctx.shadowBlur = 5;
    ctx.beginPath(); let started=false;
    for(let i=0;i<vis.length;i++){
      const v = e30Arr[candles.length-vis.length+i];
      if(v==null){started=false;continue}
      const xx = pL+i*cW+cW/2, y = py(v);
      if(!started){ctx.moveTo(xx,y);started=true} else ctx.lineTo(xx,y);
    }
    ctx.stroke(); ctx.shadowBlur = 0;
  }
  // EMA100 (purple)
  if(e100Arr){
    ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 1.8;
    ctx.shadowColor = 'rgba(168,85,247,0.6)'; ctx.shadowBlur = 5;
    ctx.beginPath(); let started=false;
    for(let i=0;i<vis.length;i++){
      const v = e100Arr[candles.length-vis.length+i];
      if(v==null){started=false;continue}
      const xx = pL+i*cW+cW/2, y = py(v);
      if(!started){ctx.moveTo(xx,y);started=true} else ctx.lineTo(xx,y);
    }
    ctx.stroke(); ctx.shadowBlur = 0;
  }

  // Entry line
  if(en && en>0){
    const y = py(en);
    const dc = dir==='LONG'?'#00ff88':dir==='SHORT'?'#ff3366':'#8888a0';
    ctx.strokeStyle = dc; ctx.lineWidth = 1.5;
    ctx.setLineDash([5,3]);
    ctx.beginPath(); ctx.moveTo(pL,y); ctx.lineTo(pL+cw,y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = dc;
    ctx.font = 'bold 10px "JetBrains Mono", ui-monospace, monospace';
    ctx.textBaseline = 'middle';
    ctx.fillText('E '+en.toLocaleString('en-US',{maximumFractionDigits:0}), pL+cw+6, y);
    ctx.textBaseline = 'alphabetic';
  }
  // SL line
  if(sl && sl>0){
    const y = py(sl);
    ctx.strokeStyle = 'rgba(255,51,102,0.75)'; ctx.lineWidth = 1;
    ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(pL,y); ctx.lineTo(pL+cw,y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#ff4477';
    ctx.font = 'bold 9px "JetBrains Mono", ui-monospace, monospace';
    ctx.textBaseline = 'middle';
    ctx.fillText('SL', pL+cw+6, y);
    ctx.textBaseline = 'alphabetic';
  }
  // TP line
  if(tp && tp>0){
    const y = py(tp);
    ctx.strokeStyle = 'rgba(0,255,136,0.75)'; ctx.lineWidth = 1;
    ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(pL,y); ctx.lineTo(pL+cw,y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#00ff88';
    ctx.font = 'bold 9px "JetBrains Mono", ui-monospace, monospace';
    ctx.textBaseline = 'middle';
    ctx.fillText('TP', pL+cw+6, y);
    ctx.textBaseline = 'alphabetic';
  }
  // Live price line (cyan)
  if(livePrice!=null && livePrice>=mn && livePrice<=mx){
    const y = py(livePrice);
    ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 1.2;
    ctx.setLineDash([2,3]);
    ctx.beginPath(); ctx.moveTo(pL,y); ctx.lineTo(pL+cw,y); ctx.stroke();
    ctx.setLineDash([]);
    const lbl = '$'+livePrice.toLocaleString('en-US',{maximumFractionDigits:0});
    ctx.font = 'bold 10px "JetBrains Mono", ui-monospace, monospace';
    const tw = ctx.measureText(lbl).width;
    ctx.fillStyle = '#00d4ff';
    ctx.fillRect(pL+cw+2, y-8, tw+10, 16);
    ctx.fillStyle = '#0a0a0f';
    ctx.textBaseline = 'middle';
    ctx.fillText(lbl, pL+cw+7, y);
    ctx.textBaseline = 'alphabetic';
  }
}

// === EQUITY SPARKLINE ===
function drawEquitySparkline(cv, points){
  if(!cv) return;
  const ctx = cv.getContext('2d'), dpr = window.devicePixelRatio||1,
    W = cv.clientWidth, H = cv.clientHeight;
  cv.width = W*dpr; cv.height = H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  if(!points || points.length < 2) return;

  const pL=4, pR=4, pT=6, pB=6;
  const cw = W-pL-pR, ch = H-pT-pB;
  const mn = Math.min.apply(null, points);
  const mx = Math.max.apply(null, points);
  const range = (mx-mn) || 1;
  const step = cw / (points.length-1);
  const py = v => pT + ch - ((v-mn)/range)*ch;

  const isUp = points[points.length-1] >= points[0];
  const col = isUp ? '#00ff88' : '#ff3366';
  const fill = isUp ? 'rgba(0,255,136,0.14)' : 'rgba(255,51,102,0.14)';

  // Fill area
  ctx.beginPath();
  ctx.moveTo(pL, pT+ch);
  points.forEach((v,i)=>{ ctx.lineTo(pL + i*step, py(v)) });
  ctx.lineTo(pL + (points.length-1)*step, pT+ch);
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();

  // Line
  ctx.strokeStyle = col; ctx.lineWidth = 1.8;
  ctx.shadowColor = col; ctx.shadowBlur = 6;
  ctx.beginPath();
  points.forEach((v,i)=>{
    const x = pL + i*step, y = py(v);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();
  ctx.shadowBlur = 0;

  // End point dot
  const lastX = pL + (points.length-1)*step;
  const lastY = py(points[points.length-1]);
  ctx.fillStyle = col;
  ctx.shadowColor = col; ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(lastX, lastY, 3, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

// === WEBSOCKET BINANCE (BTC LIVE) ===
function initWebSocket(){
  try{
    wsPrice = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
    wsPrice.onmessage = (event) => {
      try{
        const d = JSON.parse(event.data);
        if(d.c){
          const price = parseFloat(d.c);
          const change = parseFloat(d.P);
          const high = parseFloat(d.h);
          const low = parseFloat(d.l);
          const vol = parseFloat(d.q);
          updateLivePrice(price, change, high, low, vol);
        }
      }catch(e){}
    };
    wsPrice.onclose = () => { setTimeout(()=>{ if(wsPrice) wsPrice=null; initWebSocket(); }, 3000); };
    wsPrice.onerror = () => { try{wsPrice.close()}catch(e){} };
  }catch(e){ setTimeout(initWebSocket, 3000); }

  try{
    wsKline = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@kline_4h');
    const handleKline = (event) => {
      try{
        const d = JSON.parse(event.data);
        if(d.k){
          const k = d.k;
          const candle = { open:parseFloat(k.o), high:parseFloat(k.h), low:parseFloat(k.l), close:parseFloat(k.c), volume:parseFloat(k.v), timestamp:k.t };
          updateBtcCandle(candle, k.x);
        }
      }catch(e){}
    };
    wsKline.onmessage = handleKline;
    wsKline.onclose = () => {
      setTimeout(() => {
        try{
          wsKline = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@kline_4h');
          wsKline.onmessage = handleKline;
          wsKline.onclose = arguments.callee;
          wsKline.onerror = () => { try{wsKline.close()}catch(e){} };
        }catch(e){}
      }, 3000);
    };
    wsKline.onerror = () => { try{wsKline.close()}catch(e){} };
  }catch(e){}
}

function updateLivePrice(price, changePct, high, low, vol){
  // Cache for BTC
  assetTickers.BTC = { price, changePct:changePct, high, low, quoteVolume:vol };
  prevPrice = price;

  // Update header equity if we have an open BTC trade
  const pv = document.getElementById('apPrice');
  if(pv && selectedAsset === 'BTC'){
    pv.textContent = usd(price, 0);
    if(prevPrice !== null){
      const prev = parseFloat(pv.getAttribute('data-prev')||price);
      if(price > prev) pv.className = 'ap-price-val up flash tnum';
      else if(price < prev) pv.className = 'ap-price-val down flash tnum';
      else pv.className = 'ap-price-val tnum';
      setTimeout(()=>{ if(pv) pv.className = 'ap-price-val ' + (changePct>=0?'up':'down') + ' tnum'; }, 400);
    }
    pv.setAttribute('data-prev', price);
  }
  const pc = document.getElementById('apPriceChg');
  if(pc && selectedAsset === 'BTC'){
    const isUp = changePct >= 0;
    pc.textContent = (isUp?'▲':'▼') + ' ' + changePct.toFixed(2) + '%';
    pc.className = 'ap-price-chg ' + (isUp?'up':'down');
  }
  // Update radar BTC price
  const rp = document.getElementById('radar-price-BTC');
  if(rp) rp.textContent = usd(price, 0);

  // Update live equity (header)
  updateLiveEquity(price);

  // Redraw chart with live line
  redrawSelectedChart();
}

function updateBtcCandle(candle, isClosed){
  let arr = assetCandles.BTC || [];
  if(arr.length === 0) return;
  if(isClosed){
    arr.push(candle);
    if(arr.length > 200) arr.shift();
    assetCandles.BTC = arr;
  } else {
    const last = arr[arr.length-1];
    if(last && last.timestamp === candle.timestamp){
      last.close = candle.close;
      last.high = Math.max(last.high, candle.high);
      last.low = Math.min(last.low, candle.low);
      last.volume = candle.volume;
    } else if(last && candle.timestamp > last.timestamp){
      arr.push(candle);
      if(arr.length > 200) arr.shift();
      assetCandles.BTC = arr;
    }
  }
  if(selectedAsset === 'BTC') redrawSelectedChart();
}

function updateLiveEquity(btcPrice){
  if(!cP) return;
  // Sum unrealized PnL across all open trades
  let livePnl = 0;
  if(pt && pt.openTrades){
    pt.openTrades.forEach(t => {
      if(!t || !t.entryPrice) return;
      const isLong = t.direction === 'LONG';
      const sizeBtc = t.sizeBtc || (t.sizeUsd / t.entryPrice);
      // For BTC trades we use btcPrice, for others we use entry as proxy
      const ref = (t.symbol && t.symbol.indexOf('BTC')>=0) ? btcPrice : (t.entryPrice);
      const diff = isLong ? (ref - t.entryPrice) : (t.entryPrice - ref);
      livePnl += sizeBtc * diff;
    });
  } else if(cO && cO.entryPrice){
    const isLong = cO.direction === 'LONG';
    const sizeBtc = cO.sizeBtc || (cO.sizeUsd / cO.entryPrice);
    const diff = isLong ? (btcPrice - cO.entryPrice) : (cO.entryPrice - btcPrice);
    livePnl = sizeBtc * diff;
  }
  const liveEquity = (cP.currentBalance || cP.equity || 0) + livePnl;
  const eqEl = document.getElementById('hdrEquity');
  if(eqEl) eqEl.textContent = usd(liveEquity, 2);
  const eqChg = document.getElementById('hdrEquityChg');
  if(eqChg && cP && cP.initialCapital){
    const tr = ((liveEquity - cP.initialCapital)/cP.initialCapital)*100;
    eqChg.textContent = (tr>=0?'+':'') + tr.toFixed(2) + '%';
    eqChg.className = 'hdr-equity-chg ' + (tr>=0?'up':'down');
  }
}

// === FETCH ASSET CANDLES (Binance REST) ===
async function fetchAssetCandles(symbol){
  if(assetCandles[symbol] && assetCandles[symbol].length > 50) return assetCandles[symbol];
  try{
    const pair = symbol + 'USDT';
    const url = BINANCE_API + '/api/v3/klines?symbol=' + pair + '&interval=4h&limit=200';
    const r = await fetch(url, {cache:'no-store', signal:AbortSignal.timeout(10000)});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();
    const candles = data.map(k => ({
      open: parseFloat(k[1]),
      high: parseFloat(k[2]),
      low: parseFloat(k[3]),
      close: parseFloat(k[4]),
      volume: parseFloat(k[5]),
      timestamp: k[0]
    }));
    assetCandles[symbol] = candles;
    return candles;
  }catch(e){
    console.warn('fetchAssetCandles failed for', symbol, e.message);
    return assetCandles[symbol] || [];
  }
}

// === RADAR SUMMARY PARSER ===
// The backend may return radar.results[] OR just a radar.summary text (Telegram-formatted).
// We parse the summary to extract per-asset info as a fallback.
function parseRadarSummary(summary){
  const out = {};
  if(!summary) return out;
  const nameMap = {
    'Bitcoin':'BTC','Ethereum':'ETH','Solana':'SOL','Binance':'BNB','BNB':'BNB',
    'Ripple':'XRP','XRP':'XRP','Avalanche':'AVAX','Chainlink':'LINK','Polkadot':'DOT'
  };
  // Pattern: [tier-emoji] <b>NAME</b> [dir-emoji]DIR · Score NN/100 · $PRICE
  const re = /(🟢|🟡|🔴|⚪)?\s*<b>([^<]+)<\/b>\s*(?:🟢|🔴|⚪)?\s*(LONG|SHORT|NEUTRAL)?\s*·\s*Score\s*(\d+)\/100\s*·\s*\$([\d,.]+)/g;
  let m;
  while((m = re.exec(summary)) !== null){
    const tier = m[1];
    let name = m[2].trim();
    name = nameMap[name] || name.toUpperCase().slice(0,4);
    const dir = (m[3] || 'NEUTRAL').toUpperCase();
    const score = parseInt(m[4],10);
    const price = parseFloat(m[5].replace(/,/g,''));
    out[name] = { direction: dir, setupScore: score, entryPrice: price, tier };
  }
  return out;
}

// === RADAR STRIP RENDER ===
function renderRadarStrip(){
  const strip = document.getElementById('radarStrip');
  if(!strip) return;

  // Build radar lookup from both .results[] (structured) AND .summary (text fallback)
  const radarMap = {};
  const radarObj = (pt && pt.radar) || {};
  if(Array.isArray(radarObj.results)){
    radarObj.results.forEach(r => {
      if(!r) return;
      const sym = (r.symbol||'').replace('USDT','').toUpperCase();
      radarMap[sym] = r;
    });
  }
  // Merge with parsed summary (only fills missing symbols)
  const parsed = parseRadarSummary(radarObj.summary);
  Object.keys(parsed).forEach(sym => {
    if(!radarMap[sym]) radarMap[sym] = parsed[sym];
  });

  // Build open trades lookup
  const openMap = {};
  if(pt && pt.openTrades && pt.openTrades.length > 0){
    pt.openTrades.forEach(t => {
      if(!t) return;
      const sym = (t.symbol||'BTCUSDT').replace('USDT','').toUpperCase();
      openMap[sym] = t;
    });
  } else if(cO){
    openMap.BTC = cO;
  }

  let html = '';
  ASSETS.forEach(sym => {
    const r = radarMap[sym] || {};
    const open = openMap[sym];
    const score = r.setupScore || (open ? (open.setupScore || 75) : 0);
    const dir = (r.direction || (open ? open.direction : 'NEUTRAL')).toUpperCase();
    const ticker = assetTickers[sym];
    const price = ticker ? ticker.price : (r.entryPrice || open?.entryPrice || 0);
    const scoreCls = score>=80?'aplus':score>=70?'asetup':'low';
    const selCls = (sym === selectedAsset) ? ' selected' : '';
    const openTag = open ? '<span class="radar-open-tag">OPEN</span>' : '';
    // Price formatting: BTC 0dp, ETH 0-2dp, small alts 2-4dp
    const pDec = sym==='BTC' ? 0 : (price < 1 ? 4 : price < 50 ? 2 : 0);
    html += '<div class="radar-card'+selCls+'" data-symbol="'+sym+'" onclick="selectAsset(\''+sym+'\')">'+
      openTag +
      '<div class="radar-head">'+
        '<span class="radar-sym">'+sym+'</span>'+
        '<span class="radar-dir '+dir+'">'+dir+'</span>'+
      '</div>'+
      '<div class="radar-price tnum" id="radar-price-'+sym+'">'+(price?usd(price, pDec):'—')+'</div>'+
      '<div class="radar-score-bar"><div class="radar-score-fill '+scoreCls+'" style="width:'+Math.min(100,score)+'%"></div></div>'+
      '<div class="radar-foot">'+
        '<span>SCORE</span>'+
        '<span class="score-val tnum">'+score+'/100</span>'+
      '</div>'+
    '</div>';
  });
  strip.innerHTML = html;
}

// === SELECT ASSET (click handler) ===
async function selectAsset(sym){
  if(selectedAsset === sym){
    redrawSelectedChart();
    return;
  }
  selectedAsset = sym;
  // Mark selected card
  document.querySelectorAll('.radar-card').forEach(c => {
    c.classList.toggle('selected', c.dataset.symbol === sym);
  });
  // Render asset panel (price, header, etc.)
  renderAssetPanel();
  // Fetch candles if not cached (BTC may already have them from dashboard endpoint)
  if(sym !== 'BTC' || !assetCandles.BTC || assetCandles.BTC.length === 0){
    await fetchAssetCandles(sym);
    // Re-render asset panel (now with EMA info from the new candles)
    renderAssetPanel();
  }
  // Render the "Why?" panel for the new asset
  renderWhyPanel();
  // Draw the chart with the new candles
  redrawSelectedChart();
}

  const dir = (r.direction || (open ? open.direction : cS?.direction) || 'NEUTRAL').toUpperCase();

  const aPlus = radarObj.aPlusFound || 0;

    {id:1, name:'LSTM Ensemble', detail: iaActive ? '3 folds · vol predict' : 'Fallback mode', status: iaActive?'ok':'err'},

    {id:5, name:'SMC', detail: smcHit ? 'Pattern detected' : (isBtc ? 'No SMC trigger' : 'Multi-timeframe scan'), status: smcHit?'ok':'warn'},
    {id:6, name:'Cross-Asset', detail: aPlus>0 ? aPlus+' A+ setups correlated' : 'No A+ correlation', status: aPlus>0?'ok':'warn'},
    {id:7, name:'Candle Vision', detail: candleHit ? 'Pattern: '+(reason.match(/hammer|engulfing|doji|pin|marubozu|star/i)?.[0]||'') : '6 patterns scanned', status:'ok'},
    {id:8, name:'Bayesian Learning', detail:'14 factors · auto-calib', status:'ok'},
    {id:9, name:'Pattern Match', detail: cS && cS.regime ? iRegime(cS.regime) : (dir!=='NEUTRAL' ? dir.toLowerCase()+' regime' : 'range'), status: (cS && cS.regime) ? 'ok' : 'warn'},
    {id:10, name:'Calendar', detail: newsCount>0 ? newsCount+' news items' : 'No events', status: newsCount>0 ? 'warn' : 'ok'},
    {id:11, name:'Kelly Sizing', detail: open ? 'Position open · '+(open.trailingActive?'trailing':'fixed') : 'Quarter Kelly', status:'ok'}
  ];

  let html = '';
  layers.forEach(L => {
    const icon = L.status==='ok' ? '✅' : L.status==='warn' ? '⚠️' : '❌';
    html += '<div class="why-layer '+L.status+'" title="'+L.name+'">'+
      '<div class="why-layer-icon">'+icon+'</div>'+

        '<div class="why-layer-name">'+(L.id<10?'0':'')+L.id+' · '+L.name+'</div>'+

      '</div>'+
    '</div>';

  const verdict = ev && ev.veredicto ? ev.veredicto : (dir==='LONG'?'APROBAR':dir==='SHORT'?'APROBAR':'ESPERAR');

    verdictText = dir==='LONG' ? 'COMPRAR' : dir==='SHORT' ? 'VENDER' : 'OPERAR';

// === PERFORMANCE RENDER ===
function renderPerformance(){
  if(!cP) return;
  const wr = cP.totalTrades>0 ? (cP.wins/cP.totalTrades)*100 : 0;
  const losses = cP.losses || 0;
  const wins = cP.wins || 0;
  // Profit Factor: sum wins / sum losses (approx from closedTrades)
  let grossWin = 0, grossLoss = 0;
  const closed = (pt && pt.closedTrades) || [];
  closed.forEach(t => {
    const p = t.pnlUsd || 0;
    if(p >= 0) grossWin += p; else grossLoss += Math.abs(p);
  });
  const pf = grossLoss > 0 ? grossWin/grossLoss : (grossWin>0?Infinity:0);
  // Sharpe (simplified from per-trade returns)
  let sharpe = 0;
  if(closed.length > 2){
    const rets = closed.map(t => (t.pnlUsd||0) / (cP.initialCapital||100));
    const mean = rets.reduce((a,b)=>a+b,0)/rets.length;
    const std = Math.sqrt(rets.reduce((a,b)=>a+(b-mean)*(b-mean),0)/rets.length);
    sharpe = std>0 ? (mean/std)*Math.sqrt(252/6) : 0; // 4H bars, ~6 per day
  }
  // Max DD
  const maxDD = cP.maxDrawdown || 0;

  // Set values
  const wrEl = document.getElementById('psWR'); if(wrEl) wrEl.textContent = wr.toFixed(0)+'%';
  const pfEl = document.getElementById('psPF'); if(pfEl) pfEl.textContent = pf===Infinity?'∞':pf.toFixed(2);
  const shEl = document.getElementById('psSharpe'); if(shEl) shEl.textContent = sharpe.toFixed(2);
  const ddEl = document.getElementById('psDD'); if(ddEl) ddEl.textContent = maxDD.toFixed(1)+'%';

  // Win/Loss bar
  const total = wins + losses;
  const winPct = total > 0 ? (wins/total)*100 : 0;
  const lossPct = total > 0 ? (losses/total)*100 : 0;
  const winsBar = document.getElementById('perfWinsBar');
  const lossesBar = document.getElementById('perfLossesBar');
  if(winsBar){ winsBar.style.width = winPct+'%'; winsBar.textContent = winPct>10 ? wins+'W' : ''; }
  if(lossesBar){ lossesBar.style.width = lossPct+'%'; lossesBar.textContent = lossPct>10 ? losses+'L' : ''; }

  // Equity sparkline (last 20 closed trades + current equity)
  const spark = document.getElementById('equitySpark');
  if(spark){
    const pts = [];
    let cum = cP.initialCapital || 100;
    // Use last 20 closed trades (oldest first)
    const slice = closed.slice(0, 20).reverse();
    slice.forEach(t => { cum += (t.pnlUsd||0); pts.push(cum); });
    pts.push(cP.equity || cum);
    if(pts.length < 2){
      pts.length = 0;
      pts.push(cP.initialCapital||100);
      pts.push(cP.equity||100);
    }
    drawEquitySparkline(spark, pts);
  }
}

    const dir = t.direction || 'LONG';
    const pnl = t.pnlUsd || 0;
    const isWin = pnl >= 0;
    // R multiple
    const riskUsd = t.entryPrice && t.stopLoss ? Math.abs((t.sizeBtc||0) * (t.entryPrice - t.stopLoss)) : 0;

    const status = t.status || 'CLOSED';

    const partialTxt = t.partialClosed ? ' · TP1 partial: +'+fmt(t.partialPnl||0,2) : '';
    html += '<div class="hist-item" onclick="this.classList.toggle(\'expanded\')">'+
      '<span class="hist-time">'+time+'</span>'+
      '<span class="hist-sym">'+sym+'</span>'+

      '<span class="hist-pnl '+(isWin?'up':'down')+' tnum">'+(isWin?'+':'')+fmt(pnl, 2)+'</span>'+

          'Open: '+(t.openedAt?new Date(t.openedAt).toLocaleString('es-PE',{timeZone:TZ,day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—')+' · Close: '+(t.closedAt?new Date(t.closedAt).toLocaleString('es-PE',{timeZone:TZ,day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—')+'<br>'+
          'Hold: '+holdTime(t.openedAt)+(t.closedAt?' · closed '+timeAgo(t.closedAt)+' ago':'')+
          (t.setupScore ? '<br>Setup score: '+t.setupScore+'/100 · Confianza IA: '+(((t.confidence||0))*100).toFixed(0)+'%' : '')+

        '<div class="ps-item"><div class="ps-lbl">Max DD</div><div class="ps-val red tnum" id="psDD">—</div></div>'+
      '</div>'+
      '<div class="perf-wl-bar">'+
        '<div class="perf-wl-wins" id="perfWinsBar" style="width:50%">0W</div>'+
        '<div class="perf-wl-losses" id="perfLossesBar" style="width:50%">0L</div>'+
      '</div>'+
    '</div>'+
  '</aside>';
  h += '</div>'; // end main-grid

  // HISTORY
  h += '<section class="card history-card">'+
    '<div class="card-hdr">'+
      '<span class="card-tag">Historial de Decisiones · <span id="histCount">0</span></span>'+
      '<span class="card-tick">últimos 10 · click para expandir</span>'+
    '</div>'+
    '<div class="hist-list" id="histList"></div>'+
  '</section>';

  // SYSTEM FOOTER
  h += '<footer class="sys-footer">'+
    '<div class="sys-footer-layers" id="sysLayers"></div>'+
    '<div class="sys-macro" id="sysMacro"></div>'+
    '<div class="sys-cmds">'+
      '<span class="sc-lbl">Telegram</span>'+
      '<span class="sys-cmd">/status</span>'+
      '<span class="sys-cmd">/paper</span>'+
      '<span class="sys-cmd">/analisis</span>'+
      '<span class="sys-cmd">/journal</span>'+
      '<span class="sys-cmd">/risk</span>'+
      '<span class="sys-cmd">/reset</span>'+
    '</div>'+
    '<div class="sys-version">PROMETHEUS <strong>v8</strong> · 11-LAYER INTELLIGENT TRADING</div>'+
  '</footer>';

  app.innerHTML = h;

  // Now render dynamic parts
  renderRadarStrip();
  renderAssetPanel();
  renderWhyPanel();
  renderPositions();
  renderPerformance();
  renderHistory();
  renderSystemFooter();

  // Initial chart draw
  setTimeout(()=>{ redrawSelectedChart(); drawEquitySparkline(document.getElementById('equitySpark'), [cP.initialCapital, cP.equity]); }, 50);
}

// === SILENT UPDATE (optimized — only update what changed) ===
function updateValuesInPlace(){
  if(!pt || !pt.success || !cP) return;
  const newP = pt.portfolio;
  const newS = pt.signal;
  const newO = pt.openTrade;
  const newTrades = pt.closedTrades || [];
  const tradesChanged = newTrades.length !== ((pt._lastClosedCount)||0);
  pt._lastClosedCount = newTrades.length;
  const openChanged = JSON.stringify(newO) !== JSON.stringify(cO);
  cP = newP; cS = newS; cO = newO;
  // 1. Header equity (always update — cheap)
  const eqEl = document.getElementById('hdrEquity');
  if(eqEl) eqEl.textContent = usd(cP.equity, 2);
  const tr = ((cP.equity - cP.initialCapital)/cP.initialCapital)*100;
  const eqChg = document.getElementById('hdrEquityChg');
  if(eqChg){ eqChg.textContent = (tr>=0?'+':'')+tr.toFixed(2)+'%'; eqChg.className = 'hdr-equity-chg '+(tr>=0?'up':'down')+' tnum'; }
  // 2. Positions (always update — PnL changes)
  renderPositions();
  // 3. Only re-render heavy stuff if something changed
  if(tradesChanged){
    renderPerformance();
    renderHistory();
  }
  // 4. Only re-render radar if 30s passed (not every 15s)
  if(!pt._lastRadarUpdate || Date.now() - pt._lastRadarUpdate > 30000){
    renderRadarStrip();
    pt._lastRadarUpdate = Date.now();
  }
  // 5. Only re-render why panel if signal changed
  if(JSON.stringify(newS) !== JSON.stringify(cS)){
    renderWhyPanel();
    renderAssetPanel();
  }
  // 6. Chart redraw (only if price moved significantly)
  setTimeout(redrawSelectedChart, 50);
}

// === LOAD DATA ===
async function loadData(isAutoRefresh){
  const app = document.getElementById('app');
  const myToken = ++renderToken;
  if(!isAutoRefresh){
    if(app) app.innerHTML = '<div class="loading"><div class="spinner"></div><p>Inicializando PROMETHEUS</p></div>';
  }
  try{
    let backendOK = false;
    try{
      const [rb1, rb2] = await Promise.all([
        fetch(BACKEND_URL+'/api/paper-trading', {cache:'no-store', signal:AbortSignal.timeout(20000)}),
        fetch(BACKEND_URL+'/api/dashboard', {cache:'no-store', signal:AbortSignal.timeout(20000)})
      ]);
      if(rb1.ok && rb2.ok){
        pt = await rb1.json();
        dash = await rb2.json();
        // Analyst: solo cargar en primer render, no en auto-refresh (causa lag)
        if(!isAutoRefresh && !an){
          try{
            const rb3 = await fetch(BACKEND_URL+'/api/analyst', {cache:'no-store', signal:AbortSignal.timeout(15000)});
            if(rb3.ok) an = await rb3.json();
          }catch(e){ console.warn('Analyst fetch skipped:', e.message); }
        }
        ts = {updated: new Date().toISOString()};
        backendOK = true;
      }
    }catch(backendErr){
      console.warn('Backend no respondió, usando EMBEDDED_DATA:', backendErr.message);
    }
    if(!backendOK){
      if(HE){
        pt = window.EMBEDDED_DATA.paperTrading;
        dash = window.EMBEDDED_DATA.dashboard;
        an = window.EMBEDDED_DATA.analyst;
        ts = {updated: window.EMBEDDED_DATA.timestamp};
      }else{
        B = window.location.origin + window.location.pathname.replace(/[^/]*$/,'');
        const [r1,r2,r3,r4] = await Promise.all([
          fetch(B+'data/paper-trading.json?v='+Date.now(), {cache:'no-store'}),
          fetch(B+'data/dashboard.json?v='+Date.now(), {cache:'no-store'}),
          fetch(B+'data/analyst.json?v='+Date.now(), {cache:'no-store'}),
          fetch(B+'data/timestamp.json?v='+Date.now(), {cache:'no-store'})
        ]);
        pt = await r1.json(); dash = await r2.json(); an = await r3.json(); ts = await r4.json();
      }
    }
    if(!pt || !pt.success) throw new Error('Sin datos válidos del backend');

    // Use dashboard candles for BTC (preferred over backend's pt.candles if available)
    if(dash && dash.candles && dash.candles.length > 0){
      assetCandles.BTC = dash.candles;
    }
    // Fetch tickers for all 8 assets (in parallel, non-blocking)
    fetchAllTickers().then(()=>{
      if(myToken !== renderToken) return;
      renderRadarStrip();
      if(selectedAsset !== 'BTC') renderAssetPanel();
      redrawSelectedChart();
    });
    // For non-BTC selected asset, fetch its candles
    if(selectedAsset !== 'BTC'){
      fetchAssetCandles(selectedAsset).then(()=>{
        if(myToken !== renderToken) return;
        renderAssetPanel();
        redrawSelectedChart();
      });
    }

    if(isAutoRefresh && app && app.querySelector('.hdr')){
      updateValuesInPlace();
    } else {
      renderAll();
      if(!wsPrice) initWebSocket();
    }
    // Schedule next refresh (single timer, cleared before setting)
    if(refreshTimer) clearTimeout(refreshTimer);
    refreshTimer = setTimeout(()=>loadData(true), REFRESH_MS);
  }catch(e){
    if(isAutoRefresh){
      console.warn('Auto-refresh falló (reintentando en 15s):', e.message);
      if(refreshTimer) clearTimeout(refreshTimer);
      refreshTimer = setTimeout(()=>loadData(true), REFRESH_MS);
    }else{
      if(app) app.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-secondary)"><p style="font-size:14px;color:var(--red-bright);font-weight:700">⚠ '+e.message+'</p><p style="font-size:11px;margin-top:8px">Reintentando en 10s…</p></div>';
      if(refreshTimer) clearTimeout(refreshTimer);
      refreshTimer = setTimeout(()=>loadData(false), 10000);
    }
  }
}

// === RESIZE HANDLER ===
let resizeTimer = null;
window.addEventListener('resize', () => {
  if(resizeTimer) clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    redrawSelectedChart();
    const spark = document.getElementById('equitySpark');
    if(spark && cP){
      const closed = (pt && pt.closedTrades) || [];
      let cum = cP.initialCapital || 100;
      const pts = closed.slice(0,20).reverse().map(t => { cum += (t.pnlUsd||0); return cum; });
      pts.push(cP.equity || cum);
      if(pts.length < 2){ pts.length = 0; pts.push(cP.initialCapital||100); pts.push(cP.equity||100); }
      drawEquitySparkline(spark, pts);
    }
  }, 150);
});

// === INIT ===
loadData(false);
</script>
