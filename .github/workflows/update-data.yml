name: Update Dashboard Data
on:
  schedule:
    - cron: '*/5 * * * *'  # cada 5 minutos
  workflow_dispatch:  # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch data from API
        run: |
          mkdir -p data
          # Paper trading
          curl -s --max-time 30 "https://yendriel.onrender.com/api/paper-trading" -o data/paper-trading.json || echo '{"success":false}' > data/paper-trading.json
          # Dashboard
          curl -s --max-time 30 "https://yendriel.onrender.com/api/dashboard?interval=4h" -o data/dashboard.json || echo '{"success":false}' > data/dashboard.json
          # Analyst
          curl -s --max-time 60 "https://yendriel.onrender.com/api/analyst" -o data/analyst.json || echo '{"success":false}' > data/analyst.json
          # Timestamp
          echo "{\"updated\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > data/timestamp.json
          
      - name: Commit and push
        run: |
          git config user.name "TITAN-AI Bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: update $(date -u +%H:%M)"
          git push
